    { id:"loop",    label:"Loop-friendly",         icon:"🔁", desc:"Ends in a way that flows naturally back to the start." },
  ];

  function buildScenarioVariation(chords, key, scenarioId) {
    if (!chords || !chords.length) return null;
    const isMinor = detectMinorKey(chords);
    let result = [...chords];

    if (scenarioId === "chorus") {
      // End on the tonic, make sure it has a strong pre-cadential chord
      const home = romanToChord(isMinor ? "i" : "I", key);
      const dom = romanToChord("V", key);
      result = result.slice(0, result.length > 3 ? result.length - 1 : result.length);
      // Ensure second-to-last is dominant-ish
      if (result.length > 1) {
        const prevInfo = romanInfoForChord(result[result.length-1], key, isMinor?"minor":"major");
        if (prevInfo.role !== "tension") result[result.length-1] = dom;
      }
      result.push(home);
    }
    else if (scenarioId === "verse") {
      // End on V or V7 to keep tension
      const dom7 = romanToChord("V7", key);
      result = result.map(c => c); // copy
      result[result.length - 1] = dom7;
    }
    else if (scenarioId === "bridge") {
      // Insert a borrowed chord in the middle and end somewhere unexpected
      const borrowed = isMinor ? romanToChord("VI", key) : romanToChord("bVII", key);
      const mid = Math.floor(result.length / 2);
      result.splice(mid, 0, borrowed);
      result = result.slice(0, 8);
    }
    else if (scenarioId === "dark") {
      // Swap the tonic to minor if major, add iv or bVI
      result = result.map(c => {
        const info = romanInfoForChord(c, key, isMinor?"minor":"major");
        if (info.roman === "I") return { ...c, type: "min" };
        if (info.roman === "IV") return { ...c, type: "min" };
        return c;
      });
    }
    else if (scenarioId === "lift") {
      // Add a bVII or major VI before the end
      const lift = isMinor ? romanToChord("III", key) : romanToChord("bVII", key);
      const insertAt = Math.max(result.length - 1, 1);
      result.splice(insertAt, 0, lift);
      result = result.slice(0, 8);
    }
    else if (scenarioId === "loop") {
      // End on V so it snaps back to the start nicely
      const dom = romanToChord("V", key);
      result[result.length - 1] = dom;
    }

    return result;
  }

  function renderSuggest() {
    const moodBtns = Object.entries(SUGGEST_MOODS).map(([k,v]) => btn(v.label, state.suggestMood===k, "#6dd4a8", `app.setSuggestMood('${k}')`)).join("");
    const keyRow = keyButtons(state.suggestKey, "#6dd4a8", "app.setSuggestKey");
    const mood = SUGGEST_MOODS[state.suggestMood];
    const chordLabel = chordSymbol;
    const hasInsertSpot = Number.isInteger(state.suggestInsertIdx) && state.progChords[state.suggestInsertIdx];
    const insertAnchor = hasInsertSpot ? chordSymbol(state.progChords[state.suggestInsertIdx]) : null;
    function insertActionLabel(chords, fallback) {
      const names = (chords || []).map(chordSymbol).join(" → " );
      if (insertAnchor) return chords.length > 1 ? `Insert ${names} after ${insertAnchor}` : `Insert after ${insertAnchor}`;
      return fallback || (chords.length > 1 ? `Add ${names}` : "Add chord");
    }
    function insertHint() {
      return insertAnchor ? `New chords will insert after ${insertAnchor}. Tap it again to add to the end instead.` : "Tap a chord in Current Progression to choose where new chords land.";
    }

    function romanListToChords(prog) { return prog.map(r => romanToChord(r, state.suggestKey)); }
    function ideaTags(prog) {
      const tags = [];
      const joined = prog.join(" ");
      if (prog.length <= 3) tags.push("simple");
      if (/b|iv|III|II|i\b|v\b/.test(joined)) tags.push("darker");
      if (prog.length === 4 || prog[0] === prog[prog.length - 1]) tags.push("loopable");
      if ((prog.includes("I") && prog.includes("V")) || joined.includes("ii V I")) tags.push("classic");
      if (prog[0] === "IV" || joined.includes("IV V") || joined.includes("V vi")) tags.push("chorus");
      return tags.length ? [...new Set(tags)] : ["classic"];
    }
    function tagLabel(t) {
      return ({simple:"Simple", classic:"Classic", darker:"Darker", loopable:"Loopable", chorus:"Big chorus"})[t] || t;
    }
    function matchesFilter(prog) {
      return state.suggestFilter === "all" || ideaTags(prog).includes(state.suggestFilter);
    }
    function oneLineUse(prog) {
      const tags = ideaTags(prog);
      if (tags.includes("darker")) return "Adds shadow or drama without needing a long theory detour.";
      if (tags.includes("chorus")) return "Good when you want a bigger lift or more forward motion.";
      if (tags.includes("simple")) return "A compact idea that is easy to loop, sing over, and change.";
      if (tags.includes("loopable")) return "Built to cycle smoothly while you search for melody ideas.";
      return "A usable starting point for a verse, chorus, or bridge.";
    }
    function cardFor(prog, idxLabel="") {
      // prog may be an array of roman strings (curated ideas) or chord objects (optimized/random).
      const isChordObjects = prog.length > 0 && typeof prog[0] === "object";
      const chords = isChordObjects ? prog : romanListToChords(prog);
      const display = chords.map(chordLabel).join("  →  ");
      const romans = isChordObjects ? chords.map(chordSymbol).join(" – ") : prog.join(" – ");
      const enc = encodeURIComponent(JSON.stringify(chords));
      const tagProg = isChordObjects ? chords.map(c => c.key) : prog;
      const tags = ideaTags(tagProg).map(t => `<span class="tag-chip">${esc(tagLabel(t))}</span>`).join("");
      return `<div class="idea-card"><div style="font-size:11px;color:var(--dim);font-style:italic;margin-bottom:3px">${idxLabel ? esc(idxLabel + " · ") : ""}${esc(romans)}</div><div class="progression">${esc(display)}</div><div class="info-text">${esc(oneLineUse(tagProg))}</div><div class="tags">${tags}</div><div class="row"><button type="button" class="pill" style="--c:#e8c547;font-size:11px" onclick="app.playSuggested('${enc}')">Preview</button><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px" onclick="app.loadSuggestedHere('${enc}')">Use this</button><button type="button" class="pill" style="--c:#7eb8d4;font-size:11px" onclick="app.loadSuggested('${enc}')">Study</button></div></div>`;
    }

    const filtered = mood.progs.filter(matchesFilter);
    const pool = filtered.length ? filtered : mood.progs;
    const rotated = pool.map((_, i) => pool[(i + (state.suggestIdeaOffset || 0)) % pool.length]);
    const visible = state.suggestShowAllIdeas ? rotated : rotated.slice(0, 3);
    const ideaCards = visible.map((p, i) => cardFor(p, `Idea ${((state.suggestIdeaOffset || 0) + i) % pool.length + 1} of ${pool.length}`)).join("");
    const showMoreText = state.suggestShowAllIdeas ? "Show fewer ideas" : `Show ${Math.max(0, pool.length - 3)} more ideas`;
    const filterBtns = [
      ["all","All"],["simple","Simple"],["classic","Classic"],["darker","Darker"],["loopable","Loopable"],["chorus","Big chorus"]
    ].map(([k,l]) => btn(l, state.suggestFilter===k, "#6dd4a8", `app.setSuggestFilter('${k}')`)).join("");

    const randomCard = state.suggestRandom ? `<div style="margin-top:10px">${cardFor(state.suggestRandom, "Random")}${state.suggestRandomBassExpl ? `<div class="info-text" style="margin-top:6px;color:var(--muted);font-style:italic">♩ ${esc(state.suggestRandomBassExpl)}</div>` : ""}</div>` : "";
    const lenBtns = [3,4,6,8].map(n => btn(String(n)+" chords", state.suggestRandomLen===n, "#e8c547", `app.set('suggestRandomLen',${n})`)).join("");
    const bassStyleBtns = [["none","Simple roots"],["smooth","Smooth bass"],["descend","Walk down"],["pedal","Pedal tone"],["chromatic","Chromatic pull"]].map(([k,l]) => btn(l, state.suggestBassStyle===k, "#6dd4a8", `app.set('suggestBassStyle','${k}')`)).join("");
    const ideaPanel = `<div class="idea-panel"><div class="idea-head"><div><div class="section-label">Try a progression</div><div class="info-text">Start here: preview a mood idea, tap <strong>Use this</strong> to make it your current progression, or <strong>Study</strong> when you want the full fretboard view.</div></div><div class="row"><button type="button" class="pill" style="--c:#6dd4a8" onclick="app.refreshIdeas()">Refresh ideas</button><button type="button" class="accent-btn" onclick="app.surpriseSuggestion()">Surprise me</button></div></div><div class="mini-label">Filter ideas</div><div class="row" style="margin-bottom:10px">${filterBtns}</div><div class="idea-row">${ideaCards}</div>${pool.length > 3 ? `<button type="button" class="muted-link" onclick="app.toggle('suggestShowAllIdeas')">${esc(showMoreText)}</button>` : ""}<div class="card" style="margin-top:10px;padding:11px 12px;background:var(--surface-2)"><div class="section-label" style="margin-bottom:6px">Randomizer</div><div class="info-text" style="margin-bottom:8px">Need a fresh shape? Choose a length and a bass motion, generate an idea, then preview or use it like any other card.</div><div class="row" style="margin-bottom:8px">${lenBtns}</div><div class="mini-label">Shape the bass line</div><div class="row" style="margin-bottom:8px">${bassStyleBtns}</div><button type="button" class="pill" style="--c:#e8c547" onclick="app.generateRandomProg()">Generate random idea</button>${randomCard}</div></div>`;

    const borrowedChips = BORROWED_CHORDS.map(bc => {
      const c = romanToChord(bc.roman, state.suggestKey);
      const enc = encodeURIComponent(JSON.stringify([c]));
      const deep = state.theoryDepth === "theory" ? `<details style="margin-top:7px"><summary class="info-text" style="cursor:pointer;color:var(--text-bright)">Why this works</summary><div class="info-text"><strong>Theory:</strong> ${esc(bc.deep)}</div></details>` : "";
      return `<div class="saved-card"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap"><span style="font-size:14px;color:var(--text-bright)">${esc(chordLabel(c))}</span><span class="tag-chip">${esc(bc.color)}</span></div><div class="info-text" style="margin-bottom:6px">${esc(bc.why)}</div><div class="info-text" style="margin-bottom:8px"><strong>Try it:</strong> ${esc(bc.use)}</div>${deep}<div class="row"><button type="button" class="pill" style="--c:#e8c547;font-size:11px" onclick="app.playSuggested('${enc}')">Preview</button><button type="button" class="pill" style="--c:#c47ed4;font-size:11px" onclick="app.appendChordToProg('${enc}')">${esc(insertActionLabel([c], "Add to end"))}</button></div></div>`;
    }).join("");
    const colorPanel = `<div class="suggest-tab-panel"><div class="section-label">Add color from outside the key</div><div class="info-text" style="margin-bottom:6px">Use these when the current progression feels too plain. They add one surprise chord without forcing you to change keys.</div><div class="reorder-tip" style="margin-bottom:10px">${esc(insertHint())}</div><div class="saved-list">${borrowedChips}</div></div>`;

    const landingCards = SECONDARY_DOMINANTS.map(sd => {
      const target = { key: transpose(state.suggestKey, sd.targetOffset), type: sd.targetType };
      const setup = { key: transpose(target.key, 7), type: "7" };
      const encSetup = encodeURIComponent(JSON.stringify([setup]));
      const encPair = encodeURIComponent(JSON.stringify([setup, target]));
      const setupSym = chordSymbol(setup);
      const targetSym = chordSymbol(target);
      return `<div class="saved-card"><div style="font-size:15px;color:var(--text-bright);margin-bottom:4px">${esc(setupSym)} → ${esc(targetSym)}</div><div class="info-text" style="margin-bottom:6px">${esc(sd.why)}</div><div class="info-text" style="margin-bottom:8px"><strong>Use:</strong> ${esc(sd.use)}</div>${state.theoryDepth === "theory" ? `<details style="margin-bottom:8px"><summary class="info-text" style="cursor:pointer;color:var(--text-bright)">Why this works</summary><div class="info-text">Theory: ${esc(setupSym)} is ${esc(sd.roman)} in ${esc(spell(state.suggestKey))} major.</div></details>` : ""}<div class="row"><button type="button" class="pill" style="--c:#e8823a;font-size:11px" onclick="app.appendChordToProg('${encSetup}')">${esc(insertActionLabel([setup], `Add ${setupSym}`))}</button><button type="button" class="pill" style="--c:#e8c547;font-size:11px" onclick="app.appendChordToProg('${encPair}')">${esc(insertActionLabel([setup, target], `Add ${setupSym} → ${targetSym}`))}</button></div></div>`;
    }).join("");
    const landingsPanel = `<div class="suggest-tab-panel"><div class="section-label">Add a stronger landing</div><div class="info-text" style="margin-bottom:6px">These two-chord moves create pull, then land somewhere clear. Use them when you want the next chord to feel more important.</div><div class="reorder-tip" style="margin-bottom:10px">${esc(insertHint())}</div><div class="saved-list">${landingCards}</div></div>`;
    const notesPanel = `<div>${renderSongwriterAnalysis(state.suggestKey, false)}</div>`;

    // Direction 1: What to try next
    const hasProg = state.progChords && state.progChords.length >= 2;
    const nextSuggestions = hasProg ? buildNextSuggestions(state.progChords, state.suggestKey) : [];
    const nextCards = nextSuggestions.map((s, si) => {
      const enc = encodeURIComponent(JSON.stringify(s.apply()));
      return `<div class="idea-card" style="border-left:3px solid ${s.color}">
        <div style="display:flex;align-items:baseline;gap:7px;margin-bottom:4px">
          <span style="font-size:16px;line-height:1">${s.icon}</span>
          <span style="font-size:13px;font-weight:600;color:var(--text-bright)">${esc(s.label)}</span>
        </div>
        <div class="info-text" style="margin-bottom:8px">${esc(s.detail)}</div>
        <div class="row">
          <button type="button" class="pill" style="--c:#e8c547;font-size:11px" onclick="app.previewNextSuggestion('${enc}')">Preview</button>
          <button type="button" class="pill" style="--c:#6dd4a8;font-size:11px" onclick="app.applyNextSuggestion('${enc}')">Apply</button>
        </div>
      </div>`;
    }).join("");
    const nextPanel = `<div class="suggest-tab-panel">
      <div class="section-label">What to try next</div>
      <div class="info-text" style="margin-bottom:10px">${hasProg ? "Targeted suggestions for your specific progression — each one is a single-chord change or addition." : "Build or load a progression first, then come back here for targeted suggestions."}</div>
      ${hasProg && nextCards ? `<div class="saved-list">${nextCards}</div>` : `<div class="info-text">${hasProg ? "Your progression looks pretty complete — try Color chords or Stronger landings for more ideas." : ""}</div>`}
    </div>`;

    // Direction 2: Scenarios
    const scenarioCards = SCENARIOS.map(sc => {
      if (!hasProg) {
        return `<div class="idea-card" style="opacity:0.5"><div class="progression">${sc.icon} ${esc(sc.label)}</div><div class="info-text">${esc(sc.desc)}</div></div>`;
      }
      const variation = buildScenarioVariation(state.progChords, state.suggestKey, sc.id);
      if (!variation) return "";
      const enc = encodeURIComponent(JSON.stringify(variation));
      const display = variation.map(chordSymbol).join("  →  ");
      return `<div class="idea-card">
        <div style="display:flex;align-items:baseline;gap:7px;margin-bottom:3px">
          <span style="font-size:15px">${sc.icon}</span>
          <span style="font-size:13px;font-weight:600;color:var(--text-bright)">${esc(sc.label)}</span>
        </div>
        <div class="info-text" style="margin-bottom:3px">${esc(sc.desc)}</div>
        <div class="progression" style="margin-bottom:8px">${esc(display)}</div>
        <div class="row">
          <button type="button" class="pill" style="--c:#e8c547;font-size:11px" onclick="app.playSuggested('${enc}')">Preview</button>
          <button type="button" class="pill" style="--c:#6dd4a8;font-size:11px" onclick="app.loadSuggestedHere('${enc}')">Use this</button>
        </div>
      </div>`;
    }).join("");
    const scenariosPanel = `<div class="suggest-tab-panel">
      <div class="section-label">Scenarios</div>
      <div class="info-text" style="margin-bottom:10px">${hasProg ? "Shape your progression for a specific section — each scenario is a variation of what you have." : "Build or load a progression first, then shape it for a verse, chorus, bridge, or mood."}</div>
      <div class="saved-list">${scenarioCards}</div>
    </div>`;

    const tabs = [["color","Color chords"],["landings","Stronger landings"],["next","What to try next"],["scenarios","Scenarios"],["notes","Songwriter notes"]].map(([k,l]) => btn(l, state.suggestTab===k, k==="color"?"#c47ed4":k==="landings"?"#e8c547":k==="next"?"#6dd4a8":k==="scenarios"?"#e8823a":"#7eb8d4", `app.set('suggestTab','${k}')`)).join("");
    const tabPanel = `<div class="suggest-tabs">${tabs}</div>${state.suggestTab === "landings" ? landingsPanel : state.suggestTab === "notes" ? notesPanel : state.suggestTab === "next" ? nextPanel : state.suggestTab === "scenarios" ? scenariosPanel : colorPanel}`;

    const currentChips = state.progChords.length
      ? state.progChords.map((c,i) => {
          const label = chordLabel(c);
          const selected = state.suggestInsertIdx === i ? "selected" : "";
          const flash = state.suggestFlashIdx === i ? "flash" : "";
          return `<span class="suggest-chip ${selected} ${flash}" data-prog-index="${i}" onclick="app.selectProgSlot(${i})" title="Tap to choose where new chords insert"><span>${esc(label)}</span><span class="roman">${i+1}</span><button type="button" aria-label="Move ${esc(label)} left" onclick="event.stopPropagation();app.moveChordLeft(${i})">‹</button><button type="button" aria-label="Move ${esc(label)} right" onclick="event.stopPropagation();app.moveChordRight(${i})">›</button><button type="button" aria-label="Remove ${esc(label)}" onclick="event.stopPropagation();app.removeChord(${i})">×</button></span>`;
        }).join("")
      : `<span class="suggest-empty">No current progression yet. Use a mood idea, add a color chord, or press Surprise me.</span>`;
    const undoBtn = state.suggestUndo ? `<button type="button" class="pill" style="--c:#e8c547" onclick="app.undoSuggest()">Undo</button>` : "";
    const dockControls = state.progChords.length
      ? `<div class="row"><button type="button" class="accent-btn" onclick="app.playCurrentProgressionOnce()">Play</button><button type="button" class="pill" style="--c:#7eb8d4" onclick="app.setMode('progression')">Study</button>${undoBtn}<button type="button" class="pill" style="--c:#e87a7a" onclick="app.clearProgression()">Clear</button></div>`
      : `<div class="row">${undoBtn}<button type="button" class="pill" style="--c:#7eb8d4" onclick="app.setMode('progression')">Open builder</button></div>`;
    const dockHint = state.progChords.length ? (insertAnchor ? `Insert spot: after ${insertAnchor}. Tap it again to go back to adding at the end.` : "Tap a chord to choose an insert spot. Use ‹ › to rearrange.") : "Use an idea, add a color chord, or press Surprise me.";
    const dock = `<div class="suggest-dock studio-current"><div class="suggest-dock-head"><div><div class="section-label">Current progression</div><div class="info-text">${esc(dockHint)}</div></div>${dockControls}</div><div class="suggest-strip">${currentChips}</div></div>`;

    return `<div class="suggest-hero"><div class="section-label">Studio</div><div class="info-text" style="margin-bottom:12px">Start with a key and mood, preview ideas, then shape your progression with color chords or stronger landings. Tap Study when you want the full fretboard and chart view.</div><div class="mini-label">Key</div><div class="row">${keyRow}</div><div class="mini-label">Mood</div><div class="row">${moodBtns}</div></div>${dock}${ideaPanel}${tabPanel}`;
  }

  // ── Fretboard Note Trainer ──
  function renderTrainer() {
    const strings = getOpenStrings();
    const { displayFrets } = current();
    const target = state.trainerTarget;
    const effectiveOpen = strings.map(s => noteAtFret(s, state.capo));
    let statusHtml;
    if (!target) {
      statusHtml = `<div class="info-text">Tap “New target” to begin. You'll be asked to find every instance of a note across the neck.</div>`;
    } else {
      const allPositions = [];
      strings.forEach((open, si) => { displayFrets.forEach(f => { if (noteAtFret(open, f) === target) allPositions.push(si + ":" + f); }); });
      const remaining = allPositions.length - state.trainerFound.length;
      const done = remaining <= 0;
      statusHtml = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="font-size:20px;color:var(--text-bright)">Find every <strong style="color:#e8c547">${esc(spell(target))}</strong></span><span class="info-text">${state.trainerFound.length} / ${allPositions.length} found</span>${state.trainerTime?`<span class="info-text">· ${state.trainerTime}s</span>`:""}</span>${done?`<span class="interval-meta" style="--c:#6dd4a8">Complete</span>`:""}</div>`;
    }
    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const thick = 1 + si * 0.5;
      const cells = displayFrets.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const key = stringIdx + ":" + fret;
        const found = state.trainerFound.includes(key);
        const inner = found ? `<div class="dot" style="--c:#6dd4a8"><span>${esc(state.noteDisplay==="note"?spell(note):"✓")}</span></div>` : `<span class="faded-note" style="opacity:${target?0.3:1}">${target?"":esc(spell(note))}</span>`;
        return `<div class="cell" onclick="app.trainerGuess(${stringIdx},${fret},'${note}')"><div class="string-line" style="height:${thick}px;left:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line"></div>`:""}${fret>0?`<div class="fret-wire"></div>`:""}${inner}</div>`;
      }).join("");
      return `<div class="string-row"><div class="string-label">${esc(spell(open))}</div>${cells}</div>`;
    }).join("");
    const minW = 52 + displayFrets.length * 46;
    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f)?"marked":""}">${f}</div>`).join("");
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Fretboard Note Trainer</div>${statusHtml}<div class="row" style="margin-top:10px"><button type="button" class="accent-btn" onclick="app.newTrainerTarget()">New target</button></div><div class="info-text" style="margin-top:8px">Great for learning a new tuning — the positions change with every instrument and capo setting.</div></div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px"><div class="fret-numbers">${numberRow}</div>${rows}</div></div>`;
  }

  // ── Metronome ──
  const TIME_SIGS = {
    "2/4": { beats: 2, unit: 4, feel: "March, polka — strong-weak." },
    "3/4": { beats: 3, unit: 4, feel: "Waltz — strong-weak-weak." },
    "4/4": { beats: 4, unit: 4, feel: "Common time — most pop, rock, and folk." },
    "5/4": { beats: 5, unit: 4, feel: "Asymmetric — count 3+2 or 2+3 (e.g. “Take Five”)." },
    "6/8": { beats: 6, unit: 8, feel: "Compound duple — two groups of three; lilting, 6 eighth-note pulses." },
    "7/8": { beats: 7, unit: 8, feel: "Asymmetric compound — often 2+2+3; common in Balkan and prog." }
  };
  function renderMetronome() {
    const sig = TIME_SIGS[state.metroSig] || TIME_SIGS["4/4"];
    const bpm = state.metroBpm;
    const sigButtons = Object.keys(TIME_SIGS).map(s => btn(s, state.metroSig===s, "#e8c547", `app.setMetroSig('${s}')`)).join("");
    const bpmDown = `<button type="button" class="util-btn" onclick="app.nudgeBpm(-5)">−5</button>`;
    const bpmUp = `<button type="button" class="util-btn" onclick="app.nudgeBpm(5)">+5</button>`;
    const bpmDown1 = `<button type="button" class="util-btn" onclick="app.nudgeBpm(-1)">−1</button>`;
    const bpmUp1 = `<button type="button" class="util-btn" onclick="app.nudgeBpm(1)">+1</button>`;

    // Visual beat dots
    const beats = sig.beats;
    const dots = Array.from({length: beats}, (_, i) => {
      const active = state.metroRunning && state.metroCurrentBeat === i;
      const isAccent = i === 0;
      return `<div class="beat-dot ${active?"active":""} ${isAccent?"accent":""}" style="${active?`background:${isAccent?"#e8c547":"#6dd4a8"};box-shadow:0 0 16px ${isAccent?"#e8c547":"#6dd4a8"}`:""}"></div>`;
    }).join("");

    const startStop = state.metroRunning
      ? `<button type="button" class="accent-btn" style="background:#e8675a;border-color:#e8675a" onclick="app.stopMetronome()">Stop</button>`
      : `<button type="button" class="accent-btn" onclick="app.startMetronome()">Start</button>`;

    const tempoMarks = [[60,"Largo"],[76,"Adagio"],[108,"Moderato"],[120,"Allegro"],[168,"Presto"]];
    const mark = tempoMarks.reduce((acc,[b,n]) => bpm>=b ? n : acc, "Grave");

    // Trainer mode
    let trainerHtml = "";
    if (state.metroTrainer) {
      const revealBtn = state.metroTrainerReveal
        ? `<div class="info-text" style="margin-top:10px">It's <strong style="color:#e8c547;font-size:16px">${esc(state.metroTrainerSig||"?")}</strong> — ${esc(state.metroTrainerSig?TIME_SIGS[state.metroTrainerSig].feel:"")}</div><button type="button" class="accent-btn" style="margin-top:10px" onclick="app.newMetroChallenge()">Next challenge</button>`
        : `<div class="row" style="margin-top:10px;flex-wrap:wrap">${Object.keys(TIME_SIGS).map(s => `<button type="button" class="pill" style="--c:#6dd4a8" onclick="app.guessMetroSig('${s}')">${s}</button>`).join("")}</div>`;
      trainerHtml = `<div class="card" style="margin-bottom:14px;border-left:3px solid #6dd4a8">
        <div class="section-label">Guess the time signature</div>
        <div class="info-text" style="margin-bottom:10px">A pattern is playing with an accent on beat 1. Count the beats between accents, then pick the meter. ${state.metroRunning?"":"Tap “Play challenge” to start."}</div>
        <div class="row">${state.metroRunning?`<button type="button" class="accent-btn" style="background:#e8675a;border-color:#e8675a" onclick="app.stopMetronome()">Stop</button>`:`<button type="button" class="accent-btn" onclick="app.newMetroChallenge()">Play challenge</button>`}</div>
        ${state.metroRunning||state.metroTrainerReveal?revealBtn:""}
      </div>`;
    }

    return `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between"><div class="section-label" style="margin:0">Metronome</div><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;padding:3px 9px" onclick="app.toggleMetroTrainer()">${state.metroTrainer?"practice mode":"train my ear"}</button></div>
      <div class="info-text" style="margin:8px 0 14px">A steady click with an accented downbeat. Use it to practise timing, or switch to ear-training to learn to identify meters by feel.</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <div style="font-size:46px;font-weight:300;color:var(--text-bright);line-height:1">${bpm}<span style="font-size:16px;color:var(--dim)"> BPM</span></div>
        <div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase">${esc(mark)}</div>
        <div class="row" style="justify-content:center">${bpmDown}${bpmDown1}${bpmUp1}${bpmUp}</div>
        <input type="range" min="40" max="240" value="${bpm}" oninput="app.setBpm(this.value)" style="width:100%;max-width:340px" aria-label="Tempo BPM" />
        <div class="beat-row" style="display:flex;gap:12px;justify-content:center;margin:6px 0">${dots}</div>
        <div style="font-size:22px;color:var(--text-bright);letter-spacing:0.05em">${esc(state.metroSig)}</div>
        <div>${startStop}</div>
      </div>
    </div>
    ${state.metroTrainer ? trainerHtml : `<div class="card" style="margin-bottom:14px"><div class="section-label">Time signature</div><div class="row" style="margin-bottom:10px">${sigButtons}</div><div class="info-text">${esc(sig.feel)}</div></div>`}`;
  }

  // ── Tuner reference tones ──
  function renderTuner() {
    const strings = getOpenStrings();
    const effectiveOpen = strings.map(s => noteAtFret(s, state.capo));
    const buttons = effectiveOpen.map((n, i) => `<button type="button" class="util-btn" style="font-size:16px;padding:14px 18px" onclick="app.playTunerNote('${n}',${i})">${esc(spell(n))}<div style="font-size:9px;color:var(--dim);margin-top:3px">string ${i+1}</div></button>`).join("");
    return `<div class="card"><div class="section-label">Tuner — Reference Tones</div><div class="info-text" style="margin-bottom:14px">Tap each string to hear its reference pitch and tune by ear. Reflects your current tuning${state.capo>0?" and capo":""}.</div><div class="row" style="gap:10px">${buttons}</div></div>`;
  }

  function renderChartsHub() {
    const hasProg = state.progChords && state.progChords.length > 0;
    const progSummary = hasProg ? state.progChords.map(chordSymbol).join("  →  ") : null;
    const chordSummary = chordSymbol({ key: state.selectedKey, type: state.selectedType, bass: state.selectedBass });

    const intro = `<div class="mode-intro"><div><div class="section-label">Charts</div><div class="info-text">Print, save, share, or link the music you're working on. Choose what kind of chart you want, then use the export options below.</div></div></div>`;

    const effective = effectiveChartType();
    const chartTypes = [
      ["auto", "Auto-detect"],
      ["chord", "Chord tones"],
      ["scale", "Scale"],
      ["progression", "Progression"],
    ];
    const typePicker = chartTypes.map(([k, l]) => btn(l, state.chartType === k, "#e8c547", `app.set('chartType','${k}')`)).join("");

    const strings = getOpenStrings().map(s => noteAtFret(s, state.capo));
    const scaleDef = SCALES[state.scalesType] || SCALES.major;
    const scaleTones = buildTones(state.scalesKey, scaleDef.intervals);
    const positions = scalePositions(strings, scaleTones, state.scalesKey);
    const scalePositionPicker = effective === "scale" ? `
      <div style="margin-top:12px">
        <div class="mini-label">Scale position to chart</div>
        <div class="row">
          <button type="button" class="pill ${state.scalesPosition===null?"active":""}" style="--c:${scaleDef.color}" onclick="app.set('scalesPosition',null)">Whole neck</button>
          ${positions.map((w, i) => btn(`Pos ${i+1} (fr ${w[0]}–${w[1]})`, state.scalesPosition === i, scaleDef.color, `app.set('scalesPosition',${i})`)).join("")}
        </div>
      </div>` : "";

    let previewLabel, previewSub;
    if (effective === "scale") {
      previewLabel = `${spell(state.scalesKey)} ${scaleDef.label}`;
      const posLabel = state.scalesPosition != null && positions[state.scalesPosition]
        ? ` · Position ${state.scalesPosition + 1} (frets ${positions[state.scalesPosition][0]}–${positions[state.scalesPosition][1]})`
        : " · Whole neck";
      previewSub = `Scale chart${posLabel}. Degree labels appear on every scale note. To change the scale itself, open Fretboard → Scales.`;
    } else if (effective === "progression" && hasProg) {
      previewLabel = progSummary;
      previewSub = `Your current progression (${state.progChords.length} chord${state.progChords.length>1?"s":""}). Build or edit it in Studio or Study.`;
    } else {
      previewLabel = chordSummary;
      previewSub = `Chord tones chart for your current chord. To change the chord, open Fretboard → Chord Tones.`;
    }

    const current = `<div class="card" style="margin-bottom:14px">
      <div class="section-label">Chart type</div>
      <div class="row" style="margin-bottom:12px">${typePicker}</div>
      <div class="section-label">What will export</div>
      <div class="summary-inline">${esc(previewLabel)}</div>
      <div class="info-text" style="margin-top:6px">${esc(previewSub)}</div>
      ${scalePositionPicker}
    </div>`;

    const exportCard = `<div class="card" style="margin-bottom:14px"><div class="section-label">Export &amp; sharing options</div>
      <div class="info-text" style="margin-bottom:12px">Use these after the chart above looks right. Print makes a practice sheet; PNG is best for messages and docs; SVG stays crisp at any size; Copy link reopens this app state.</div>
      <div class="row">
        <button type="button" class="accent-btn" onclick="app.printChart()">Print</button>
        <button type="button" class="util-btn" onclick="app.savePNG()">Save PNG image</button>
        <button type="button" class="util-btn" onclick="app.downloadSVG()">Save SVG (vector)</button>
        <button type="button" class="util-btn" onclick="app.sharePNG()">Share…</button>
        <button type="button" class="util-btn" onclick="app.copyStateLink()">Copy link</button>
      </div>
    </div>`;

    return `${intro}${current}${renderSavedCharts()}${exportCard}`;
  }

  // ── Main render ──
  function renderStudioDock() {
    if (!state.progChords || !state.progChords.length) return "";
    const dockKey = state.suggestKey || state.selectedKey || state.progChords[0].key;

    // Collapsed state: thin tab showing progression as text + expand button
    if (state.dockCollapsed) {
      const summary = state.progChords.map(chordSymbol).join("  ·  ");
      return `<div class="studio-dock studio-dock-collapsed" onclick="app.set('dockCollapsed',false)">
        <span class="dock-collapsed-summary">♩ ${esc(summary)}</span>
        <button type="button" class="dock-collapse-btn" onclick="event.stopPropagation();app.set('dockCollapsed',false)" aria-label="Expand dock">▲ Show progression</button>
      </div>`;
    }

    const chips = state.progChords.map((ch, ci) => {
      const col = PROG_COLORS[ci % PROG_COLORS.length];
      const selected = state.suggestInsertIdx === ci;
      const sym = chordSymbol(ch);
      const info = romanInfoForChord(ch, dockKey);
      const roman = info ? info.roman : "";
      const role = info ? info.role : "";
      return `<span class="dock-chip ${selected ? "selected" : ""}" style="--c:${col}"
          onclick="app.selectProgressionChord(${ci})"
          title="${esc(roman ? roman + ' — ' + role : sym)}">
        <span class="dock-chip-roman">${esc(roman)}</span>
        <span class="dock-chip-name">${esc(sym)}</span>
        <span class="dock-chip-moves">
          <button type="button" class="dock-chip-move" onclick="event.stopPropagation();app.moveChordLeft(${ci})" aria-label="Move ${esc(sym)} left">‹</button>
          <button type="button" class="dock-chip-move" onclick="event.stopPropagation();app.moveChordRight(${ci})" aria-label="Move ${esc(sym)} right">›</button>
        </span>
      </span>`;
    }).join("");

    const chordCount = state.progChords.length;
    const countLabel = `<span style="font-size:10px;color:var(--muted);align-self:flex-end;padding-bottom:4px">${chordCount}/8</span>`;

    return `<div class="studio-dock">
      <div class="studio-dock-chips">${chips}${countLabel}</div>
      <div class="dock-actions">
        <button type="button" class="accent-btn" onclick="app.playCurrentProgressionOnce()" aria-label="Play progression" title="Play">▶ Play</button>
        <button type="button" class="util-btn" onclick="app.setMode('progression')" title="Open full Study view">Study →</button>
        <button type="button" class="dock-collapse-btn" onclick="app.set('dockCollapsed',true)" aria-label="Hide dock" title="Hide">▼ Hide</button>
      </div>
    </div>`;
  }

  function render() {
    document.documentElement.setAttribute("data-theme", state.theme);
    let content;
    switch (state.mode) {
      case "single": content = renderSingle(); break;
      case "progression": content = renderProgression(); break;
      case "interval": content = renderIntervalTrainer(); break;
      case "identify": content = renderIdentify(); break;
      case "scales": content = renderScales(); break;
      case "finder": content = renderFinder(); break;
      case "modes": content = renderModes(); break;
      case "suggest": content = renderSuggest(); break;
      case "quiz": content = renderQuiz(); break;
      case "ear": content = renderEar(); break;
      case "trainer": content = renderTrainer(); break;
      case "metronome": content = renderMetronome(); break;
      case "tuner": content = renderTuner(); break;
      case "charts": content = renderChartsHub(); break;
      default: content = renderSuggest();
    }
    const currentSection = state.mode === "suggest" ? "studio" : state.mode === "progression" ? "study" : ["single","scales","interval","identify","finder","modes"].includes(state.mode) ? "fretboard" : ["quiz","ear","trainer","metronome","tuner"].includes(state.mode) ? "practice" : state.mode === "charts" ? "charts" : "studio";

    // Primary navigation — the places you go. Studio / Study / Charts are direct tabs;
    // Fretboard and Practice are dropdowns (they hold sub-tools) and now display the
    // active sub-tool's name so you always know where you are.
    const fretModes = [["single","Chord Tones"],["scales","Scales"],["interval","Intervals"],["identify","Find Chord"],["finder","Find Key"],["modes","Modes"]];
    const practiceModes = [["metronome","Metronome"],["tuner","Tuner"],["trainer","Fretboard Trainer"],["ear","Ear Training"],["quiz","Quiz"]];
    const fretActiveLabel = (fretModes.find(([m]) => m === state.mode) || [])[1];
    const practiceActiveLabel = (practiceModes.find(([m]) => m === state.mode) || [])[1];
    const fretOptions = `<option value="">${currentSection==="fretboard" && fretActiveLabel ? esc("Fretboard — "+fretActiveLabel) : "Fretboard ▾"}</option>` + fretModes.map(([m,l]) => `<option value="${m}" ${state.mode===m?"selected":""}>${esc(l)}</option>`).join("");
    const practiceOptions = `<option value="">${currentSection==="practice" && practiceActiveLabel ? esc("Practice — "+practiceActiveLabel) : "Practice ▾"}</option>` + practiceModes.map(([m,l]) => `<option value="${m}" ${state.mode===m?"selected":""}>${esc(l)}</option>`).join("");

    const primaryNav =
      `<button type="button" class="tab ${currentSection==="studio"?"active":""}" onclick="app.setMode('suggest')">Studio</button>` +
      `<button type="button" class="tab ${currentSection==="study"?"active":""}" onclick="app.setMode('progression')">Study</button>` +
      `<button type="button" class="tab ${currentSection==="charts"?"active":""}" onclick="app.setMode('charts')">Charts</button>`;

    const setupSummary = `${esc(instrumentLabel())} · ${esc(getOpenStrings().map(spell).join(" "))}${state.capo>0?` · Capo ${state.capo}`:""}`;

    const showDock = state.mode === "suggest" && state.progChords && state.progChords.length > 0;
    const dockClass = showDock ? (state.dockCollapsed ? " has-dock-collapsed" : " has-dock") : "";
    document.getElementById("app").innerHTML = `<div class="wrap${dockClass}">
      <div class="header"><div class="eyebrow">${setupSummary}</div><h1>Open Strings</h1><div class="tagline">Songwriting, fretboard theory, practice, and printable charts</div></div>
      <div class="toolbar primary-bar">
        <div class="segmented app-nav" role="tablist">${primaryNav}</div>
        <select class="util-btn nav-select ${currentSection==="fretboard"?"active-more":""}" onchange="if(this.value)app.setMode(this.value)" aria-label="Fretboard tools">${fretOptions}</select>
        <select class="util-btn nav-select ${currentSection==="practice"?"active-more":""}" onchange="if(this.value)app.setMode(this.value)" aria-label="Practice tools">${practiceOptions}</select>
      </div>
      <div class="toolbar utility-bar">
        <button type="button" class="util-btn ${state.showSetup?"util-on":""}" onclick="app.toggle('showSetup')" title="Instrument, tuning, capo">⚙ Setup</button>
        <button type="button" class="util-btn ${state.showPrefs?"util-on":""}" onclick="app.toggle('showPrefs')">${state.showPrefs?"Close preferences":"Preferences"}</button>
        <button type="button" class="util-btn ${state.showHelp?"util-on":""}" onclick="app.toggle('showHelp')">${state.showHelp?"Close help":"Help"}</button>
      </div>
      ${state.showSetup ? renderSetupPanel() : ""}
      ${state.showHelp ? renderHelp() : ""}
      ${state.showPrefs ? renderPreferences() : ""}
      ${content}
      <div class="footer">Open Strings · Built and designed by Ethan Grimes · ethangrimes305@gmail.com<br>${esc(getOpenStrings().map(spell).join(" "))} · ${esc(tuningLabel())}</div>
    </div>${showDock ? renderStudioDock() : ""}`;

    // Preserve horizontal scroll position of fretboards across re-renders, so tapping a
    // high-fret note (e.g. in the Chord Identifier) doesn't snap the neck back to fret 0.
    const target = document.getElementById("app");
    if (render._scrollLeft != null) {
      const scroller = target.querySelector(".fret-scroll");
      if (scroller) scroller.scrollLeft = render._scrollLeft;
    }
    // Capture scroll position on any future scroll so the next render can restore it.
    const liveScroller = target.querySelector(".fret-scroll");
    if (liveScroller && !liveScroller._osBound) {
      liveScroller._osBound = true;
      liveScroller.addEventListener("scroll", () => { render._scrollLeft = liveScroller.scrollLeft; }, { passive: true });
    }
  }

  // Lightweight visual update for the metronome beat indicator, avoiding a full re-render
  // on every tick (which would be heavy and could disturb the audio scheduler).
  function updateBeatDots(beat) {
    const dots = document.querySelectorAll(".beat-dot");
    if (!dots || !dots.length) return;
    dots.forEach((d, i) => {
      const accent = d.classList.contains("accent");
      if (i === beat) {
        d.style.background = accent ? "#e8c547" : "#6dd4a8";
        d.style.boxShadow = `0 0 16px ${accent ? "#e8c547" : "#6dd4a8"}`;
      } else {
        d.style.background = "";
        d.style.boxShadow = "";
      }
    });
  }

  // ── App handlers ──
  const app = {
    set(key, value) { state[key] = value; render(); },
    toggle(key) { state[key] = !state[key]; render(); },
    toggleTheme() { state.theme = state.theme === "dark" ? "light" : "dark"; try { localStorage.setItem("os-theme", state.theme); } catch (e) {} render(); },
    setTheme(t) { state.theme = t; try { localStorage.setItem("os-theme", t); } catch (e) {} render(); },
    setMode(mode) {
      if (state.mode === "metronome" && mode !== "metronome") { audio.stopMetronome(); state.metroRunning = false; state.metroCurrentBeat = -1; }
      if (state.mode === "progression" && mode !== "progression") { audio.stopProgression(); }
      state.mode = mode; render._scrollLeft = null; render();
    },
    setSelectedKey(k) { state.selectedKey = k; state.diatonicKey = k; render(); },
    setSelectedType(k) { state.selectedType = k; render(); },
    setScaleKey(k) { state.scaleKey = k; render(); },
    setScalesKey(k) { state.scalesKey = k; state.scalesPosition = null; state.scalesHighlightChord = null; render(); },
    setScalesType(k) { state.scalesType = k; state.scalesPosition = null; state.scalesHighlightChord = null; render(); },
    setScaleChordMode(mode) { state.scalesChordMode = mode === "triad" ? "triad" : "seventh"; state.scalesHighlightChord = null; render(); },
    toggleScaleChord(i) { state.scalesHighlightChord = state.scalesHighlightChord === i ? null : i; render(); },
    playScaleRun(root, intervals) {
      // Play the scale ascending then descending, at the user's tempo, at real-ish register.
      const up = intervals.map(iv => transpose(root, iv));
      const seq = [...up, transpose(root, 12), ...up.slice().reverse()];
      const step = Math.max(0.18, (Number(state.progTempo) || 800) / 1000 * 0.4);
      let oct = 3, prevIdx = -1;
      seq.forEach((n, i) => {
        const idx = CHROMATIC.indexOf(n);
        if (i > 0 && idx <= prevIdx && i <= up.length) oct++;
        if (i > up.length && idx >= prevIdx) oct = Math.max(3, oct - (idx > prevIdx ? 1 : 0));
        prevIdx = idx;
        audio.playNote(n, i <= up.length ? 4 : 4, 0.45, i * step);
      });
    },
    setFretRange(a,b) { state.fretRange = [a,b]; render(); },
    loadDiatonic(root, type) { state.selectedKey = root; state.selectedType = type; render(); },
    setDiatonicKey(k) { state.diatonicKey = k; render(); },
    playNote(note) { audio.playNote(note); },
    playAt(stringIndex, fret) { audio.playAt(stringIndex, fret); },
    cellKey(ev, stringIndex, fret) {
      // Keyboard support for fret cells: Enter/Space plays the note.
      if (ev && (ev.key === "Enter" || ev.key === " " || ev.key === "Spacebar")) {
        ev.preventDefault();
        audio.playAt(stringIndex, fret);
      }
    },
    playVoicingFrets(frets) { if (Array.isArray(frets)) audio.playVoicingFrets(frets, true); },
    playSingleChord() { const { singleTones } = current(); audio.playChord(singleTones, true, state.selectedBass || null); },
    playVoicing(notes) { if (Array.isArray(notes)) audio.playChord(notes, true); },
    playChordByIndex(i) { const ch = state.progChords[i]; audio.playChord(buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []), true, ch?.bass || null); },
    playProgression() { audio.playProgression(state.progChords, state.progLoop); },
    toggleLoop() { state.progLoop = !state.progLoop; if (!state.progLoop) audio.stopProgression(); render(); },
    stopAudio() { audio.stopProgression(); },
    // Metronome
    setBpm(v) { state.metroBpm = Math.max(40, Math.min(240, Math.round(Number(v)))); if (state.metroRunning) app._restartMetro(); render(); },
    nudgeBpm(d) { state.metroBpm = Math.max(40, Math.min(240, state.metroBpm + d)); if (state.metroRunning) app._restartMetro(); render(); },
    setMetroSig(s) { state.metroSig = s; if (state.metroRunning) app._restartMetro(); render(); },
    _restartMetro() {
      const sig = TIME_SIGS[state.metroSig] || TIME_SIGS["4/4"];
      audio.startMetronome(state.metroBpm, sig.beats, sig.unit, (beat) => { state.metroCurrentBeat = beat; const el = document.querySelectorAll(".beat-dot"); /* lightweight visual update */ updateBeatDots(beat); });
    },
    startMetronome() {
      state.metroRunning = true;
      state.metroCurrentBeat = -1;
      app._restartMetro();
      render();
    },
    stopMetronome() { audio.stopMetronome(); state.metroRunning = false; state.metroCurrentBeat = -1; render(); },
    toggleMetroTrainer() {
      audio.stopMetronome();
      state.metroRunning = false; state.metroCurrentBeat = -1;
      state.metroTrainer = !state.metroTrainer;
      state.metroTrainerReveal = false; state.metroTrainerSig = null;
      render();
    },
    newMetroChallenge() {
      const sigs = Object.keys(TIME_SIGS);
      state.metroTrainerSig = sigs[Math.floor(Math.random() * sigs.length)];
      state.metroTrainerReveal = false;
      state.metroRunning = true;
      state.metroCurrentBeat = -1;
      const sig = TIME_SIGS[state.metroTrainerSig];
      audio.startMetronome(state.metroBpm, sig.beats, sig.unit, (beat) => { state.metroCurrentBeat = beat; updateBeatDots(beat); });
      render();
    },
    guessMetroSig(s) {
      state.metroTrainerReveal = true;
      const correct = s === state.metroTrainerSig;
      toast(correct ? "Correct!" : `Not quite — listen again`);
      render();
    },
    // Chord identifier
    toggleIdNote(string, fret, note) {
      const i = state.idNotes.findIndex(p => p.string === string && p.fret === fret);
      if (i >= 0) state.idNotes.splice(i, 1);
      else { state.idNotes.push({ string, fret, note }); audio.playNote(note); }
      render();
    },
    clearIdNotes() { state.idNotes = []; render(); },
    playIdentified(root, key) { audio.playChord(buildTones(root, CHORD_TYPES[key].intervals), true); },
    // Modes
    setModeParentKey(k) { state.modeParentKey = k; render(); },
    playScale(root, intervals) { intervals.forEach((iv, i) => audio.playNote(transpose(root, iv), 4, 0.5, i * 0.18)); },
    // Suggester
    setSuggestKey(k) { state.suggestKey = k; state.suggestIdeaOffset = 0; state.suggestShowAllIdeas = false; render(); },
    previewNextSuggestion(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); audio.playProgression(chords, false); } catch(e) {} },
    applyNextSuggestion(enc) {
      try {
        const chords = JSON.parse(decodeURIComponent(enc));
        app._rememberProgression();
        state.progChords = chords.slice(0, 8);
        state.suggestFlashIdx = state.progChords.length - 1;
        toast("Applied — tap Undo to go back");
        render();
      } catch(e) {}
    },
    setSuggestMood(k) { state.suggestMood = k; state.suggestIdeaOffset = 0; state.suggestShowAllIdeas = false; state.suggestRandom = null; state.suggestRandomBassExpl = null; render(); },
    setSuggestFilter(k) { state.suggestFilter = k; state.suggestIdeaOffset = 0; state.suggestShowAllIdeas = false; render(); },
    refreshIdeas() { const mood = SUGGEST_MOODS[state.suggestMood]; const total = mood && mood.progs ? mood.progs.length : 1; state.suggestIdeaOffset = ((state.suggestIdeaOffset || 0) + 3) % Math.max(total, 1); state.suggestShowAllIdeas = false; render(); },
    surpriseSuggestion() {
      const mood = SUGGEST_MOODS[state.suggestMood];
      if (!mood || !mood.progs || !mood.progs.length) return;
      const prog = mood.progs[Math.floor(Math.random() * mood.progs.length)];
      let chords = prog.map(r => romanToChord(r, state.suggestKey));
      const bassStyle = state.suggestBassStyle !== "none" ? state.suggestBassStyle : (mood.bassStyle || "none");
      const opt = optimizeBassLine(chords, state.suggestKey, bassStyle);
      if (opt.changed) chords = opt.chords;
      app._rememberProgression();
      state.progChords = chords.slice(0, 8);
      state.editingIdx = 0;
      state.suggestInsertIdx = null;
      state.suggestFlashIdx = state.progChords.length - 1;
      toast(opt.changed && opt.explanation ? opt.explanation : "Surprise progression loaded");
      audio.playProgression(state.progChords, false);
      render();
    },
    applyBassStyle(style) {
      if (!state.progChords || state.progChords.length < 2) return;
      const key = state.suggestKey || state.selectedKey || state.progChords[0].key;
      // In a minor key, pedal and smooth modes work the same but the tonic
      // is minor — no theory change needed, just ensures the right key is used.
      const isMinorCtx = detectMinorKey(state.progChords);
      app._rememberProgression();
      const result = optimizeBassLine(state.progChords, key, style);
      if (result.changed) {
        state.progChords = result.chords;
        state.studyBassApplied = true;
        state.studyBassExpl = result.explanation;
        toast(result.explanation || (isMinorCtx ? "Bass line shaped (minor key)" : "Bass line shaped"));
      } else {
        toast("No smoother bass voicing found for this style");
      }
      render();
    },
    removeBassStyle() {
      state.progChords = (state.progChords || []).map(c => { const n = { ...c }; delete n.bass; return n; });
      state.studyBassApplied = false;
      state.studyBassExpl = null;
      toast("Bass reset to root position");
      render();
    },
    generateRandomProg() {
      const romans = randomProgression(state.suggestRandomLen);
      let chords = romans.map(r => romanToChord(r, state.suggestKey));
      const mood = SUGGEST_MOODS[state.suggestMood];
      const bassStyle = state.suggestBassStyle !== "none" ? state.suggestBassStyle : (mood && mood.bassStyle ? mood.bassStyle : "none");
      const opt = optimizeBassLine(chords, state.suggestKey, bassStyle);
      state.suggestRandom = opt.changed ? opt.chords : chords;
      state.suggestRandomBassExpl = opt.changed ? opt.explanation : null;
      render();
    },
    _rememberProgression() {
      state.suggestUndo = { chords: (state.progChords || []).map(c => ({...c})), editingIdx: state.editingIdx, insertIdx: state.suggestInsertIdx };
      // A new edit invalidates any prior "shape bass" explanation, unless it's the
      // applyBassStyle call itself (which sets the flag again immediately after).
      state.studyBassApplied = false;
      state.studyBassExpl = null;
    },
    _cleanProgSelection() {
      if (!Array.isArray(state.progChords)) state.progChords = [];
      if (state.editingIdx >= state.progChords.length) state.editingIdx = Math.max(0, state.progChords.length - 1);
      if (!Number.isInteger(state.suggestInsertIdx) || state.suggestInsertIdx < 0 || state.suggestInsertIdx >= state.progChords.length) state.suggestInsertIdx = null;
    },
    selectProgressionChord(i) {
      state.editingIdx = i;
      state.suggestInsertIdx = i;
      render();
    },
    selectProgSlot(i) {
      state.suggestInsertIdx = state.suggestInsertIdx === i ? null : i;
      state.editingIdx = i;
      state.suggestFlashIdx = null;
      toast(state.suggestInsertIdx === null ? "New chords will add to the end" : `New chords will insert after ${chordSymbol(state.progChords[i])}`);
      render();
    },
    moveProgChord(from, to) {
      if (!Array.isArray(state.progChords)) return;
      from = Number(from); to = Number(to);
      if (!Number.isInteger(from) || !Number.isInteger(to) || from === to || from < 0 || to < 0 || from >= state.progChords.length || to >= state.progChords.length) return;
      app._rememberProgression();
      const arr = state.progChords.slice();
      const [moved] = arr.splice(from, 1);
      arr.splice(to, 0, moved);
      state.progChords = arr;
      const mapIndex = (idx) => {
        if (idx === null || idx === undefined) return null;
        if (idx === from) return to;
        if (from < to && idx > from && idx <= to) return idx - 1;
        if (from > to && idx >= to && idx < from) return idx + 1;
        return idx;
      };
      state.editingIdx = mapIndex(state.editingIdx);
      state.suggestInsertIdx = mapIndex(state.suggestInsertIdx);
      state.suggestFlashIdx = state.editingIdx;
      toast(`Moved ${chordSymbol(moved)}`);
      render();
    },
    moveChordLeft(i) { if (i > 0) app.moveProgChord(i, i - 1); },
    moveChordRight(i) { if (state.progChords && i < state.progChords.length - 1) app.moveProgChord(i, i + 1); },
    dragChordStart(ev, idx) {
      try { ev.stopPropagation(); state.dragFromIdx = idx; ev.dataTransfer.effectAllowed = "move"; ev.dataTransfer.setData("text/plain", String(idx)); } catch (e) {}
    },
    dragChordOver(ev, idx) { ev.preventDefault(); try { ev.dataTransfer.dropEffect = "move"; } catch (e) {} },
    dropChord(ev, idx) {
      ev.preventDefault(); ev.stopPropagation();
      let from = state.dragFromIdx;
      try { const raw = ev.dataTransfer.getData("text/plain"); if (raw !== "") from = Number(raw); } catch (e) {}
      state.dragFromIdx = null;
      app.moveProgChord(from, idx);
    },
    dropChordToEnd(ev) {
      ev.preventDefault();
      if (!state.progChords || !state.progChords.length) return;
      let from = state.dragFromIdx;
      try { const raw = ev.dataTransfer.getData("text/plain"); if (raw !== "") from = Number(raw); } catch (e) {}
      state.dragFromIdx = null;
      app.moveProgChord(from, state.progChords.length - 1);
    },
    dragChordEnd(ev) { state.dragFromIdx = null; document.querySelectorAll(".drop-over").forEach(el => el.classList.remove("drop-over")); },
    pointerChordStart(ev, idx) {
      if (ev.pointerType === "mouse" && ev.button !== 0) return;
      ev.preventDefault(); ev.stopPropagation();
      state.pointerDrag = { from: idx, startX: ev.clientX, startY: ev.clientY, active: false, over: idx };
      state.dragFromIdx = idx;
      try { ev.currentTarget.setPointerCapture(ev.pointerId); ev.currentTarget.classList.add("grabbing"); } catch (e) {}
    },
    pointerChordMove(ev) {
      const d = state.pointerDrag;
      if (!d) return;
      const dx = ev.clientX - d.startX, dy = ev.clientY - d.startY;
      if (!d.active && Math.hypot(dx, dy) > 6) d.active = true;
      if (!d.active) return;
      ev.preventDefault();
      document.querySelectorAll(".drop-over").forEach(el => el.classList.remove("drop-over"));
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const target = el && el.closest ? el.closest("[data-prog-index]") : null;
      if (target) { target.classList.add("drop-over"); d.over = Number(target.dataset.progIndex); }
    },
    pointerChordEnd(ev) {
      const d = state.pointerDrag;
      document.querySelectorAll(".drop-over").forEach(el => el.classList.remove("drop-over"));
      try { ev.currentTarget.classList.remove("grabbing"); ev.currentTarget.releasePointerCapture(ev.pointerId); } catch (e) {}
      state.pointerDrag = null;
      state.dragFromIdx = null;
      if (d && d.active && Number.isInteger(d.over)) app.moveProgChord(d.from, d.over);
    },
    appendChordToProg(enc) {
      try {
        const chords = JSON.parse(decodeURIComponent(enc));
        if (!Array.isArray(chords) || !chords.length) return;
        if (!Array.isArray(state.progChords)) state.progChords = [];
        if (state.progChords.length + chords.length > 8) { toast("Progression limit is 8 chords"); return; }
        app._rememberProgression();
        const insertAt = Number.isInteger(state.suggestInsertIdx) && state.progChords[state.suggestInsertIdx] ? state.suggestInsertIdx + 1 : state.progChords.length;
        const beforeLabel = insertAt > 0 && state.progChords[insertAt - 1] ? chordSymbol(state.progChords[insertAt - 1]) : null;
        const arr = state.progChords.slice();
        arr.splice(insertAt, 0, ...chords);
        state.progChords = arr;
        state.editingIdx = insertAt + chords.length - 1;
        state.suggestInsertIdx = state.editingIdx;
        state.suggestFlashIdx = state.editingIdx;
        const names = chords.map(chordSymbol).join(" → ");
        toast(beforeLabel ? `Inserted ${names} after ${beforeLabel}` : `Added ${names}`);
        render();
      } catch (e) {}
    },
    loadSuggestedHere(enc) {
      try {
        const chords = JSON.parse(decodeURIComponent(enc));
        app._rememberProgression();
        state.progChords = chords.slice(0, 8);
        state.editingIdx = 0;
        state.suggestInsertIdx = null;
        state.suggestFlashIdx = state.progChords.length - 1;
        toast("Current progression updated");
        render();
      } catch (e) {}
    },
    loadSuggested(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); app._rememberProgression(); state.progChords = chords.slice(0, 8); state.editingIdx = 0; state.suggestInsertIdx = null; state.suggestFlashIdx = null; state.mode = "progression"; toast("Loaded into full study view"); render(); } catch (e) {} },
    playSuggested(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); audio.playProgression(chords, false); } catch (e) {} },
    playCurrentProgressionOnce() { if (state.progChords && state.progChords.length) audio.playProgression(state.progChords, false); },
    undoSuggest() { if (!state.suggestUndo) return; state.progChords = state.suggestUndo.chords || []; state.editingIdx = state.suggestUndo.editingIdx || 0; state.suggestInsertIdx = Number.isInteger(state.suggestUndo.insertIdx) ? state.suggestUndo.insertIdx : null; app._cleanProgSelection(); state.suggestUndo = null; state.suggestFlashIdx = null; toast("Undone"); render(); },
    clearProgression() { app._rememberProgression(); state.progChords = []; state.editingIdx = 0; state.suggestInsertIdx = null; state.suggestFlashIdx = null; state.progMapMode = "combined"; audio.stopProgression(); toast("Current progression cleared"); render(); },
    // Trainer
    newTrainerTarget() {
      const strings = getOpenStrings();
      const { displayFrets } = current();
      const pool = new Set();
      strings.forEach(open => displayFrets.forEach(f => pool.add(noteAtFret(open, f))));
      const arr = [...pool];
      state.trainerTarget = arr[Math.floor(Math.random() * arr.length)];
      state.trainerFound = [];
      state.trainerStart = Date.now();
      state.trainerTime = null;
      render();
    },
    trainerGuess(string, fret, note) {
      if (!state.trainerTarget) return;
      if (note === state.trainerTarget) {
        const key = string + ":" + fret;
        if (!state.trainerFound.includes(key)) {
          state.trainerFound.push(key);
          audio.playNote(note);
          // Check completion
          const strings = getOpenStrings();
          const { displayFrets } = current();
          let total = 0;
          strings.forEach((open, si) => displayFrets.forEach(f => { if (noteAtFret(open, f) === state.trainerTarget) total++; }));
          if (state.trainerFound.length >= total) state.trainerTime = ((Date.now() - state.trainerStart) / 1000).toFixed(1);
        }
      } else {
        toast(`That's ${spell(note)} — keep looking`);
      }
      render();
    },
    // Tuner
    playTunerNote(note, i) { audio.playAt(i, 0); },
    addChord() { if (state.progChords.length < 8) { app._rememberProgression(); state.progChords.push({ key: "C", type: "maj" }); state.editingIdx = state.progChords.length - 1; state.suggestInsertIdx = state.editingIdx; render(); } },
    removeChord(i) {
      app._rememberProgression();
      state.progChords = state.progChords.filter((_, idx) => idx !== i);
      state.editingIdx = Math.max(0, Math.min(state.editingIdx >= i ? state.editingIdx - 1 : state.editingIdx, state.progChords.length - 1));
      if (state.suggestInsertIdx === i) state.suggestInsertIdx = null;
      else if (state.suggestInsertIdx > i) state.suggestInsertIdx -= 1;
      state.suggestFlashIdx = null;
      if (!state.progChords.length) state.progMapMode = "combined";
      toast("Chord removed");
      render();
    },
    setProgChord(i, field, value) { state.progChords = state.progChords.map((c, idx) => idx === i ? { ...c, [field]: value } : c); render(); },
    setProgChordBass(idx, bass) {
      if (state.progChords[idx]) {
        state.progChords[idx] = { ...state.progChords[idx], bass: bass || undefined };
        render();
      }
    },
    setSelectedBass(bass) { state.selectedBass = bass || null; render(); },
    applyPreset(i) {
      const prog = PROGRESSION_LIBRARY[state.activeGenre][i];
      const ri = CHROMATIC.indexOf(state.selectedKey);
      app._rememberProgression();
      state.progChords = prog.semis.map((s, idx) => ({ key: CHROMATIC[(ri + s) % 12], type: prog.types[idx] || "maj" })).slice(0, 8);
      state.editingIdx = 0; state.suggestInsertIdx = null; state.progLibOpen = false; render();
    },
    intervalClick(si, fret, note) {
      if (state.itStep === 1) { state.itNote1 = note; state.itStr1 = si; state.itFret1 = fret; state.itNote2 = null; state.itStr2 = null; state.itFret2 = null; state.itStep = 2; audio.playNote(note); }
      else if (state.itStep === 2) { if (si === state.itStr1 && fret === state.itFret1) { app.resetInterval(); return; } state.itNote2 = note; state.itStr2 = si; state.itFret2 = fret; state.itStep = 3; audio.playInterval(state.itNote1, note); }
      else { state.itNote1 = note; state.itStr1 = si; state.itFret1 = fret; state.itNote2 = null; state.itStr2 = null; state.itFret2 = null; state.itStep = 2; audio.playNote(note); }
      render();
    },
    resetInterval() { state.itStep = 1; state.itNote1 = null; state.itNote2 = null; state.itStr1 = null; state.itFret1 = null; state.itStr2 = null; state.itFret2 = null; render(); },
    playCurrentInterval() { if (state.itNote1 && state.itNote2) audio.playInterval(state.itNote1, state.itNote2); },
    setInstrument(name) {
      state.instrument = name;
      const inst = INSTRUMENTS[name];
      const firstTuning = Object.keys(inst.tunings)[0];
      const t = inst.tunings[firstTuning];
      state.tuningName = firstTuning;
      state.openStrings = [...t.strings];
      state.openOctaves = t.octaves ? [...t.octaves] : null;
      state.customTuningText = state.openStrings.join(" ");
      render();
    },
    setTuning(name) {
      state.tuningName = name;
      const inst = INSTRUMENTS[state.instrument];
      const t = inst.tunings[name];
      if (t && name !== "CUSTOM") { state.openStrings = [...t.strings]; state.openOctaves = t.octaves ? [...t.octaves] : null; state.customTuningText = state.openStrings.join(" "); }
      render();
    },
    setCustomTuningText(value) { state.customTuningText = value; },
    applyCustomTuning() {
      const parts = String(state.customTuningText).toUpperCase().replace(/♯/g,"#").replace(/♭/g,"B").split(/[\s,\/]+/).filter(Boolean);
      const notes = parts.map(p => p.replace("DB","C#").replace("EB","D#").replace("GB","F#").replace("AB","G#").replace("BB","A#"));
      if (notes.length < 4 || notes.length > 6 || !notes.every(n => CHROMATIC.includes(n))) { alert("Enter 4 to 6 notes, low to high — for example: C G D A or E A D G B E"); return; }
      state.instrument = "custom"; state.tuningName = "CUSTOM"; state.openStrings = notes; state.openOctaves = null; state.customTuningText = notes.join(" "); render();
    },
    setSavedName(v) { state.savedName = v; },
    saveCurrentChart() {
      const chartMode = effectiveChartType();
      const name = (state.savedName || "").trim() || (chartMode === "scale"
        ? `${spell(state.scalesKey)} ${(SCALES[state.scalesType] || SCALES.major).label}`
        : chartMode === "progression"
        ? `Progression ${state.progChords.map(chordSymbol).join("-")}`
        : chordSymbol({ key: state.selectedKey, type: state.selectedType, bass: state.selectedBass }));
      const summary = chartMode === "scale"
        ? `Scale chart · ${spell(state.scalesKey)} ${(SCALES[state.scalesType] || SCALES.major).label}`
        : chartMode === "progression"
        ? state.progChords.map(chordSymbol).join(" / ")
        : `${chordSymbol({ key: state.selectedKey, type: state.selectedType, bass: state.selectedBass })} · ${getOpenStrings().join("")}`;
      state.savedCharts.unshift({ name, summary, created: Date.now(), data: serializeState() });
      state.savedCharts = state.savedCharts.slice(0, 30);
      state.savedName = ""; persistSavedCharts(); toast("Chart saved"); render();
    },
    loadSavedChart(i) { const item = state.savedCharts[i]; if (item) { applySerializedState(item.data); toast("Chart loaded"); render(); } },
    deleteSavedChart(i) { state.savedCharts.splice(i,1); persistSavedCharts(); render(); },
    // Finder
    addFinderChord() { if (state.finderChords.length < 8) { state.finderChords.push({ key: "C", type: "maj" }); state.finderEditIdx = state.finderChords.length - 1; render(); } },
    removeFinderChord(i) { state.finderChords = state.finderChords.filter((_, idx) => idx !== i); state.finderEditIdx = Math.max(0, Math.min(state.finderEditIdx, state.finderChords.length - 1)); render(); },
    setFinderChord(field, value) { const i = state.finderEditIdx; state.finderChords = state.finderChords.map((c, idx) => idx === i ? { ...c, [field]: value } : c); render(); },
    useKeyForScale(root, mode) { state.scaleKey = root; state.scaleType = mode === "major" ? "major" : "minor"; state.selectedKey = root; state.mode = "single"; state.showScalePanel = false; toast(`Showing ${root} ${mode}`); render(); },
    // Quiz / Ear
    newQuizQuestion() { newQuizQuestion(); render(); },
    answerQuiz(choice) { const correct = state.quizQuestion && choice === state.quizQuestion.answer; state.quizAnswer = { correct }; if (correct) { state.quizScore++; state.quizStreak++; } else { state.quizStreak = 0; } render(); },
    newEarQuestion() { newEarQuestion(); render(); },
    playEarQuestion() { if (!state.earQuestion) newEarQuestion(); const q = state.earQuestion; audio.playChord(buildTones(q.root, CHORD_TYPES[q.type].intervals), true); },
    answerEar(type) { const correct = state.earQuestion && type === state.earQuestion.type; state.earAnswer = { correct }; if (correct) state.earScore++; render(); },
    savePNG, sharePNG, copyStateLink, printChart, downloadSVG
  };

  window.app = app;
  audio.installUnlockHandlers();
  render();

  // ── PWA support (installable + offline), kept fully self-contained ──────────────
  // The manifest is generated in-page as a blob so the app stays a single file.
  (function installPWA() {
    try {
      const manifest = {
        name: "Open Strings",
        short_name: "Open Strings",
        description: "A theory & practice studio for stringed instruments",
        start_url: ".",
        display: "standalone",
        background_color: "#0c0c0c",
        theme_color: "#0c0c0c",
        icons: [{
          // A simple inline SVG icon (data URI) so no separate image file is needed.
          src: "data:image/svg+xml," + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" fill="#0c0c0c"/>' +
            '<g stroke="#e8c547" stroke-width="10">' +
            '<line x1="96" y1="140" x2="416" y2="140"/><line x1="96" y1="220" x2="416" y2="220"/>' +
            '<line x1="96" y1="300" x2="416" y2="300"/><line x1="96" y1="380" x2="416" y2="380"/></g>' +
            '<g fill="#e8c547"><circle cx="200" cy="140" r="22"/><circle cx="300" cy="220" r="22"/>' +
            '<circle cx="160" cy="300" r="22"/><circle cx="340" cy="380" r="22"/></g></svg>'
          ),
          sizes: "512x512",
          type: "image/svg+xml",
          purpose: "any"
        }]
      };
      const mBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      const mLink = document.createElement("link");
      mLink.rel = "manifest";
      mLink.href = URL.createObjectURL(mBlob);
      document.head.appendChild(mLink);

      // A minimal service worker that caches the page itself for offline use.
      // Written inline and registered from a blob URL so there is still only one file to host.
      if ("serviceWorker" in navigator) {
        const swCode = `
          const CACHE = "open-strings-v1";
          self.addEventListener("install", e => { self.skipWaiting(); });
          self.addEventListener("activate", e => { e.waitUntil(self.clients.claim()); });
          self.addEventListener("fetch", e => {
            if (e.request.method !== "GET") return;
            e.respondWith(
              caches.open(CACHE).then(cache =>
                cache.match(e.request).then(hit =>
                  hit || fetch(e.request).then(res => {
                    try { if (res && res.status === 200 && e.request.url.startsWith(self.location.origin)) cache.put(e.request, res.clone()); } catch (x) {}
                    return res;
                  }).catch(() => hit)
                )
              )
            );
          });
        `;
        const swBlob = new Blob([swCode], { type: "text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        // Note: blob-based SW scope is limited, but this still enables install + same-page offline
        // when the file is hosted normally (e.g. GitHub Pages). It silently no-ops if blocked.
        navigator.serviceWorker.register(swURL).catch(() => {});
      }
    } catch (e) { /* PWA is a progressive enhancement; ignore failures */ }
  })();
  
</script>
