    // Fretboard and Practice are dropdowns (they hold sub-tools) and now display the
    // active sub-tool's name so you always know where you are.
    const fretModes = [["single","Chord Tones"],["scales","Scales"],["interval","Intervals"],["identify","Find Chord"],["finder","Find Key"],["modes","Modes"]];
    const practiceModes = [["metronome","Metronome"],["tuner","Tuner"],["trainer","Fretboard Trainer"],["ear","Ear Training"],["quiz","Quiz"]];
    const fretActiveLabel = (fretModes.find(([m]) => m === state.mode) || [])[1];
    const practiceActiveLabel = (practiceModes.find(([m]) => m === state.mode) || [])[1];
    const fretOptions = `<option value="">${currentSection==="fretboard" && fretActiveLabel ? esc("Fretboard — "+fretActiveLabel) : "Fretboard ▾"}</option>` + fretModes.map(([m,l]) => `<option value="${m}" ${state.mode===m?"selected":""}>${esc(l)}</option>`).join("");
    const practiceOptions = `<option value="">${currentSection==="practice" && practiceActiveLabel ? esc("Practice — "+practiceActiveLabel) : "Practice ▾"}</option>` + practiceModes.map(([m,l]) => `<option value="${m}" ${state.mode===m?"selected":""}>${esc(l)}</option>`).join("");

    const primaryNav =
      `<button type="button" class="tab ${currentSection==="studio"?"active":""}" onclick="app.setMode('suggest')">Studio</button>` +
      `<button type="button" class="tab ${currentSection==="study"?"active":""}" onclick="app.setMode('progression')">Study</button>` +
      `<button type="button" class="tab ${currentSection==="charts"?"active":""}" onclick="app.setMode('charts')">Charts</button>`;

    const setupSummary = `${esc(instrumentLabel())} · ${esc(getOpenStrings().map(spell).join(" "))}${state.capo>0?` · Capo ${state.capo}`:""}`;

    document.getElementById("app").innerHTML = `<div class="wrap">
      <div class="header"><div class="eyebrow">${setupSummary}</div><h1>Open Strings</h1><div class="tagline">Songwriting, fretboard theory, practice, and printable charts</div></div>
      <div class="toolbar primary-bar">
        <div class="segmented app-nav" role="tablist">${primaryNav}</div>
        <select class="util-btn nav-select ${currentSection==="fretboard"?"active-more":""}" onchange="if(this.value)app.setMode(this.value)" aria-label="Fretboard tools">${fretOptions}</select>
        <select class="util-btn nav-select ${currentSection==="practice"?"active-more":""}" onchange="if(this.value)app.setMode(this.value)" aria-label="Practice tools">${practiceOptions}</select>
      </div>
      <div class="toolbar utility-bar">
        <button type="button" class="util-btn ${state.showSetup?"util-on":""}" onclick="app.toggle('showSetup')" title="Instrument, tuning, capo">⚙ Setup</button>
        <button type="button" class="util-btn ${state.showPrefs?"util-on":""}" onclick="app.toggle('showPrefs')">${state.showPrefs?"Close preferences":"Preferences"}</button>
        <button type="button" class="util-btn ${state.showHelp?"util-on":""}" onclick="app.toggle('showHelp')">${state.showHelp?"Close help":"Help"}</button>
      </div>
      ${state.showSetup ? renderSetupPanel() : ""}
      ${state.showHelp ? renderHelp() : ""}
      ${state.showPrefs ? renderPreferences() : ""}
      ${content}
      <div class="footer">Open Strings · single-file offline app · works on GitHub Pages<br>${esc(getOpenStrings().map(spell).join(" "))} · ${esc(tuningLabel())}</div>
    </div>`;

    // Preserve horizontal scroll position of fretboards across re-renders, so tapping a
    // high-fret note (e.g. in the Chord Identifier) doesn't snap the neck back to fret 0.
    const target = document.getElementById("app");
    if (render._scrollLeft != null) {
      const scroller = target.querySelector(".fret-scroll");
      if (scroller) scroller.scrollLeft = render._scrollLeft;
    }
    // Capture scroll position on any future scroll so the next render can restore it.
    const liveScroller = target.querySelector(".fret-scroll");
    if (liveScroller && !liveScroller._osBound) {
      liveScroller._osBound = true;
      liveScroller.addEventListener("scroll", () => { render._scrollLeft = liveScroller.scrollLeft; }, { passive: true });
    }
  }

  // Lightweight visual update for the metronome beat indicator, avoiding a full re-render
  // on every tick (which would be heavy and could disturb the audio scheduler).
  function updateBeatDots(beat) {
    const dots = document.querySelectorAll(".beat-dot");
    if (!dots || !dots.length) return;
    dots.forEach((d, i) => {
      const accent = d.classList.contains("accent");
      if (i === beat) {
        d.style.background = accent ? "#e8c547" : "#6dd4a8";
        d.style.boxShadow = `0 0 16px ${accent ? "#e8c547" : "#6dd4a8"}`;
      } else {
        d.style.background = "";
        d.style.boxShadow = "";
      }
    });
  }

  // ── App handlers ──
  const app = {
    set(key, value) { state[key] = value; render(); },
    toggle(key) { state[key] = !state[key]; render(); },
    toggleTheme() { state.theme = state.theme === "dark" ? "light" : "dark"; try { localStorage.setItem("os-theme", state.theme); } catch (e) {} render(); },
    setTheme(t) { state.theme = t; try { localStorage.setItem("os-theme", t); } catch (e) {} render(); },
    setMode(mode) {
      if (state.mode === "metronome" && mode !== "metronome") { audio.stopMetronome(); state.metroRunning = false; state.metroCurrentBeat = -1; }
      if (state.mode === "progression" && mode !== "progression") { audio.stopProgression(); }
      state.mode = mode; render._scrollLeft = null; render();
    },
    setSelectedKey(k) { state.selectedKey = k; state.diatonicKey = k; render(); },
    setSelectedType(k) { state.selectedType = k; render(); },
    setScaleKey(k) { state.scaleKey = k; render(); },
    setScalesKey(k) { state.scalesKey = k; state.scalesPosition = null; state.scalesHighlightChord = null; render(); },
    setScalesType(k) { state.scalesType = k; state.scalesPosition = null; state.scalesHighlightChord = null; render(); },
    setScaleChordMode(mode) { state.scalesChordMode = mode === "triad" ? "triad" : "seventh"; state.scalesHighlightChord = null; render(); },
    toggleScaleChord(i) { state.scalesHighlightChord = state.scalesHighlightChord === i ? null : i; render(); },
    playScaleRun(root, intervals) {
      // Play the scale ascending then descending, at the user's tempo, at real-ish register.
      const up = intervals.map(iv => transpose(root, iv));
      const seq = [...up, transpose(root, 12), ...up.slice().reverse()];
      const step = Math.max(0.18, (Number(state.progTempo) || 800) / 1000 * 0.4);
      let oct = 3, prevIdx = -1;
      seq.forEach((n, i) => {
        const idx = CHROMATIC.indexOf(n);
        if (i > 0 && idx <= prevIdx && i <= up.length) oct++;
        if (i > up.length && idx >= prevIdx) oct = Math.max(3, oct - (idx > prevIdx ? 1 : 0));
        prevIdx = idx;
        audio.playNote(n, i <= up.length ? 4 : 4, 0.45, i * step);
      });
    },
    setFretRange(a,b) { state.fretRange = [a,b]; render(); },
    loadDiatonic(root, type) { state.selectedKey = root; state.selectedType = type; render(); },
    setDiatonicKey(k) { state.diatonicKey = k; render(); },
    playNote(note) { audio.playNote(note); },
    playAt(stringIndex, fret) { audio.playAt(stringIndex, fret); },
    cellKey(ev, stringIndex, fret) {
      // Keyboard support for fret cells: Enter/Space plays the note.
      if (ev && (ev.key === "Enter" || ev.key === " " || ev.key === "Spacebar")) {
        ev.preventDefault();
        audio.playAt(stringIndex, fret);
      }
    },
    playVoicingFrets(frets) { if (Array.isArray(frets)) audio.playVoicingFrets(frets, true); },
    playSingleChord() { const { singleTones } = current(); audio.playChord(singleTones, true); },
    playVoicing(notes) { if (Array.isArray(notes)) audio.playChord(notes, true); },
    playChordByIndex(i) { const ch = state.progChords[i]; audio.playChord(buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []), true); },
    playProgression() { audio.playProgression(state.progChords, state.progLoop); },
    toggleLoop() { state.progLoop = !state.progLoop; if (!state.progLoop) audio.stopProgression(); render(); },
    stopAudio() { audio.stopProgression(); },
    // Metronome
    setBpm(v) { state.metroBpm = Math.max(40, Math.min(240, Math.round(Number(v)))); if (state.metroRunning) app._restartMetro(); render(); },
    nudgeBpm(d) { state.metroBpm = Math.max(40, Math.min(240, state.metroBpm + d)); if (state.metroRunning) app._restartMetro(); render(); },
    setMetroSig(s) { state.metroSig = s; if (state.metroRunning) app._restartMetro(); render(); },
    _restartMetro() {
      const sig = TIME_SIGS[state.metroSig] || TIME_SIGS["4/4"];
      audio.startMetronome(state.metroBpm, sig.beats, sig.unit, (beat) => { state.metroCurrentBeat = beat; const el = document.querySelectorAll(".beat-dot"); /* lightweight visual update */ updateBeatDots(beat); });
    },
    startMetronome() {
      state.metroRunning = true;
      state.metroCurrentBeat = -1;
      app._restartMetro();
      render();
    },
    stopMetronome() { audio.stopMetronome(); state.metroRunning = false; state.metroCurrentBeat = -1; render(); },
    toggleMetroTrainer() {
      audio.stopMetronome();
      state.metroRunning = false; state.metroCurrentBeat = -1;
      state.metroTrainer = !state.metroTrainer;
      state.metroTrainerReveal = false; state.metroTrainerSig = null;
      render();
    },
    newMetroChallenge() {
      const sigs = Object.keys(TIME_SIGS);
      state.metroTrainerSig = sigs[Math.floor(Math.random() * sigs.length)];
      state.metroTrainerReveal = false;
      state.metroRunning = true;
      state.metroCurrentBeat = -1;
      const sig = TIME_SIGS[state.metroTrainerSig];
      audio.startMetronome(state.metroBpm, sig.beats, sig.unit, (beat) => { state.metroCurrentBeat = beat; updateBeatDots(beat); });
      render();
    },
    guessMetroSig(s) {
      state.metroTrainerReveal = true;
      const correct = s === state.metroTrainerSig;
      toast(correct ? "Correct!" : `Not quite — listen again`);
      render();
    },
    // Chord identifier
    toggleIdNote(string, fret, note) {
      const i = state.idNotes.findIndex(p => p.string === string && p.fret === fret);
      if (i >= 0) state.idNotes.splice(i, 1);
      else { state.idNotes.push({ string, fret, note }); audio.playNote(note); }
      render();
    },
    clearIdNotes() { state.idNotes = []; render(); },
    playIdentified(root, key) { audio.playChord(buildTones(root, CHORD_TYPES[key].intervals), true); },
    // Modes
    setModeParentKey(k) { state.modeParentKey = k; render(); },
    playScale(root, intervals) { intervals.forEach((iv, i) => audio.playNote(transpose(root, iv), 4, 0.5, i * 0.18)); },
    // Suggester
    setSuggestKey(k) { state.suggestKey = k; state.suggestIdeaOffset = 0; state.suggestShowAllIdeas = false; render(); },
    setSuggestMood(k) { state.suggestMood = k; state.suggestIdeaOffset = 0; state.suggestShowAllIdeas = false; state.suggestRandom = null; render(); },
    setSuggestFilter(k) { state.suggestFilter = k; state.suggestIdeaOffset = 0; state.suggestShowAllIdeas = false; render(); },
    refreshIdeas() { const mood = SUGGEST_MOODS[state.suggestMood]; const total = mood && mood.progs ? mood.progs.length : 1; state.suggestIdeaOffset = ((state.suggestIdeaOffset || 0) + 3) % Math.max(total, 1); state.suggestShowAllIdeas = false; render(); },
    surpriseSuggestion() {
      const mood = SUGGEST_MOODS[state.suggestMood];
      if (!mood || !mood.progs || !mood.progs.length) return;
      const prog = mood.progs[Math.floor(Math.random() * mood.progs.length)];
      const chords = prog.map(r => romanToChord(r, state.suggestKey));
      app._rememberProgression();
      state.progChords = chords.slice(0, 8);
      state.editingIdx = 0;
      state.suggestInsertIdx = null;
      state.suggestFlashIdx = state.progChords.length - 1;
      toast("Surprise progression loaded");
      audio.playProgression(state.progChords, false);
      render();
    },
    generateRandomProg() { state.suggestRandom = randomProgression(state.suggestRandomLen); render(); },
    _rememberProgression() {
      state.suggestUndo = { chords: (state.progChords || []).map(c => ({...c})), editingIdx: state.editingIdx, insertIdx: state.suggestInsertIdx };
    },
    _cleanProgSelection() {
      if (!Array.isArray(state.progChords)) state.progChords = [];
      if (state.editingIdx >= state.progChords.length) state.editingIdx = Math.max(0, state.progChords.length - 1);
      if (!Number.isInteger(state.suggestInsertIdx) || state.suggestInsertIdx < 0 || state.suggestInsertIdx >= state.progChords.length) state.suggestInsertIdx = null;
    },
    selectProgressionChord(i) {
      state.editingIdx = i;
      state.suggestInsertIdx = i;
      render();
    },
    selectProgSlot(i) {
      state.suggestInsertIdx = state.suggestInsertIdx === i ? null : i;
      state.editingIdx = i;
      state.suggestFlashIdx = null;
      toast(state.suggestInsertIdx === null ? "New chords will add to the end" : `New chords will insert after ${chordSymbol(state.progChords[i])}`);
      render();
    },
    moveProgChord(from, to) {
      if (!Array.isArray(state.progChords)) return;
      from = Number(from); to = Number(to);
      if (!Number.isInteger(from) || !Number.isInteger(to) || from === to || from < 0 || to < 0 || from >= state.progChords.length || to >= state.progChords.length) return;
      app._rememberProgression();
      const arr = state.progChords.slice();
      const [moved] = arr.splice(from, 1);
      arr.splice(to, 0, moved);
      state.progChords = arr;
      const mapIndex = (idx) => {
        if (idx === null || idx === undefined) return null;
        if (idx === from) return to;
        if (from < to && idx > from && idx <= to) return idx - 1;
        if (from > to && idx >= to && idx < from) return idx + 1;
        return idx;
      };
      state.editingIdx = mapIndex(state.editingIdx);
      state.suggestInsertIdx = mapIndex(state.suggestInsertIdx);
      state.suggestFlashIdx = state.editingIdx;
      toast(`Moved ${chordSymbol(moved)}`);
      render();
    },
    moveChordLeft(i) { if (i > 0) app.moveProgChord(i, i - 1); },
    moveChordRight(i) { if (state.progChords && i < state.progChords.length - 1) app.moveProgChord(i, i + 1); },
    dragChordStart(ev, idx) {
      try { ev.stopPropagation(); state.dragFromIdx = idx; ev.dataTransfer.effectAllowed = "move"; ev.dataTransfer.setData("text/plain", String(idx)); } catch (e) {}
    },
    dragChordOver(ev, idx) { ev.preventDefault(); try { ev.dataTransfer.dropEffect = "move"; } catch (e) {} },
    dropChord(ev, idx) {
      ev.preventDefault(); ev.stopPropagation();
      let from = state.dragFromIdx;
      try { const raw = ev.dataTransfer.getData("text/plain"); if (raw !== "") from = Number(raw); } catch (e) {}
      state.dragFromIdx = null;
      app.moveProgChord(from, idx);
    },
    dropChordToEnd(ev) {
      ev.preventDefault();
      if (!state.progChords || !state.progChords.length) return;
      let from = state.dragFromIdx;
      try { const raw = ev.dataTransfer.getData("text/plain"); if (raw !== "") from = Number(raw); } catch (e) {}
      state.dragFromIdx = null;
      app.moveProgChord(from, state.progChords.length - 1);
    },
    dragChordEnd(ev) { state.dragFromIdx = null; document.querySelectorAll(".drop-over").forEach(el => el.classList.remove("drop-over")); },
    pointerChordStart(ev, idx) {
      if (ev.pointerType === "mouse" && ev.button !== 0) return;
      ev.preventDefault(); ev.stopPropagation();
      state.pointerDrag = { from: idx, startX: ev.clientX, startY: ev.clientY, active: false, over: idx };
      state.dragFromIdx = idx;
      try { ev.currentTarget.setPointerCapture(ev.pointerId); ev.currentTarget.classList.add("grabbing"); } catch (e) {}
    },
    pointerChordMove(ev) {
      const d = state.pointerDrag;
      if (!d) return;
      const dx = ev.clientX - d.startX, dy = ev.clientY - d.startY;
      if (!d.active && Math.hypot(dx, dy) > 6) d.active = true;
      if (!d.active) return;
      ev.preventDefault();
      document.querySelectorAll(".drop-over").forEach(el => el.classList.remove("drop-over"));
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const target = el && el.closest ? el.closest("[data-prog-index]") : null;
      if (target) { target.classList.add("drop-over"); d.over = Number(target.dataset.progIndex); }
    },
    pointerChordEnd(ev) {
      const d = state.pointerDrag;
      document.querySelectorAll(".drop-over").forEach(el => el.classList.remove("drop-over"));
      try { ev.currentTarget.classList.remove("grabbing"); ev.currentTarget.releasePointerCapture(ev.pointerId); } catch (e) {}
      state.pointerDrag = null;
      state.dragFromIdx = null;
      if (d && d.active && Number.isInteger(d.over)) app.moveProgChord(d.from, d.over);
    },
    appendChordToProg(enc) {
      try {
        const chords = JSON.parse(decodeURIComponent(enc));
        if (!Array.isArray(chords) || !chords.length) return;
        if (!Array.isArray(state.progChords)) state.progChords = [];
        if (state.progChords.length + chords.length > 8) { toast("Progression limit is 8 chords"); return; }
        app._rememberProgression();
        const insertAt = Number.isInteger(state.suggestInsertIdx) && state.progChords[state.suggestInsertIdx] ? state.suggestInsertIdx + 1 : state.progChords.length;
        const beforeLabel = insertAt > 0 && state.progChords[insertAt - 1] ? chordSymbol(state.progChords[insertAt - 1]) : null;
        const arr = state.progChords.slice();
        arr.splice(insertAt, 0, ...chords);
        state.progChords = arr;
        state.editingIdx = insertAt + chords.length - 1;
        state.suggestInsertIdx = state.editingIdx;
        state.suggestFlashIdx = state.editingIdx;
        const names = chords.map(chordSymbol).join(" → ");
        toast(beforeLabel ? `Inserted ${names} after ${beforeLabel}` : `Added ${names}`);
        render();
      } catch (e) {}
    },
    loadSuggestedHere(enc) {
      try {
        const chords = JSON.parse(decodeURIComponent(enc));
        app._rememberProgression();
        state.progChords = chords.slice(0, 8);
        state.editingIdx = 0;
        state.suggestInsertIdx = null;
        state.suggestFlashIdx = state.progChords.length - 1;
        toast("Current progression updated");
        render();
      } catch (e) {}
    },
    loadSuggested(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); app._rememberProgression(); state.progChords = chords.slice(0, 8); state.editingIdx = 0; state.suggestInsertIdx = null; state.suggestFlashIdx = null; state.mode = "progression"; toast("Loaded into full study view"); render(); } catch (e) {} },
    playSuggested(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); audio.playProgression(chords, false); } catch (e) {} },
    playCurrentProgressionOnce() { if (state.progChords && state.progChords.length) audio.playProgression(state.progChords, false); },
    undoSuggest() { if (!state.suggestUndo) return; state.progChords = state.suggestUndo.chords || []; state.editingIdx = state.suggestUndo.editingIdx || 0; state.suggestInsertIdx = Number.isInteger(state.suggestUndo.insertIdx) ? state.suggestUndo.insertIdx : null; app._cleanProgSelection(); state.suggestUndo = null; state.suggestFlashIdx = null; toast("Undone"); render(); },
    clearProgression() { app._rememberProgression(); state.progChords = []; state.editingIdx = 0; state.suggestInsertIdx = null; state.suggestFlashIdx = null; state.progMapMode = "combined"; audio.stopProgression(); toast("Current progression cleared"); render(); },
    // Trainer
    newTrainerTarget() {
      const strings = getOpenStrings();
      const { displayFrets } = current();
      const pool = new Set();
      strings.forEach(open => displayFrets.forEach(f => pool.add(noteAtFret(open, f))));
      const arr = [...pool];
      state.trainerTarget = arr[Math.floor(Math.random() * arr.length)];
      state.trainerFound = [];
      state.trainerStart = Date.now();
      state.trainerTime = null;
      render();
    },
    trainerGuess(string, fret, note) {
      if (!state.trainerTarget) return;
      if (note === state.trainerTarget) {
        const key = string + ":" + fret;
        if (!state.trainerFound.includes(key)) {
          state.trainerFound.push(key);
          audio.playNote(note);
          // Check completion
          const strings = getOpenStrings();
          const { displayFrets } = current();
          let total = 0;
          strings.forEach((open, si) => displayFrets.forEach(f => { if (noteAtFret(open, f) === state.trainerTarget) total++; }));
          if (state.trainerFound.length >= total) state.trainerTime = ((Date.now() - state.trainerStart) / 1000).toFixed(1);
        }
      } else {
        toast(`That's ${spell(note)} — keep looking`);
      }
      render();
    },
    // Tuner
    playTunerNote(note, i) { audio.playAt(i, 0); },
    addChord() { if (state.progChords.length < 8) { app._rememberProgression(); state.progChords.push({ key: "C", type: "maj" }); state.editingIdx = state.progChords.length - 1; state.suggestInsertIdx = state.editingIdx; render(); } },
    removeChord(i) {
      app._rememberProgression();
      state.progChords = state.progChords.filter((_, idx) => idx !== i);
      state.editingIdx = Math.max(0, Math.min(state.editingIdx >= i ? state.editingIdx - 1 : state.editingIdx, state.progChords.length - 1));
      if (state.suggestInsertIdx === i) state.suggestInsertIdx = null;
      else if (state.suggestInsertIdx > i) state.suggestInsertIdx -= 1;
      state.suggestFlashIdx = null;
      if (!state.progChords.length) state.progMapMode = "combined";
      toast("Chord removed");
      render();
    },
    setProgChord(i, field, value) { state.progChords = state.progChords.map((c, idx) => idx === i ? { ...c, [field]: value } : c); render(); },
    applyPreset(i) {
      const prog = PROGRESSION_LIBRARY[state.activeGenre][i];
      const ri = CHROMATIC.indexOf(state.selectedKey);
      app._rememberProgression();
      state.progChords = prog.semis.map((s, idx) => ({ key: CHROMATIC[(ri + s) % 12], type: prog.types[idx] || "maj" })).slice(0, 8);
      state.editingIdx = 0; state.suggestInsertIdx = null; state.progLibOpen = false; render();
    },
    intervalClick(si, fret, note) {
      if (state.itStep === 1) { state.itNote1 = note; state.itStr1 = si; state.itFret1 = fret; state.itNote2 = null; state.itStr2 = null; state.itFret2 = null; state.itStep = 2; audio.playNote(note); }
      else if (state.itStep === 2) { if (si === state.itStr1 && fret === state.itFret1) { app.resetInterval(); return; } state.itNote2 = note; state.itStr2 = si; state.itFret2 = fret; state.itStep = 3; audio.playInterval(state.itNote1, note); }
      else { state.itNote1 = note; state.itStr1 = si; state.itFret1 = fret; state.itNote2 = null; state.itStr2 = null; state.itFret2 = null; state.itStep = 2; audio.playNote(note); }
      render();
    },
    resetInterval() { state.itStep = 1; state.itNote1 = null; state.itNote2 = null; state.itStr1 = null; state.itFret1 = null; state.itStr2 = null; state.itFret2 = null; render(); },
    playCurrentInterval() { if (state.itNote1 && state.itNote2) audio.playInterval(state.itNote1, state.itNote2); },
    setInstrument(name) {
      state.instrument = name;
      const inst = INSTRUMENTS[name];
      const firstTuning = Object.keys(inst.tunings)[0];
      const t = inst.tunings[firstTuning];
      state.tuningName = firstTuning;
      state.openStrings = [...t.strings];
      state.openOctaves = t.octaves ? [...t.octaves] : null;
      state.customTuningText = state.openStrings.join(" ");
      render();
    },
    setTuning(name) {
      state.tuningName = name;
      const inst = INSTRUMENTS[state.instrument];
      const t = inst.tunings[name];
      if (t && name !== "CUSTOM") { state.openStrings = [...t.strings]; state.openOctaves = t.octaves ? [...t.octaves] : null; state.customTuningText = state.openStrings.join(" "); }
      render();
    },
    setCustomTuningText(value) { state.customTuningText = value; },
    applyCustomTuning() {
      const parts = String(state.customTuningText).toUpperCase().replace(/♯/g,"#").replace(/♭/g,"B").split(/[\s,\/]+/).filter(Boolean);
      const notes = parts.map(p => p.replace("DB","C#").replace("EB","D#").replace("GB","F#").replace("AB","G#").replace("BB","A#"));
      if (notes.length < 4 || notes.length > 6 || !notes.every(n => CHROMATIC.includes(n))) { alert("Enter 4 to 6 notes, low to high — for example: C G D A or E A D G B E"); return; }
      state.instrument = "custom"; state.tuningName = "CUSTOM"; state.openStrings = notes; state.openOctaves = null; state.customTuningText = notes.join(" "); render();
    },
    setSavedName(v) { state.savedName = v; },
    saveCurrentChart() {
      const name = (state.savedName || "").trim() || (state.mode === "progression" ? `Progression ${state.progChords.map(c => c.key).join("-")}` : `${state.selectedKey} ${CHORD_TYPES[state.selectedType]?.label}`);
      const summary = state.mode === "progression" ? state.progChords.map(c => `${c.key} ${CHORD_TYPES[c.type]?.label}`).join(" / ") : `${state.selectedKey} ${CHORD_TYPES[state.selectedType]?.label} · ${getOpenStrings().join("")}`;
      state.savedCharts.unshift({ name, summary, created: Date.now(), data: serializeState() });
      state.savedCharts = state.savedCharts.slice(0, 30);
      state.savedName = ""; persistSavedCharts(); toast("Chart saved"); render();
    },
    loadSavedChart(i) { const item = state.savedCharts[i]; if (item) { applySerializedState(item.data); toast("Chart loaded"); render(); } },
    deleteSavedChart(i) { state.savedCharts.splice(i,1); persistSavedCharts(); render(); },
    // Finder
    addFinderChord() { if (state.finderChords.length < 8) { state.finderChords.push({ key: "C", type: "maj" }); state.finderEditIdx = state.finderChords.length - 1; render(); } },
    removeFinderChord(i) { state.finderChords = state.finderChords.filter((_, idx) => idx !== i); state.finderEditIdx = Math.max(0, Math.min(state.finderEditIdx, state.finderChords.length - 1)); render(); },
    setFinderChord(field, value) { const i = state.finderEditIdx; state.finderChords = state.finderChords.map((c, idx) => idx === i ? { ...c, [field]: value } : c); render(); },
    useKeyForScale(root, mode) { state.scaleKey = root; state.scaleType = mode === "major" ? "major" : "minor"; state.selectedKey = root; state.mode = "single"; state.showScalePanel = false; toast(`Showing ${root} ${mode}`); render(); },
    // Quiz / Ear
    newQuizQuestion() { newQuizQuestion(); render(); },
    answerQuiz(choice) { const correct = state.quizQuestion && choice === state.quizQuestion.answer; state.quizAnswer = { correct }; if (correct) { state.quizScore++; state.quizStreak++; } else { state.quizStreak = 0; } render(); },
    newEarQuestion() { newEarQuestion(); render(); },
    playEarQuestion() { if (!state.earQuestion) newEarQuestion(); const q = state.earQuestion; audio.playChord(buildTones(q.root, CHORD_TYPES[q.type].intervals), true); },
    answerEar(type) { const correct = state.earQuestion && type === state.earQuestion.type; state.earAnswer = { correct }; if (correct) state.earScore++; render(); },
    savePNG, sharePNG, copyStateLink, printChart, downloadSVG
  };

  window.app = app;
  audio.installUnlockHandlers();
  render();

  // ── PWA support (installable + offline), kept fully self-contained ──────────────
  // The manifest is generated in-page as a blob so the app stays a single file.
  (function installPWA() {
    try {
      const manifest = {
        name: "Open Strings",
        short_name: "Open Strings",
        description: "A theory & practice studio for stringed instruments",
        start_url: ".",
        display: "standalone",
        background_color: "#0c0c0c",
        theme_color: "#0c0c0c",
        icons: [{
          // A simple inline SVG icon (data URI) so no separate image file is needed.
          src: "data:image/svg+xml," + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" fill="#0c0c0c"/>' +
            '<g stroke="#e8c547" stroke-width="10">' +
            '<line x1="96" y1="140" x2="416" y2="140"/><line x1="96" y1="220" x2="416" y2="220"/>' +
            '<line x1="96" y1="300" x2="416" y2="300"/><line x1="96" y1="380" x2="416" y2="380"/></g>' +
            '<g fill="#e8c547"><circle cx="200" cy="140" r="22"/><circle cx="300" cy="220" r="22"/>' +
            '<circle cx="160" cy="300" r="22"/><circle cx="340" cy="380" r="22"/></g></svg>'
          ),
          sizes: "512x512",
          type: "image/svg+xml",
          purpose: "any"
        }]
      };
      const mBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      const mLink = document.createElement("link");
      mLink.rel = "manifest";
      mLink.href = URL.createObjectURL(mBlob);
      document.head.appendChild(mLink);

      // A minimal service worker that caches the page itself for offline use.
      // Written inline and registered from a blob URL so there is still only one file to host.
      if ("serviceWorker" in navigator) {
        const swCode = `
          const CACHE = "open-strings-v1";
          self.addEventListener("install", e => { self.skipWaiting(); });
          self.addEventListener("activate", e => { e.waitUntil(self.clients.claim()); });
          self.addEventListener("fetch", e => {
            if (e.request.method !== "GET") return;
            e.respondWith(
              caches.open(CACHE).then(cache =>
                cache.match(e.request).then(hit =>
                  hit || fetch(e.request).then(res => {
                    try { if (res && res.status === 200 && e.request.url.startsWith(self.location.origin)) cache.put(e.request, res.clone()); } catch (x) {}
                    return res;
                  }).catch(() => hit)
                )
              )
            );
          });
        `;
        const swBlob = new Blob([swCode], { type: "text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        // Note: blob-based SW scope is limited, but this still enables install + same-page offline
        // when the file is hosted normally (e.g. GitHub Pages). It silently no-ops if blocked.
        navigator.serviceWorker.register(swURL).catch(() => {});
      }
    } catch (e) { /* PWA is a progressive enhancement; ignore failures */ }
  })();
  
</script>
