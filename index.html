  // ── Chord Identifier ──
  function renderIdentify() {
    const strings = getOpenStrings();
    const picked = state.idNotes;
    const noteSet = new Set(picked.map(p => p.note));
    const match = identifyChord(noteSet);
    let resultHtml;
    if (picked.length < 2) {
      resultHtml = `<div class="info-text">Tap notes on the fretboard to build a chord. Tap a marked note again to remove it.</div>`;
    } else if (match) {
      const conf = match.exact ? "exact match" : "closest match (extra or missing tones)";
      resultHtml = `<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap"><span style="font-size:24px;color:${match.def.color}">${esc(spell(match.root))} ${esc(match.def.label)}</span><span class="interval-meta" style="--c:${match.def.color}">${conf}</span><button type="button" class="pill" style="--c:${match.def.color};margin-left:auto" onclick="app.playIdentified('${match.root}','${match.key}')">Hear chord</button></div><div class="info-text" style="margin-top:8px">Selected notes: ${[...noteSet].map(n=>esc(spell(n))).join(", ")}</div>`;
    } else {
      resultHtml = `<div class="info-text">No standard chord matches those notes (${[...noteSet].map(n=>esc(spell(n))).join(", ")}). Try removing a note.</div>`;
    }

    // Fretboard where tapping toggles selection
    const { displayFrets } = current();
    const lefty = state.leftHanded;
    const effectiveOpen = strings.map(s => noteAtFret(s, state.capo));
    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const thick = 1 + si * 0.5;
      const fretsForRow = lefty ? [...displayFrets].reverse() : displayFrets;
      const cells = fretsForRow.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const isPicked = picked.some(p => p.string === stringIdx && p.fret === fret);
        const inner = isPicked ? `<div class="dot" style="--c:#e8c547"><span>${esc(state.noteDisplay==="note"?spell(note):"●")}</span></div>` : `<span class="faded-note">${esc(spell(note))}</span>`;
        return `<div class="cell" onclick="app.toggleIdNote(${stringIdx},${fret},'${note}')"><div class="string-line" style="height:${thick}px;left:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line"></div>`:""}${fret>0?`<div class="fret-wire"></div>`:""}${inner}</div>`;
      }).join("");
      return `<div class="string-row"><div class="string-label">${esc(spell(open))}</div>${cells}</div>`;
    }).join("");
    const minW = 52 + displayFrets.length * 46;
    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f)?"marked":""}">${f}</div>`).join("");

    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Chord Identifier</div>${resultHtml}<div class="row" style="margin-top:10px">${picked.length?`<button type="button" class="util-btn" onclick="app.clearIdNotes()">Clear</button>`:""}</div></div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px"><div class="fret-numbers">${numberRow}</div>${rows}</div></div>`;
  }

  // ── Modes Explorer ──
  function renderModes() {
    const parents = { "major": { label: "Major scale", modes: ["Ionian","Dorian","Phrygian","Lydian","Mixolydian","Aeolian","Locrian"], intervals: [0,2,4,5,7,9,11] },
                      "melodic": { label: "Melodic minor", modes: ["Melodic minor","Dorian b2","Lydian augmented","Lydian dominant","Mixolydian b6","Locrian #2","Altered"], intervals: [0,2,3,5,7,9,11] },
                      "harmonic": { label: "Harmonic minor", modes: ["Harmonic minor","Locrian #6","Ionian #5","Dorian #4","Phrygian dominant","Lydian #2","Altered bb7"], intervals: [0,2,3,5,7,8,11] } };
    const p = parents[state.modeParent];
    const parentBtns = Object.entries(parents).map(([k,v]) => btn(v.label, state.modeParent===k, "#c47ed4", `app.set('modeParent','${k}')`)).join("");
    const keyRow = keyButtons(state.modeParentKey, "#c47ed4", "app.setModeParentKey");
    // Each mode = rotation of the parent scale
    const rows = p.modes.map((modeName, i) => {
      const rootOffset = p.intervals[i];
      const modeRoot = transpose(state.modeParentKey, rootOffset);
      // Build the mode's interval set relative to its own root
      const rotated = p.intervals.map(iv => ((iv - rootOffset) + 12) % 12).sort((a,b)=>a-b);
      const notes = rotated.map(iv => spell(transpose(modeRoot, iv)));
      return `<div class="saved-card"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px"><span style="font-size:14px;color:var(--text-bright)">${esc(modeRoot)} ${esc(modeName)}</span><button type="button" class="pill" style="--c:#c47ed4;font-size:10px" onclick="app.playScale('${modeRoot}',[${rotated.join(",")}])">Hear</button></div><div class="info-text" style="font-size:11px;margin-top:4px">${notes.map(esc).join("  ")}</div></div>`;
    }).join("");
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Modes Explorer</div><div class="info-text" style="margin-bottom:12px">Every mode is the parent scale started from a different degree. Pick a parent scale and key to see all seven modes, their notes, and how they relate.</div><div class="mini-label">Parent scale</div><div class="row" style="margin-bottom:10px">${parentBtns}</div><div class="mini-label">Key</div><div class="row">${keyRow}</div></div><div class="saved-list">${rows}</div>`;
  }

  // ── Progression Suggester ──
  const SUGGEST_MOODS = {
    "bright":     { label: "Bright & uplifting", progs: [["I","V","vi","IV"],["I","IV","V"],["I","V","IV"],["IV","I","V","vi"]] },
    "melancholy": { label: "Melancholy", progs: [["vi","IV","I","V"],["i","bVI","bIII","bVII"],["vi","V","IV","V"],["i","iv","bVII","bIII"]] },
    "tense":      { label: "Tense & dramatic", progs: [["i","bVI","bVII","i"],["i","bII","i"],["i","V","i"],["i","iv","V"]] },
    "gospel":     { label: "Gospel & soulful", progs: [["I","iii","IV","iv"],["I","I7","IV","iv"],["vi","ii","V","I"],["IV","iv","I"]] },
    "dreamy":     { label: "Dreamy & floating", progs: [["Imaj7","IVmaj7"],["Imaj7","iii","IV","V"],["ii","IV","I"],["Imaj7","vi","ii","V"]] }
  };
  const ROMAN_MAP = { "I":[0,"maj"],"II":[2,"maj"],"III":[4,"maj"],"IV":[5,"maj"],"V":[7,"maj"],"VI":[9,"maj"],"VII":[11,"maj"],
    "i":[0,"min"],"ii":[2,"min"],"iii":[4,"min"],"iv":[5,"min"],"v":[7,"min"],"vi":[9,"min"],"vii":[11,"min"],
    "bII":[1,"maj"],"bIII":[3,"maj"],"bVI":[8,"maj"],"bVII":[10,"maj"],
    "I7":[0,"7"],"Imaj7":[0,"maj7"],"IVmaj7":[5,"maj7"],"ii7":[2,"min7"] };
  function romanToChord(roman, key) {
    let token = roman;
    let type = "maj";
    if (ROMAN_MAP[token]) { const [off, t] = ROMAN_MAP[token]; return { key: transpose(key, off), type: t }; }
    // fallback: strip quality suffixes
    const m = token.match(/^(b?[iIvV]+)(.*)$/);
    if (m && ROMAN_MAP[m[1]]) { const [off] = ROMAN_MAP[m[1]]; const isMin = m[1] === m[1].toLowerCase(); return { key: transpose(key, off), type: m[2] || (isMin?"min":"maj") }; }
    return { key, type: "maj" };
  }
  function renderSuggest() {
    const moodBtns = Object.entries(SUGGEST_MOODS).map(([k,v]) => btn(v.label, state.suggestMood===k, "#6dd4a8", `app.set('suggestMood','${k}')`)).join("");
    const keyRow = keyButtons(state.suggestKey, "#6dd4a8", "app.setSuggestKey");
    const mood = SUGGEST_MOODS[state.suggestMood];
    const cards = mood.progs.map((prog, i) => {
      const chords = prog.map(r => romanToChord(r, state.suggestKey));
      const display = chords.map(c => `${spell(c.key)} ${CHORD_TYPES[c.type]?.label.replace(' ','')}`).join("  →  ");
      const romans = prog.join(" – ");
      const enc = encodeURIComponent(JSON.stringify(chords));
      return `<div class="saved-card"><div style="font-size:12px;color:var(--dim);font-style:italic;margin-bottom:3px">${esc(romans)}</div><div style="font-size:14px;color:var(--text-bright);margin-bottom:8px">${esc(display)}</div><div class="row"><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px" onclick="app.loadSuggested('${enc}')">Load</button><button type="button" class="pill" style="--c:#e8c547;font-size:11px" onclick="app.playSuggested('${enc}')">Hear</button></div></div>`;
    }).join("");
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Progression Suggester</div><div class="info-text" style="margin-bottom:12px">Pick a key and a mood to get curated progressions. Load one into Progression mode to explore its voice leading, or hear it right away.</div><div class="mini-label">Key</div><div class="row" style="margin-bottom:10px">${keyRow}</div><div class="mini-label">Mood</div><div class="row">${moodBtns}</div></div><div class="saved-list">${cards}</div>`;
  }

  // ── Fretboard Note Trainer ──
  function renderTrainer() {
    const strings = getOpenStrings();
    const { displayFrets } = current();
    const target = state.trainerTarget;
    const effectiveOpen = strings.map(s => noteAtFret(s, state.capo));
    let statusHtml;
    if (!target) {
      statusHtml = `<div class="info-text">Tap “New target” to begin. You'll be asked to find every instance of a note across the neck.</div>`;
    } else {
      const allPositions = [];
      strings.forEach((open, si) => { displayFrets.forEach(f => { if (noteAtFret(open, f) === target) allPositions.push(si + ":" + f); }); });
      const remaining = allPositions.length - state.trainerFound.length;
      const done = remaining <= 0;
      statusHtml = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="font-size:20px;color:var(--text-bright)">Find every <strong style="color:#e8c547">${esc(spell(target))}</strong></span><span class="info-text">${state.trainerFound.length} / ${allPositions.length} found</span>${state.trainerTime?`<span class="info-text">· ${state.trainerTime}s</span>`:""}</span>${done?`<span class="interval-meta" style="--c:#6dd4a8">Complete</span>`:""}</div>`;
    }
    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const thick = 1 + si * 0.5;
      const cells = displayFrets.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const key = stringIdx + ":" + fret;
        const found = state.trainerFound.includes(key);
        const inner = found ? `<div class="dot" style="--c:#6dd4a8"><span>${esc(state.noteDisplay==="note"?spell(note):"✓")}</span></div>` : `<span class="faded-note" style="opacity:${target?0.3:1}">${target?"":esc(spell(note))}</span>`;
        return `<div class="cell" onclick="app.trainerGuess(${stringIdx},${fret},'${note}')"><div class="string-line" style="height:${thick}px;left:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line"></div>`:""}${fret>0?`<div class="fret-wire"></div>`:""}${inner}</div>`;
      }).join("");
      return `<div class="string-row"><div class="string-label">${esc(spell(open))}</div>${cells}</div>`;
    }).join("");
    const minW = 52 + displayFrets.length * 46;
    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f)?"marked":""}">${f}</div>`).join("");
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Fretboard Note Trainer</div>${statusHtml}<div class="row" style="margin-top:10px"><button type="button" class="accent-btn" onclick="app.newTrainerTarget()">New target</button></div><div class="info-text" style="margin-top:8px">Great for learning a new tuning — the positions change with every instrument and capo setting.</div></div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px"><div class="fret-numbers">${numberRow}</div>${rows}</div></div>`;
  }

  // ── Tuner reference tones ──
  function renderTuner() {
    const strings = getOpenStrings();
    const effectiveOpen = strings.map(s => noteAtFret(s, state.capo));
    const buttons = effectiveOpen.map((n, i) => `<button type="button" class="util-btn" style="font-size:16px;padding:14px 18px" onclick="app.playTunerNote('${n}',${i})">${esc(spell(n))}<div style="font-size:9px;color:var(--dim);margin-top:3px">string ${i+1}</div></button>`).join("");
    return `<div class="card"><div class="section-label">Tuner — Reference Tones</div><div class="info-text" style="margin-bottom:14px">Tap each string to hear its reference pitch and tune by ear. Reflects your current tuning${state.capo>0?" and capo":""}.</div><div class="row" style="gap:10px">${buttons}</div></div>`;
  }

  // ── Main render ──
  function render() {
    document.documentElement.setAttribute("data-theme", state.theme);
    let content;
    switch (state.mode) {
      case "single": content = renderSingle(); break;
      case "progression": content = renderProgression(); break;
      case "interval": content = renderIntervalTrainer(); break;
      case "identify": content = renderIdentify(); break;
      case "finder": content = renderFinder(); break;
      case "modes": content = renderModes(); break;
      case "suggest": content = renderSuggest(); break;
      case "quiz": content = renderQuiz(); break;
      case "ear": content = renderEar(); break;
      case "trainer": content = renderTrainer(); break;
      case "tuner": content = renderTuner(); break;
      default: content = renderSingle();
    }
    const themeLabel = state.theme === "dark" ? "Light" : "Dark";
    const showsGlobal = ["single","progression"].includes(state.mode);
    const showsExport = ["single","progression"].includes(state.mode);
    const exportButtons = showsExport ? `<button type="button" class="util-btn" onclick="app.sharePNG()">Share</button><button type="button" class="util-btn" onclick="app.savePNG()">PNG</button><button type="button" class="util-btn" onclick="app.downloadSVG()">SVG</button><button type="button" class="util-btn" onclick="app.copyStateLink()">Link</button><button type="button" class="util-btn" onclick="app.printChart()">Print</button>` : "";

    // Primary tabs (most-used) + grouped "More" select for the rest
    const primary = [["single","Single"],["progression","Progression"],["interval","Intervals"],["identify","Identify"]];
    const moreModes = [["finder","Key Finder"],["modes","Modes Explorer"],["suggest","Progression Suggester"],["quiz","Chord-Tone Quiz"],["ear","Ear Training"],["trainer","Fretboard Trainer"],["tuner","Tuner"]];
    const primaryTabs = primary.map(([m,l]) => `<button type="button" role="tab" class="tab ${state.mode===m?"active":""}" onclick="app.setMode('${m}')">${l}</button>`).join("");
    const inMore = moreModes.some(([m]) => m === state.mode);
    const moreLabel = inMore ? (moreModes.find(([m]) => m === state.mode)[1]) : "More tools";
    const moreOptions = `<option value="">${esc(moreLabel)}</option>` + moreModes.map(([m,l]) => `<option value="${m}" ${state.mode===m?"selected":""}>${esc(l)}</option>`).join("");

    document.getElementById("app").innerHTML = `<div class="wrap">
      <div class="header"><div class="eyebrow">${esc(instrumentLabel())} · ${esc(getOpenStrings().map(spell).join(" "))}</div><h1>Open Strings</h1><div class="tagline">A theory &amp; practice studio for stringed instruments</div></div>
      <div class="toolbar">
        <div class="segmented" role="tablist">${primaryTabs}</div>
        <select class="util-btn ${inMore?"active-more":""}" onchange="if(this.value)app.setMode(this.value)" aria-label="More tools" style="${inMore?"border-color:var(--gold);color:var(--gold)":""}">${moreOptions}</select>
        <button type="button" class="util-btn" onclick="app.toggleTheme()" aria-label="Toggle theme">${themeLabel}</button>
        <button type="button" class="util-btn" onclick="app.toggle('showHelp')">${state.showHelp?"Hide help":"Help"}</button>
        <button type="button" class="util-btn" onclick="app.toggle('showPrefs')">${state.showPrefs?"Hide prefs":"Preferences"}</button>
        ${exportButtons}
      </div>
      ${state.showHelp ? renderHelp() : ""}
      ${state.showPrefs ? renderPreferences() : ""}
      ${showsGlobal ? renderGlobalPanels() : ""}
      ${showsGlobal ? renderSavedCharts() : ""}
      ${content}
      <div class="footer">Open Strings · single-file offline app · works on GitHub Pages<br>${esc(getOpenStrings().map(spell).join(" "))} · ${esc(tuningLabel())}</div>
    </div>`;
  }

  // ── App handlers ──
  const app = {
    set(key, value) { state[key] = value; render(); },
    toggle(key) { state[key] = !state[key]; render(); },
    toggleTheme() { state.theme = state.theme === "dark" ? "light" : "dark"; try { localStorage.setItem("os-theme", state.theme); } catch (e) {} render(); },
    setMode(mode) { state.mode = mode; render(); },
    setSelectedKey(k) { state.selectedKey = k; render(); },
    setSelectedType(k) { state.selectedType = k; render(); },
    setScaleKey(k) { state.scaleKey = k; render(); },
    setFretRange(a,b) { state.fretRange = [a,b]; render(); },
    loadDiatonic(root, type) { state.selectedKey = root; state.selectedType = type; render(); },
    playNote(note) { audio.playNote(note); },
    playSingleChord() { const { singleTones } = current(); audio.playChord(singleTones, true); },
    playVoicing(notes) { if (Array.isArray(notes)) audio.playChord(notes, true); },
    playChordByIndex(i) { const ch = state.progChords[i]; audio.playChord(buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []), true); },
    playProgression() { audio.playProgression(state.progChords, state.progLoop); },
    toggleLoop() { state.progLoop = !state.progLoop; if (!state.progLoop) audio.stopProgression(); render(); },
    stopAudio() { audio.stopProgression(); },
    // Chord identifier
    toggleIdNote(string, fret, note) {
      const i = state.idNotes.findIndex(p => p.string === string && p.fret === fret);
      if (i >= 0) state.idNotes.splice(i, 1);
      else { state.idNotes.push({ string, fret, note }); audio.playNote(note); }
      render();
    },
    clearIdNotes() { state.idNotes = []; render(); },
    playIdentified(root, key) { audio.playChord(buildTones(root, CHORD_TYPES[key].intervals), true); },
    // Modes
    setModeParentKey(k) { state.modeParentKey = k; render(); },
    playScale(root, intervals) { intervals.forEach((iv, i) => audio.playNote(transpose(root, iv), 4, 0.5, i * 0.18)); },
    // Suggester
    setSuggestKey(k) { state.suggestKey = k; render(); },
    loadSuggested(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); state.progChords = chords.slice(0, 8); state.editingIdx = 0; state.mode = "progression"; toast("Loaded into Progression"); render(); } catch (e) {} },
    playSuggested(enc) { try { const chords = JSON.parse(decodeURIComponent(enc)); audio.playProgression(chords, false); } catch (e) {} },
    // Trainer
    newTrainerTarget() {
      const strings = getOpenStrings();
      const { displayFrets } = current();
      const pool = new Set();
      strings.forEach(open => displayFrets.forEach(f => pool.add(noteAtFret(open, f))));
      const arr = [...pool];
      state.trainerTarget = arr[Math.floor(Math.random() * arr.length)];
      state.trainerFound = [];
      state.trainerStart = Date.now();
      state.trainerTime = null;
      render();
    },
    trainerGuess(string, fret, note) {
      if (!state.trainerTarget) return;
      if (note === state.trainerTarget) {
        const key = string + ":" + fret;
        if (!state.trainerFound.includes(key)) {
          state.trainerFound.push(key);
          audio.playNote(note);
          // Check completion
          const strings = getOpenStrings();
          const { displayFrets } = current();
          let total = 0;
          strings.forEach((open, si) => displayFrets.forEach(f => { if (noteAtFret(open, f) === state.trainerTarget) total++; }));
          if (state.trainerFound.length >= total) state.trainerTime = ((Date.now() - state.trainerStart) / 1000).toFixed(1);
        }
      } else {
        toast(`That's ${spell(note)} — keep looking`);
      }
      render();
    },
    // Tuner
    playTunerNote(note, i) { audio.playNote(note, 3 + Math.floor(i / 3), 1.6); },
    addChord() { if (state.progChords.length < 8) { state.progChords.push({ key: "C", type: "maj" }); state.editingIdx = state.progChords.length - 1; render(); } },
    removeChord(i) { state.progChords = state.progChords.filter((_, idx) => idx !== i); state.editingIdx = Math.max(0, Math.min(state.editingIdx, state.progChords.length - 1)); render(); },
    setProgChord(i, field, value) { state.progChords = state.progChords.map((c, idx) => idx === i ? { ...c, [field]: value } : c); render(); },
    applyPreset(i) {
      const prog = PROGRESSION_LIBRARY[state.activeGenre][i];
      const ri = CHROMATIC.indexOf(state.selectedKey);
      state.progChords = prog.semis.map((s, idx) => ({ key: CHROMATIC[(ri + s) % 12], type: prog.types[idx] || "maj" })).slice(0, 8);
      state.editingIdx = 0; state.progLibOpen = false; render();
    },
    intervalClick(si, fret, note) {
      if (state.itStep === 1) { state.itNote1 = note; state.itStr1 = si; state.itFret1 = fret; state.itNote2 = null; state.itStr2 = null; state.itFret2 = null; state.itStep = 2; audio.playNote(note); }
      else if (state.itStep === 2) { if (si === state.itStr1 && fret === state.itFret1) { app.resetInterval(); return; } state.itNote2 = note; state.itStr2 = si; state.itFret2 = fret; state.itStep = 3; audio.playInterval(state.itNote1, note); }
      else { state.itNote1 = note; state.itStr1 = si; state.itFret1 = fret; state.itNote2 = null; state.itStr2 = null; state.itFret2 = null; state.itStep = 2; audio.playNote(note); }
      render();
    },
    resetInterval() { state.itStep = 1; state.itNote1 = null; state.itNote2 = null; state.itStr1 = null; state.itFret1 = null; state.itStr2 = null; state.itFret2 = null; render(); },
    playCurrentInterval() { if (state.itNote1 && state.itNote2) audio.playInterval(state.itNote1, state.itNote2); },
    setInstrument(name) {
      state.instrument = name;
      const inst = INSTRUMENTS[name];
      const firstTuning = Object.keys(inst.tunings)[0];
      state.tuningName = firstTuning;
      state.openStrings = [...inst.tunings[firstTuning].strings];
      state.customTuningText = state.openStrings.join(" ");
      render();
    },
    setTuning(name) {
      state.tuningName = name;
      const inst = INSTRUMENTS[state.instrument];
      const t = inst.tunings[name];
      if (t && name !== "CUSTOM") { state.openStrings = [...t.strings]; state.customTuningText = state.openStrings.join(" "); }
      render();
    },
    setCustomTuningText(value) { state.customTuningText = value; },
    applyCustomTuning() {
      const parts = String(state.customTuningText).toUpperCase().replace(/♯/g,"#").replace(/♭/g,"B").split(/[\s,\/]+/).filter(Boolean);
      const notes = parts.map(p => p.replace("DB","C#").replace("EB","D#").replace("GB","F#").replace("AB","G#").replace("BB","A#"));
      if (notes.length < 4 || notes.length > 6 || !notes.every(n => CHROMATIC.includes(n))) { alert("Enter 4 to 6 notes, low to high — for example: C G D A or E A D G B E"); return; }
      state.instrument = "custom"; state.tuningName = "CUSTOM"; state.openStrings = notes; state.customTuningText = notes.join(" "); render();
    },
    setSavedName(v) { state.savedName = v; },
    saveCurrentChart() {
      const name = (state.savedName || "").trim() || (state.mode === "progression" ? `Progression ${state.progChords.map(c => c.key).join("-")}` : `${state.selectedKey} ${CHORD_TYPES[state.selectedType]?.label}`);
      const summary = state.mode === "progression" ? state.progChords.map(c => `${c.key} ${CHORD_TYPES[c.type]?.label}`).join(" / ") : `${state.selectedKey} ${CHORD_TYPES[state.selectedType]?.label} · ${getOpenStrings().join("")}`;
      state.savedCharts.unshift({ name, summary, created: Date.now(), data: serializeState() });
      state.savedCharts = state.savedCharts.slice(0, 30);
      state.savedName = ""; persistSavedCharts(); toast("Chart saved"); render();
    },
    loadSavedChart(i) { const item = state.savedCharts[i]; if (item) { applySerializedState(item.data); toast("Chart loaded"); render(); } },
    deleteSavedChart(i) { state.savedCharts.splice(i,1); persistSavedCharts(); render(); },
    // Finder
    addFinderChord() { if (state.finderChords.length < 8) { state.finderChords.push({ key: "C", type: "maj" }); state.finderEditIdx = state.finderChords.length - 1; render(); } },
    removeFinderChord(i) { state.finderChords = state.finderChords.filter((_, idx) => idx !== i); state.finderEditIdx = Math.max(0, Math.min(state.finderEditIdx, state.finderChords.length - 1)); render(); },
    setFinderChord(field, value) { const i = state.finderEditIdx; state.finderChords = state.finderChords.map((c, idx) => idx === i ? { ...c, [field]: value } : c); render(); },
    useKeyForScale(root, mode) { state.scaleKey = root; state.scaleType = mode === "major" ? "major" : "minor"; state.selectedKey = root; state.mode = "single"; state.showScalePanel = false; toast(`Showing ${root} ${mode}`); render(); },
    // Quiz / Ear
    newQuizQuestion() { newQuizQuestion(); render(); },
    answerQuiz(choice) { const correct = state.quizQuestion && choice === state.quizQuestion.answer; state.quizAnswer = { correct }; if (correct) { state.quizScore++; state.quizStreak++; } else { state.quizStreak = 0; } render(); },
    newEarQuestion() { newEarQuestion(); render(); },
    playEarQuestion() { if (!state.earQuestion) newEarQuestion(); const q = state.earQuestion; audio.playChord(buildTones(q.root, CHORD_TYPES[q.type].intervals), true); },
    answerEar(type) { const correct = state.earQuestion && type === state.earQuestion.type; state.earAnswer = { correct }; if (correct) state.earScore++; render(); },
    savePNG, sharePNG, copyStateLink, printChart, downloadSVG
  };

  window.app = app;
  audio.installUnlockHandlers();
  render();
  </script>
</body>
</html>
