        chords.forEach((ch, i) => {
          const t = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || [0,4,7]);
          progTimers.push(setTimeout(() => playChord(t, true), i * step));
        });
        if (loop) progTimers.push(setTimeout(run, chords.length * step));
      };
      run();
    }

    return { unlock, installUnlockHandlers, playNote, playInterval, playChord, playProgression, stopProgression, getCtx };
  })();

  function current() {
    const chordDef = CHORD_TYPES[state.selectedType] || CHORD_TYPES.maj;
    const singleTones = buildTones(state.selectedKey, chordDef.intervals);
    const effectiveOpen = getOpenStrings().map(s => noteAtFret(s, state.capo));
    const scaleDef = state.scaleType ? SCALES[state.scaleType] : null;
    const scaleTones = scaleDef ? buildTones(state.scaleKey, scaleDef.intervals) : [];
    const displayFrets = Array.from({ length: state.fretRange[1] - state.fretRange[0] + 1 }, (_, i) => i + state.fretRange[0]);
    return { chordDef, singleTones, effectiveOpen, scaleDef, scaleTones, displayFrets };
  }

  function tuningLabel() {
    const inst = INSTRUMENTS[state.instrument];
    const t = inst && inst.tunings[state.tuningName];
    return t ? t.label : getOpenStrings().join(" ");
  }
  function instrumentLabel() { return INSTRUMENTS[state.instrument]?.label || "Four-String"; }

  function btn(label, active, color, onclick, extraClass = "") {
    return `<button type="button" class="pill ${active ? "active" : ""} ${extraClass}" style="--c:${cssColor(color)}" onclick="${onclick}">${esc(label)}</button>`;
  }
  function keyButtons(selected, color, setter) {
    return KEYS.map(k => btn(KEY_DISPLAY[k] || k, selected === k, color, `${setter}('${k}')`)).join("");
  }

  function getShared() {
    const s = new Set();
    for (let i = 0; i < state.progChords.length - 1; i++) {
      const a = new Set(buildTones(state.progChords[i].key, CHORD_TYPES[state.progChords[i].type]?.intervals || []));
      buildTones(state.progChords[i+1].key, CHORD_TYPES[state.progChords[i+1].type]?.intervals || []).forEach(n => { if (a.has(n)) s.add(n); });
    }
    return s;
  }
  function progDot(note) {
    const hits = [];
    state.progChords.forEach((ch, ci) => {
      const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
      const idx = tones.indexOf(note);
      if (idx >= 0) hits.push({ color: PROG_COLORS[ci % PROG_COLORS.length], label: CHORD_TYPES[ch.type]?.intLabels?.[idx] || "?", isRoot: idx === 0 });
    });
    return hits;
  }

  // Directional voice leading using absolute pitch (keeps P5 vs P4 distinct conceptually via nearest motion)
  function bestVoiceLeading(fromTones, toTones) {
    return fromTones.map(from => {
      let best = null, bestDist = 999;
      toTones.forEach(to => {
        const up = semiBetweenDir(from, to);
        const down = 12 - up;
        const dist = Math.min(up, down);
        if (dist < bestDist) { bestDist = dist; best = { from, to, semis: up <= down ? up : -down, dist }; }
      });
      return best;
    });
  }
  function vlQuality(semis) {
    const d = Math.abs(semis);
    if (d === 0) return { label: "Common tone", color: "#6dd4a8" };
    if (d === 1) return { label: "Half step", color: "#e8c547" };
    if (d === 2) return { label: "Whole step", color: "#d4c46d" };
    if (d <= 4) return { label: "Small leap", color: "#e8823a" };
    return { label: "Leap", color: "#e87a7a" };
  }

  // Chord identifier — given a set of pitch classes, find best matching chord
  function identifyChord(noteSet) {
    const present = [...noteSet];
    if (present.length < 2) return null;
    let best = null;
    for (const root of CHROMATIC) {
      for (const [key, def] of Object.entries(CHORD_TYPES)) {
        const tones = new Set(buildTones(root, def.intervals));
        const required = new Set(buildTones(root, def.required || def.intervals));
        const allPresent = present.every(n => tones.has(n));
        const requiredPresent = [...required].every(n => noteSet.has(n));
        const exactByRule = allPresent && requiredPresent && present.every(n => tones.has(n));
        const exactMatch = exactByRule && [...tones].every(n => noteSet.has(n));
        if (allPresent && requiredPresent) {
          const optionalOmissions = [...tones].filter(n => !noteSet.has(n)).length;
          const score = (exactMatch ? 100 : 0) - optionalOmissions - def.intervals.length * 0.1 + required.size * 0.2;
          if (!best || score > best.score) best = { root, key, def, score, exact: exactMatch };
        }
      }
    }
    return best;
  }

  // Key finder — score each key by how many of the given chords are diatonic
  function findKeys(chords) {
    const results = [];
    for (const root of CHROMATIC) {
      for (const modeName of ["major","minor"]) {
        const dia = DIATONIC[modeName];
        const diatonicRoots = dia.degrees.map(d => transpose(root, d));
        const diatonicTriads = dia.degrees.map((d, i) => ({ root: transpose(root, d), type: dia.triads[i] }));
        let matches = 0;
        chords.forEach(ch => {
          const hit = diatonicTriads.some(dt => dt.root === ch.key && (dt.type === ch.type || baseQuality(dt.type) === baseQuality(ch.type)));
          if (hit) matches++;
        });
        results.push({ root, mode: modeName, matches, total: chords.length, label: `${root} ${modeName}` });
      }
    }
    results.sort((a, b) => b.matches - a.matches);
    return results.slice(0, 5);
  }
  function baseQuality(type) {
    const t = CHORD_TYPES[type];
    if (!t) return "other";
    if (t.intervals.includes(4)) return "major";
    if (t.intervals.includes(3) && t.intervals.includes(6)) return "dim";
    if (t.intervals.includes(3)) return "minor";
    return "other";
  }

  // ── Export: SVG builder (tuning-aware, respects scale + fret range) ──
  function buildPrintSVG() {
    const { chordDef, singleTones, effectiveOpen, scaleDef, scaleTones, displayFrets } = current();
    const mode = state.mode;
    const nStrings = effectiveOpen.length;
    const nFrets = displayFrets.length;
    const cardThemeBg = state.theme === "light" ? "#fffdf8" : "#0c0c0c";
    const cardText = state.theme === "light" ? "#14110b" : "#f4ecdc";
    const cardMuted = state.theme === "light" ? "#5c5346" : "#9a9082";
    const cardDim = state.theme === "light" ? "#7a7060" : "#6f665a";
    const cardWire = state.theme === "light" ? "#b3a690" : "#3a3a3a";
    const cardFret = state.theme === "light" ? "#c4b8a2" : "#2a2a2a";
    const rootFill = "#ffffff";

    const fbLeft = 78, padRight = 52, fbTop = 168, stringSpacing = 64, dotR = 14;
    const colW = 58;
    const W = fbLeft + nFrets * colW + padRight;
    const fbHeight = (nStrings - 1) * stringSpacing;
    const H = fbTop + fbHeight + 120;
    const lc = mode === "single" ? chordDef.color : PROG_COLORS[0];

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="background:${cardThemeBg};font-family:Georgia,serif;">`;
    svg += `<rect width="${W}" height="${H}" fill="${cardThemeBg}"/>`;
    svg += `<text x="${W/2}" y="30" text-anchor="middle" fill="${cardDim}" font-size="12" letter-spacing="3">${esc(instrumentLabel().toUpperCase())} / ${esc(getOpenStrings().join(" "))} TUNING${state.capo>0?` / CAPO ${state.capo}`:""}</text>`;
    const title = mode === "single" ? `${state.selectedKey} ${chordDef.label}` : `Progression: ${state.progChords.map(cc => `${cc.key} ${CHORD_TYPES[cc.type]?.label}`).join("  /  ")}`;
    svg += `<text x="${W/2}" y="62" text-anchor="middle" fill="${cardText}" font-size="24" font-weight="bold">${esc(title)}</text>`;

    let infoY = 92;
    if (mode === "single") {
      svg += `<rect x="${fbLeft-30}" y="${infoY-2}" width="4" height="22" fill="${chordDef.color}"/>`;
      let tx = fbLeft - 18;
      const lbl0 = `${state.selectedKey} ${chordDef.label}:`;
      svg += `<text x="${tx}" y="${infoY+14}" fill="${chordDef.color}" font-size="13" font-weight="bold">${esc(lbl0)}</text>`;
      tx += lbl0.length * 8 + 10;
      singleTones.forEach((t, i) => {
        const lbl = `${t} (${chordDef.intLabels?.[i] || "?"})`;
        svg += `<text x="${tx}" y="${infoY+14}" fill="${i === 0 ? cardText : chordDef.color}" font-size="13">${esc(lbl)}</text>`;
        tx += lbl.length * 8 + 12;
      });
    } else {
      let tx = fbLeft - 30;
      state.progChords.forEach((ch, ci) => {
        const col = PROG_COLORS[ci % PROG_COLORS.length];
        svg += `<circle cx="${tx+6}" cy="${infoY+10}" r="6" fill="${col}"/>`;
        const lbl = `${ch.key} ${CHORD_TYPES[ch.type]?.label}`;
        svg += `<text x="${tx+18}" y="${infoY+15}" fill="${col}" font-size="13">${esc(lbl)}</text>`;
        tx += lbl.length * 8 + 36;
      });
    }
    if (scaleDef) {
      svg += `<text x="${fbLeft-30}" y="${infoY+34}" fill="${cardMuted}" font-size="12">Scale: ${esc(state.scaleKey)} ${esc(scaleDef.label)} — ${esc(scaleTones.join(" "))}</text>`;
    }

    // Fret wires + numbers
    displayFrets.forEach((f, fi) => {
      const x = fbLeft + fi * colW + colW / 2;
      const isOpen = f === 0;
      svg += `<line x1="${x}" y1="${fbTop-12}" x2="${x}" y2="${fbTop+fbHeight+12}" stroke="${isOpen ? cardWire : cardFret}" stroke-width="${isOpen ? 4 : 1}"/>`;
      if ([0,3,5,7,9,12].includes(f)) svg += `<text x="${x}" y="${fbTop-18}" text-anchor="middle" fill="${cardMuted}" font-size="11" font-family="monospace">${f}</text>`;
    });

    // Strings + labels
    [...effectiveOpen].reverse().forEach((open, si) => {
      const y = fbTop + si * stringSpacing;
      const thick = 1 + si * 0.8;
      svg += `<line x1="${fbLeft + colW/2}" y1="${y}" x2="${fbLeft + (nFrets-1)*colW + colW/2}" y2="${y}" stroke="${cardWire}" stroke-width="${thick}"/>`;
      svg += `<text x="${fbLeft-24}" y="${y+5}" text-anchor="middle" fill="${cardMuted}" font-size="14" font-weight="bold">${esc(open)}</text>`;
    });

    // Position markers
    displayFrets.forEach((f, fi) => {
      const x = fbLeft + fi * colW + colW / 2;
      if ([3,5,7,9].includes(f)) svg += `<circle cx="${x}" cy="${fbTop+fbHeight+22}" r="5" fill="${cardFret}"/>`;
      if (f === 12) { svg += `<circle cx="${x-9}" cy="${fbTop+fbHeight+22}" r="4" fill="${cardFret}"/><circle cx="${x+9}" cy="${fbTop+fbHeight+22}" r="4" fill="${cardFret}"/>`; }
    });

    // Dots
    [...effectiveOpen].reverse().forEach((open, si) => {
      const y = fbTop + si * stringSpacing;
      displayFrets.forEach((fret, fi) => {
        const note = noteAtFret(open, fret);
        const x = fbLeft + fi * colW + colW / 2;
        let d = null;
        if (mode === "single") {
          const idx = singleTones.indexOf(note);
          if (idx >= 0) d = { color: chordDef.color, isRoot: idx === 0, label: chordDef.intLabels?.[idx] || "?" };
        } else {
          state.progChords.forEach((ch, ci) => {
            if (d) return;
            const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
            const idx = tones.indexOf(note);
            if (idx >= 0) d = { color: PROG_COLORS[ci % PROG_COLORS.length], isRoot: idx === 0, label: CHORD_TYPES[ch.type]?.intLabels?.[idx] || "?" };
          });
        }
        if (!d) {
          if (scaleDef && scaleTones.includes(note)) {
            svg += `<circle cx="${x}" cy="${y}" r="9" fill="${scaleDef.color}22" stroke="${scaleDef.color}88" stroke-width="1"/>`;
          }
          return;
        }
        if (d.isRoot) {
          svg += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${rootFill}" stroke="${d.color}" stroke-width="2.5"/>`;
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="${d.color}" font-size="9" font-weight="bold" font-family="monospace">${esc(d.label)}</text>`;
        } else {
          svg += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${d.color}"/>`;
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="#14110b" font-size="9" font-weight="bold" font-family="monospace">${esc(d.label)}</text>`;
        }
      });
    });

    // Legend
    const legY = fbTop + fbHeight + 54;
    svg += `<text x="${fbLeft-30}" y="${legY}" fill="${cardDim}" font-size="11" letter-spacing="2">LEGEND</text>`;
    svg += `<circle cx="${fbLeft+48}" cy="${legY-5}" r="9" fill="${rootFill}" stroke="${lc}" stroke-width="2"/><text x="${fbLeft+48}" y="${legY-1}" text-anchor="middle" fill="${lc}" font-size="8" font-weight="bold" font-family="monospace">R</text>`;
    svg += `<text x="${fbLeft+62}" y="${legY}" fill="${cardMuted}" font-size="12">Root</text>`;
    svg += `<circle cx="${fbLeft+120}" cy="${legY-5}" r="9" fill="${lc}"/><text x="${fbLeft+120}" y="${legY-1}" text-anchor="middle" fill="#14110b" font-size="8" font-weight="bold" font-family="monospace">3</text>`;
    svg += `<text x="${fbLeft+134}" y="${legY}" fill="${cardMuted}" font-size="12">Chord tone</text>`;
    svg += `<text x="${W/2}" y="${H-16}" text-anchor="middle" fill="${cardDim}" font-size="10">Open Strings — ${esc(instrumentLabel())} reference — frets ${state.fretRange[0]}–${state.fretRange[1]}</text>`;
    svg += `</svg>`;
    return svg;
  }

  async function printChart() {
    // Render the chart to a PNG first (same image as the PNG export), then print it in an
    // isolated document so the browser prints ONLY the chart, never the whole app screen.
    let dataUrl;
    try {
      const blob = await svgToPngBlob(buildPrintSVG(), 2);
      dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
    } catch (e) {
      // Fall back to the SVG directly if PNG rasterization fails
      dataUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(buildPrintSVG())}`;
    }
    const title = `Open Strings — ${state.mode === "progression" ? "Progression" : state.selectedKey + " " + (CHORD_TYPES[state.selectedType]?.label || "")}`;
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(title)}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;background:#fff}body{display:flex;align-items:center;justify-content:center;padding:16px}img{max-width:100%;height:auto;display:block}
@media print{@page{size:landscape;margin:0.3in}body{padding:0}img{width:100%;height:auto;page-break-inside:avoid}}</style></head>
<body><img id="chart" src="${dataUrl}" alt="Open Strings chart"></body></html>`;

    const win = window.open("", "_blank");
    if (win) {
      win.document.open(); win.document.write(html); win.document.close();
      const img = win.document.getElementById("chart");
      const go = () => { try { win.focus(); win.print(); } catch (e) {} };
      if (img && !img.complete) { img.onload = () => setTimeout(go, 200); img.onerror = () => setTimeout(go, 200); }
      else setTimeout(go, 300);
    } else {
      // Popup blocked — open the image in a new tab so the user can print/save manually.
      const w2 = window.open(dataUrl, "_blank");
      if (!w2) { toast("Allow pop-ups to print, or use PNG export"); }
    }
  }

  function downloadSVG() {
    const svg = buildPrintSVG();
    const blob = new Blob([svg], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "open-strings-chart.svg";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("SVG saved");
  }

  function svgToPngBlob(svg, scale) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const mW = svg.match(/width="(\d+)"/), mH = svg.match(/height="(\d+)"/);
      const w = mW ? Number(mW[1]) : 1100, h = mH ? Number(mH[1]) : 720;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = w * scale; canvas.height = h * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale); ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("Could not create PNG")), "image/png", 0.95);
      };
      img.onerror = reject;
      img.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    });
  }
  async function savePNG() {
    try {
      const blob = await svgToPngBlob(buildPrintSVG(), 2);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "open-strings-chart.png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast("PNG saved");
    } catch (e) { alert("PNG export failed: " + e.message); }
  }
  async function sharePNG() {
    try {
      const blob = await svgToPngBlob(buildPrintSVG(), 2);
      const file = new File([blob], "open-strings-chart.png", { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
        await navigator.share({ title: "Open Strings chart", files: [file] });
      } else { await savePNG(); }
    } catch (e) { if (e.name !== "AbortError") alert("Share failed: " + e.message); }
  }
  async function copyStateLink() {
    const url = stateURL();
    try { await navigator.clipboard.writeText(url); toast("Link copied"); }
    catch (e) { prompt("Copy this link", url); }
  }

  // ── Fretboard renderer ──
  function renderFretboard(fbMode) {
    const { chordDef, singleTones, effectiveOpen, scaleDef, scaleTones, displayFrets } = current();
    const chordColor = chordDef.color;
    const sharedTones = state.showShared ? getShared() : new Set();
    const strings = getOpenStrings();
    const rangeButtons = [[0,12,"All"],[0,5,"0–5"],[3,8,"3–8"],[5,12,"5–12"],[7,12,"7–12"]]
      .map(([a,b,l]) => btn(l, state.fretRange[0] === a && state.fretRange[1] === b, "#a8c4e8", `app.setFretRange(${a},${b})`)).join("");
    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f) ? "marked" : ""}">${f}</div>`).join("");
    const lefty = state.leftHanded;

    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const origOpen = [...strings].reverse()[si];
      const thick = 1 + si * 0.5;
      const fretsForRow = lefty ? [...displayFrets].reverse() : displayFrets;
      const cells = fretsForRow.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const nutSide = lefty ? "right" : "left";
        let content = "";
        if (fbMode === "interval") {
          const isA = state.itStr1 === stringIdx && state.itFret1 === fret;
          const isB = state.itStr2 === stringIdx && state.itFret2 === fret;
          const ghostA = state.itNote1 === note && !isA;
          const ghostB = state.itStep === 3 && state.itNote2 === note && !isB;
          if (isA || isB) {
            const col = isA ? "#e8c547" : "#7eb8d4";
            content = `<div class="dot" style="--c:${col};width:32px;height:32px"><span>${isA ? "A" : "B"}</span></div>`;
          } else if (ghostA || ghostB) {
            const col = ghostA ? "#e8c547" : "#7eb8d4";
            content = `<div class="scale-dot" style="--c:${col};width:22px;height:22px"></div>`;
          } else {
            content = `<span class="faded-note">${esc(spell(note))}</span>`;
          }
          return `<div class="cell" onclick="app.intervalClick(${stringIdx},${fret},'${note}')" role="button" aria-label="${esc(open)} string fret ${fret}, ${esc(spell(note))}"><div class="string-line" style="height:${thick}px;${nutSide}:${isNut ? "50%" : "0"}"></div>${isNut ? `<div class="nut-line" style="${lefty?"left:auto;right:50%;transform:translateX(50%)":""}"></div>` : ""}${fret > 0 ? `<div class="fret-wire" style="${lefty?"left:auto;right:0":""}"></div>` : ""}${content}</div>`;
        }

        let dot = null;
        const isSN = scaleTones.includes(note);
        const isShared = sharedTones.has(note);
        if (fbMode === "single") {
          const idx = singleTones.indexOf(note);
          if (idx >= 0) dot = { color: chordColor, isRoot: idx === 0, label: dotLabel(chordDef.intLabels?.[idx] || "?", note), multi: false };
        } else {
          if (state.progMapMode === "selected") {
            const ai = Math.min(state.editingIdx, state.progChords.length - 1);
            const ch = state.progChords[ai];
            const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
            const idx = tones.indexOf(note);
            if (idx >= 0) dot = { color: PROG_COLORS[ai % PROG_COLORS.length], isRoot: idx === 0, label: dotLabel(CHORD_TYPES[ch.type]?.intLabels?.[idx] || "?", note), multi: false };
          } else {
            const hits = progDot(note);
            if (hits.length > 0) { const p = hits.find(h => h.isRoot) || hits[0]; dot = { color: p.color, isRoot: p.isRoot, label: dotLabel(p.label, note), multi: hits.length > 1 }; }
          }
        }

        let inner = "";
        if (dot) {
          inner = `<div class="dot ${dot.isRoot ? "root" : ""} ${isShared ? "shared" : ""}" style="--c:${cssColor(dot.color)}"><span>${esc(dot.label)}</span>${dot.multi ? `<div class="multi"></div>` : ""}</div>`;
        } else if (isSN && scaleDef) {
          inner = `<div class="scale-dot" style="--c:${cssColor(scaleDef.color)}"></div>`;
        } else {
          inner = `<span class="faded-note">${esc(spell(note))}</span>`;
        }
        return `<div class="cell" onclick="app.playNote('${note}')" role="button" aria-label="${esc(open)} string fret ${fret}, ${esc(spell(note))}"><div class="string-line" style="height:${thick}px;${nutSide}:${isNut ? "50%" : "0"}"></div>${isNut ? `<div class="nut-line" style="${lefty?"left:auto;right:50%;transform:translateX(50%)":""}"></div>` : ""}${fret > 0 ? `<div class="fret-wire" style="${lefty?"left:auto;right:0":""}"></div>` : ""}${inner}</div>`;
      }).join("");
      const capoTag = state.capo > 0 ? `<span class="capo-orig">(${esc(spell(origOpen))})</span>` : "";
      const label = `<div class="string-label">${esc(spell(open))}${capoTag}</div>`;
      return `<div class="string-row">${lefty ? "" : label}${cells}${lefty ? label.replace('text-align:right','text-align:left') : ""}</div>`;
    }).join("");

    const markerFrets = lefty ? [...displayFrets].reverse() : displayFrets;
    const markerRow = markerFrets.map(f => {
      if ([3,5,7,9].includes(f)) return `<div class="marker-cell"><div class="marker"></div></div>`;
      if (f === 12) return `<div class="marker-cell"><div class="marker double"><span></span><span></span></div></div>`;
      return `<div class="marker-cell"></div>`;
    }).join("");
    const numbersFinal = lefty ? [...displayFrets].reverse().map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f) ? "marked" : ""}">${f}</div>`).join("") : numberRow;

    const minW = 52 + displayFrets.length * 46;
    const leftMargin = lefty ? `<style>.markers,.fret-numbers{margin-left:0;margin-right:52px}</style>` : "";
    return `<div class="fret-toolbar"><span class="mini-label" style="margin:0">Fret range</span>${rangeButtons}</div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px">${leftMargin}<div class="fret-numbers" style="${lefty?"margin-left:0;justify-content:flex-start":""}">${numbersFinal}</div>${rows}<div class="markers" style="${lefty?"margin-left:0":""}">${markerRow}</div></div></div>`;
  }

  // ── Global panels (tuning, capo, scale) ──
  function renderGlobalPanels() {
    const inst = INSTRUMENTS[state.instrument];
    const instOptions = Object.entries(INSTRUMENTS).map(([k,v]) => `<option value="${k}" ${state.instrument===k?"selected":""}>${esc(v.label)}</option>`).join("");
    const tuningOptions = Object.entries(inst.tunings).map(([k,v]) => `<option value="${k}" ${state.tuningName===k?"selected":""}>${esc(v.label)}</option>`).join("");
    const customField = state.instrument === "custom" ? `<div class="field" style="flex:1 1 200px"><label>Custom notes (4–6, low→high)</label><div style="display:flex;gap:6px"><input type="text" id="customTuning" value="${esc(state.customTuningText)}" oninput="app.setCustomTuningText(this.value)" style="flex:1" aria-label="Custom tuning notes" /><button type="button" class="util-btn" onclick="app.applyCustomTuning()">Set</button></div></div>` : "";
    const capoButtons = Array.from({length:8}, (_,i) => btn(i===0?"None":`Fret ${i}`, state.capo===i, "#a8c4e8", `app.set('capo',${i})`)).join("");
    const scaleTypeButtons = `<button type="button" class="pill ${state.scaleType===null?"active":""}" style="--c:#888" onclick="app.set('scaleType',null)">Off</button>` +
      Object.entries(SCALES).map(([k,v]) => btn(v.label, state.scaleType===k, v.color, `app.set('scaleType','${k}')`)).join("");

    return `<div class="global">
      <div class="card grow">
        <div class="section-label">Instrument & Tuning</div>
        <div class="field" style="margin-bottom:8px"><label>Instrument</label><select onchange="app.setInstrument(this.value)" aria-label="Instrument">${instOptions}</select></div>
        <div class="field"><label>Tuning</label><select onchange="app.setTuning(this.value)" aria-label="Tuning">${tuningOptions}</select></div>
        ${customField}
      </div>
      <div class="card grow">
        <div class="section-label">Capo</div>
        <div class="row">${capoButtons}</div>
        ${state.capo>0?`<div class="info-text" style="margin-top:8px">Sounding tuning: ${esc(getOpenStrings().map(s=>noteAtFret(s,state.capo)).join(" "))}</div>`:""}
      </div>
      <div class="card grow2">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="section-label" style="margin:0">Scale Overlay</div>
          <button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;padding:3px 9px" onclick="app.toggle('showScalePanel')">${state.showScalePanel?"hide":"configure"}</button>
        </div>
        ${state.showScalePanel ? `<div class="mini-label">Root</div><div class="row" style="margin-bottom:8px">${keyButtons(state.scaleKey, state.scaleType?SCALES[state.scaleType].color:"#6dd4a8", "app.setScaleKey")}</div><div class="mini-label">Type</div><div class="row">${scaleTypeButtons}</div>` :
        (state.scaleType ? `<div class="info-text">${esc(state.scaleKey)} ${esc(SCALES[state.scaleType].label)} — <span style="color:var(--muted)">${esc(buildTones(state.scaleKey, SCALES[state.scaleType].intervals).join(" "))}</span> <button type="button" class="pill" style="--c:#888;font-size:10px;padding:2px 7px;margin-left:6px" onclick="app.set('scaleType',null)">clear</button></div>` : `<div class="info-text">No scale active — tap configure to overlay a scale.</div>`)}
      </div>
    </div>`;
  }

  // ── Single chord mode ──
  function renderSingle() {
    const { chordDef, singleTones } = current();
    const chordColor = chordDef.color;
    const keyRow = keyButtons(state.selectedKey, chordColor, "app.setSelectedKey");
    const typeGroups = CHORD_GROUP_ORDER.map(grp => {
      const entries = Object.entries(CHORD_TYPES).filter(([,v]) => v.group === grp);
      if (!entries.length) return "";
      return `<div style="margin-bottom:8px"><div class="group-label">${esc(grp)}</div><div class="row">${entries.map(([k,v]) => btn(v.label, state.selectedType===k, v.color, `app.setSelectedType('${k}')`)).join("")}</div></div>`;
    }).join("");

    const tonePills = singleTones.map((t,i) => `<span class="tone-pill ${i===0?"root":""}" style="--c:${chordColor}" onclick="app.playNote('${t}')">${esc(t)} <span style="opacity:.6;font-size:10px">${esc(chordDef.intLabels?.[i]||"")}</span></span>`).join("");
    const swapTypes = ["maj","min","7","maj7","min7","sus2","sus4","add9","9","6","m6","13"].filter(k => k !== state.selectedType);
    const quickSwap = swapTypes.slice(0,8).map(k => { const v = CHORD_TYPES[k]; return `<button type="button" class="pill" style="--c:${v.color};font-size:11px" onclick="app.setSelectedType('${k}')">${esc(state.selectedKey)} ${esc(v.label)}</button>`; }).join("");

    // Diatonic panel
    const diatonicPanel = renderDiatonicPanel();

    // Voicings — generated live for the current tuning
    let voicingSection = "";
    {
      // Voicings use the same sounding open strings as the visible fretboard, so capoed charts stay accurate.
      const strings = current().effectiveOpen;
      const spanByInst = state.instrument === "bass" ? 5 : 4;
      const vs = state.showVoicings ? getVoicings(strings, state.selectedKey, chordDef, spanByInst) : [];
      const cards = vs.length ? vs.map((v,i) => renderVoicingCard(v, i, chordColor, strings)).join("") : `<div class="info-text" style="padding:8px">No comfortable voicing found for this chord on the current tuning within reach. Try a different inversion by ear, or a nearby key.</div>`;
      voicingSection = `<div style="margin-top:18px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="section-label" style="margin:0">Playable Voicings (${esc(strings.join(" "))})</div><button type="button" class="pill" style="--c:${chordColor};font-size:11px;padding:3px 10px" onclick="app.toggle('showVoicings')">${state.showVoicings?"hide":"show"}</button></div>${state.showVoicings ? `<div class="voicing-wrap">${cards}</div><div class="info-text" style="margin-top:8px">Generated for ${esc(strings.join(" "))}. Diagrams read low string (left label) to high; × means that string is not played. Position numbers show the fret.</div>` : ""}</div>`;
    }

    const legend = renderLegend(chordColor);
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Root</div><div class="row">${keyRow}</div></div>
      <div class="card" style="margin-bottom:14px"><div class="section-label">Chord Type</div>${typeGroups}</div>
      ${diatonicPanel}
      <div class="summary" style="--c:${chordColor}"><div class="summary-head"><span class="name">${esc(state.selectedKey)} ${esc(chordDef.label)}</span><button type="button" class="play-btn" onclick="app.playSingleChord()">Play</button></div><div class="row">${tonePills}</div><div style="margin-top:12px"><div class="group-label">Quick swap</div><div class="row">${quickSwap}</div></div></div>
      ${renderFretboard("single")}
      ${voicingSection}
      ${legend}`;
  }

  function renderDiatonicPanel() {
    const headBtn = `<button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;padding:3px 9px" onclick="app.toggle('showDiatonic')">${state.showDiatonic?"hide":"show"}</button>`;
    if (!state.showDiatonic) {
      return `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between"><div class="section-label" style="margin:0">Diatonic Chords in Key</div>${headBtn}</div></div>`;
    }
    const dia = DIATONIC[state.diatonicMode];
    const useSeventh = state.diatonicSevenths;
    const chips = dia.degrees.map((deg,i) => {
      const root = transpose(state.selectedKey, deg);
      const type = useSeventh ? dia.sevenths[i] : dia.triads[i];
      const def = CHORD_TYPES[type] || CHORD_TYPES.maj;
      return `<div class="diatonic-chip" onclick="app.loadDiatonic('${root}','${type}')"><div class="dia-roman">${esc(dia.romans[i])}</div><div class="dia-name">${esc(root)} ${esc(def.label.replace(' ',''))}</div></div>`;
    }).join("");
    return `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="section-label" style="margin:0">Diatonic Chords in ${esc(state.selectedKey)} ${state.diatonicMode}</div>${headBtn}</div>
      <div class="row" style="margin-bottom:10px">${btn("Major key", state.diatonicMode==="major", "#e8c547", "app.set('diatonicMode','major')")}${btn("Minor key", state.diatonicMode==="minor", "#7eb8d4", "app.set('diatonicMode','minor')")}${btn(useSeventh?"7th chords":"Triads", true, "#6dd4a8", "app.toggle('diatonicSevenths')")}</div>
      <div class="diatonic-wrap">${chips}</div>
      <div class="info-text" style="margin-top:10px">These seven chords are built from the ${esc(state.selectedKey)} ${state.diatonicMode} scale. Tap any to load it on the fretboard.</div></div>`;
  }

  function renderVoicingCard(voicing, idx, chordColor, strings) {
    strings = strings || getOpenStrings();
    const root = state.selectedKey;
    const fretted = voicing.filter(f => f !== null && f > 0);
    const anyFretted = fretted.length > 0;
    const minF = anyFretted ? Math.min(...fretted) : 0;
    const maxF = anyFretted ? Math.max(...fretted) : 0;
    // Window: start at 0 if any open notes used and shape is low, else frame around the fretted region
    const usesOpen = voicing.some(f => f === 0);
    let dMin, dMax;
    if (usesOpen || minF <= 2) { dMin = 0; dMax = Math.max(4, maxF); }
    else { dMin = minF - 1; dMax = Math.max(dMin + 4, maxF + 1); }
    const span = dMax - dMin;
    const colW = 20;
    const frets = Array.from({ length: span + 1 }, (_, i) => i + dMin);

    // Labels high (top) to low (bottom) — diagram drawn top=high string
    const labelsHighToLow = [...strings].reverse();
    const voicingHighToLow = [...voicing].reverse();

    const rowHeight = 20;
    const stringRows = voicingHighToLow.map((fp) => {
      let marker = "";
      if (fp === null) {
        marker = `<span style="position:absolute;left:-13px;top:-6px;font-size:11px;color:var(--dim)">×</span>`;
      } else {
        const fi = frets.indexOf(fp);
        if (fi >= 0) {
          const isRoot = noteAtFret(strings[voicing.length - 1 - voicingHighToLow.indexOf(fp)], fp) === root;
          // recompute isRoot reliably below per-string instead
        }
      }
      return marker;
    });

    // Build rows reliably with explicit string index
    let rowsHtml = "";
    for (let row = 0; row < strings.length; row++) {
      const stringIndex = strings.length - 1 - row; // top row = highest string
      const fp = voicing[stringIndex];
      let cell = "";
      if (fp === null) {
        cell = `<span style="position:absolute;left:-13px;top:-6px;font-size:11px;color:var(--dim)">×</span>`;
      } else {
        const note = noteAtFret(strings[stringIndex], fp);
        const isRoot = note === root;
        const fi = frets.indexOf(fp);
        const left = fi >= 0 ? fi * colW + colW / 2 - 7 : -100;
        if (fp === 0) {
          cell = `<div style="position:absolute;left:-13px;top:-6px;width:11px;height:11px;border-radius:50%;border:2px solid ${isRoot ? "var(--text-bright)" : chordColor};background:transparent" title="${esc(note)} (open)"></div>`;
        } else {
          cell = `<div style="position:absolute;left:${left}px;top:-7px;width:15px;height:15px;border-radius:50%;background:${isRoot ? "var(--root-fill)" : chordColor};border:${isRoot ? `2px solid ${chordColor}` : "none"};z-index:2;display:flex;align-items:center;justify-content:center" title="${esc(note)}"><span style="font-size:7px;font-weight:bold;color:${isRoot ? chordColor : "var(--dot-text)"};font-family:monospace">${isRoot ? "R" : ""}</span></div>`;
        }
      }
      rowsHtml += `<div style="display:flex;align-items:center;height:${rowHeight}px;gap:6px"><div style="width:16px;text-align:right;font-size:9px;color:var(--muted)">${esc(strings[stringIndex])}</div><div style="position:relative;width:${frets.length * colW}px;height:2px;background:var(--wire)">${cell}</div></div>`;
    }

    const gridLines = frets.map((f, fi) => `<div style="position:absolute;left:${fi * colW}px;top:0;bottom:18px;width:1px;background:${f === 0 ? "var(--nut)" : "var(--fret)"}"></div>`).join("");
    const fretNums = frets.map(f => `<div style="width:${colW}px;text-align:center;font-size:8px;color:var(--faint);font-family:monospace">${f}</div>`).join("");

    // Notes for playback (low to high), skipping mutes
    const playNotes = voicing.map((f, i) => f === null ? null : noteAtFret(strings[i], f)).filter(x => x);
    const playArg = playNotes.map(n => `'${n}'`).join(",");

    return `<div class="voicing-card"><div class="voicing-title">voicing ${idx + 1}</div>
      <div style="position:relative;padding-left:22px">
        <div style="position:relative;margin-left:0">${gridLines}<div style="position:relative">${rowsHtml}</div><div style="display:flex;margin-top:2px;padding-left:0">${fretNums}</div></div>
      </div>
      <button type="button" class="pill" style="--c:${chordColor};font-size:10px;padding:2px 8px;margin-top:8px;width:100%" onclick="app.playVoicing([${playArg}])">Hear</button>
    </div>`;
  }

  function renderLegend(chordColor) {
    const { scaleDef } = current();
    const scaleItem = scaleDef ? `<div class="legend-item"><div class="scale-dot" style="--c:${scaleDef.color};position:static"></div><span class="legend-text">Scale tone</span></div>` : "";
    return `<div class="legend"><div class="legend-title">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--root-fill);border:2px solid ${chordColor}"><span style="color:${chordColor}">R</span></div><span class="legend-text">Root</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:${chordColor}"><span style="color:var(--dot-text)">3</span></div><span class="legend-text">Chord tone</span></div>
      ${scaleItem}
      <span class="legend-text" style="margin-left:auto;align-self:center">Tap any dot to hear the note</span></div>`;
  }

  // ── Progression mode ──
  function renderProgression() {
    const genreTabs = Object.keys(PROGRESSION_LIBRARY).map(g => btn(g, state.activeGenre===g, "#6dd4a8", `app.set('activeGenre','${g.replace(/'/g,"\\'")}')`)).join("");
    const presets = PROGRESSION_LIBRARY[state.activeGenre].map((p,i) => `<button type="button" class="util-btn" onclick="app.applyPreset(${i})">${esc(p.label)}</button>`).join("");
    const lib = state.progLibOpen ? `<div class="card" style="margin-bottom:14px"><div class="section-label">Progression Library</div><div class="mini-label">Key</div><div class="row" style="margin-bottom:10px">${keyButtons(state.selectedKey, "#e8c547", "app.setSelectedKey")}</div><div class="row" style="margin-bottom:10px">${genreTabs}</div><div class="row">${presets}</div></div>` : "";

    const chordCards = state.progChords.map((ch,ci) => {
      const col = PROG_COLORS[ci % PROG_COLORS.length];
      const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
      const del = state.progChords.length > 2 ? `<button type="button" class="delete-x" onclick="event.stopPropagation();app.removeChord(${ci})" aria-label="Remove chord">×</button>` : "";
      return `<div class="chord-card"><div class="chord-inner ${state.editingIdx===ci?"active":""}" style="--c:${col}" onclick="app.set('editingIdx',${ci})"><div class="ch-name">${esc(ch.key)} ${esc(CHORD_TYPES[ch.type]?.label)}</div><div class="ch-tones">${esc(tones.join(" "))}</div><button type="button" class="play-btn" style="margin-top:5px;font-size:10px;padding:1px 7px" onclick="event.stopPropagation();app.playChordByIndex(${ci})">Play</button></div>${del}</div>`;
    }).join("");

    const editor = renderProgEditor();
    const mapToggle = `<div class="row" style="margin-bottom:14px">${btn("Combined map", state.progMapMode==="combined", "#e8c547", "app.set('progMapMode','combined')")}${btn("Selected chord", state.progMapMode==="selected", "#7eb8d4", "app.set('progMapMode','selected')")}</div>`;

    const sharedPanel = state.showShared ? (() => { const sh = getShared(); return sh.size ? `<div class="card" style="margin-bottom:14px;background:color-mix(in srgb, var(--text-bright) 4%, var(--surface))"><div class="section-label">Shared Tones</div><div class="row">${[...sh].map(n => `<span class="tone-pill" style="--c:var(--text-bright)" onclick="app.playNote('${n}')">${esc(n)}</span>`).join("")}</div><div class="info-text" style="margin-top:6px">Notes common to adjacent chords — your smoothest melodic connection points.</div></div>` : ""; })() : "";

    const vlPanel = state.showVL ? renderVoiceLeading() : "";

    const controls = `<div class="row" style="margin-bottom:14px">
      ${btn(state.progLibOpen?"Hide library":"Load preset", state.progLibOpen, "#6dd4a8", "app.toggle('progLibOpen')")}
      ${state.progChords.length<8?btn("+ Add chord", false, "#e8c547", "app.addChord()"):""}
      ${btn(state.showShared?"Shared tones ✓":"Shared tones", state.showShared, "#fff", "app.toggle('showShared')")}
      ${btn(state.showVL?"Hide voice leading":"Voice leading", state.showVL, "#c47ed4", "app.toggle('showVL')")}
      <button type="button" class="play-btn" onclick="app.playProgression()">Play progression</button>
      ${btn(state.progLoop?"Loop ✓":"Loop", state.progLoop, "#6dd4a8", "app.toggleLoop()")}
      <button type="button" class="util-btn" onclick="app.stopAudio()">Stop</button>
    </div>`;

    const colorLegend = `<div class="legend"><div class="legend-title">Chord colors</div>${state.progChords.map((ch,ci) => { const col = PROG_COLORS[ci%PROG_COLORS.length]; return `<div class="legend-item"><div style="width:10px;height:10px;border-radius:50%;background:${col}"></div><span class="legend-text">${ci+1}. ${esc(ch.key)} ${esc(CHORD_TYPES[ch.type]?.label)}</span></div>`; }).join("")}</div>`;

    return `${controls}${lib}<div class="row" style="margin-bottom:14px">${chordCards}</div>${editor}${mapToggle}${sharedPanel}${vlPanel}${renderFretboard("progression")}${colorLegend}`;
  }

  function renderProgEditor() {
    if (state.editingIdx >= state.progChords.length) return "";
    const col = PROG_COLORS[state.editingIdx % PROG_COLORS.length];
    const ch = state.progChords[state.editingIdx];
    const keyRow = KEYS.map(k => btn(KEY_DISPLAY[k]||k, ch.key===k, col, `app.setProgChord(${state.editingIdx},'key','${k}')`)).join("");
    const typeGroups = CHORD_GROUP_ORDER.map(grp => {
      const entries = Object.entries(CHORD_TYPES).filter(([,v]) => v.group === grp);
      if (!entries.length) return "";
      return `<div style="margin-bottom:7px"><div class="group-label">${esc(grp)}</div><div class="row">${entries.map(([k,v]) => btn(v.label, ch.type===k, col, `app.setProgChord(${state.editingIdx},'type','${k}')`)).join("")}</div></div>`;
    }).join("");
    return `<div class="card" style="margin-bottom:14px;border-color:color-mix(in srgb, ${col} 35%, var(--border))"><div class="section-label">Editing chord ${state.editingIdx+1}</div><div class="mini-label">Root</div><div class="row" style="margin-bottom:8px">${keyRow}</div>${typeGroups}</div>`;
  }

  function renderVoiceLeading() {
    if (state.progChords.length < 2) return "";
    const fi = Math.min(state.vlFrom, state.progChords.length-1), ti = Math.min(state.vlTo, state.progChords.length-1);
    const fc = state.progChords[fi], tc = state.progChords[ti];
    const ft = buildTones(fc.key, CHORD_TYPES[fc.type]?.intervals || []);
    const tt = buildTones(tc.key, CHORD_TYPES[tc.type]?.intervals || []);
    const moves = bestVoiceLeading(ft, tt);
    const fcol = PROG_COLORS[fi % PROG_COLORS.length], tcol = PROG_COLORS[ti % PROG_COLORS.length];
    const fromBtns = state.progChords.map((ch,i) => btn(`${i+1}. ${ch.key} ${CHORD_TYPES[ch.type]?.label}`, state.vlFrom===i, PROG_COLORS[i%PROG_COLORS.length], `app.set('vlFrom',${i})`)).join("");
    const toBtns = state.progChords.map((ch,i) => btn(`${i+1}. ${ch.key} ${CHORD_TYPES[ch.type]?.label}`, state.vlTo===i, PROG_COLORS[i%PROG_COLORS.length], `app.set('vlTo',${i})`)).join("");
    const left = ft.map((t,i) => `<div class="vl-row" style="justify-content:flex-end"><span class="vl-note">${esc(t)}</span><span class="vl-label">${esc(CHORD_TYPES[fc.type]?.intLabels?.[i])}</span></div>`).join("");
    const mid = moves.map(m => { const q = vlQuality(m.semis); const dir = m.semis>0?"↑":m.semis<0?"↓":"="; return `<div class="vl-row" style="justify-content:center;gap:5px"><div style="font-size:13px;color:${q.color}">${dir}</div><div style="font-size:10px;color:${q.color};flex:1;text-align:center">${q.label}</div><div style="font-size:9px;color:var(--dim);font-family:monospace">${m.semis===0?"0":m.semis>0?`+${m.semis}`:m.semis}</div></div>`; }).join("");
    const right = moves.map(m => `<div class="vl-row"><span class="vl-label" style="margin-right:8px">${esc(CHORD_TYPES[tc.type]?.intLabels?.[tt.indexOf(m?.to)] || "")}</span><span class="vl-note">${esc(m?.to || "")}</span></div>`).join("");
    const common = moves.filter(m => m?.semis===0).map(m => m.from);
    const steps = moves.filter(m => Math.abs(m?.semis)<=2 && m?.semis!==0).map(m => `${m.from}→${m.to}`);
    const insight = `${common.length?`Common tones: <strong style="color:#6dd4a8">${esc(common.join(", "))}</strong> — hold these for a smooth connection. `:""}${steps.length?`Stepwise moves: <strong style="color:#e8c547">${esc(steps.join(", "))}</strong> — natural melodic flow.`:""}${moves.every(m => Math.abs(m?.semis||0)>2)?`<span style="color:#e87a7a">All voices leap — consider a passing tone to smooth the transition.</span>`:""}`;
    return `<div class="card" style="margin-bottom:16px"><div class="section-label">Voice Leading Visualizer</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px"><div><div class="mini-label">From</div><div class="row">${fromBtns}</div></div><div style="align-self:flex-end;font-size:18px;color:var(--dim);padding-bottom:4px">→</div><div><div class="mini-label">To</div><div class="row">${toBtns}</div></div></div><div class="voice-box"><div class="vl-grid"><div class="vl-side vl-left"><div style="font-size:11px;color:${fcol};margin-bottom:10px">${esc(fc.key)} ${esc(CHORD_TYPES[fc.type]?.label)}</div>${left}</div><div class="vl-mid">${mid}</div><div class="vl-side vl-right"><div style="font-size:11px;color:${tcol};margin-bottom:10px">${esc(tc.key)} ${esc(CHORD_TYPES[tc.type]?.label)}</div>${right}</div></div></div><div style="margin-top:10px;padding:10px 12px;background:var(--surface-2);border-radius:6px;border:1px solid var(--border)"><div class="mini-label">Melodic insight</div><div class="info-text">${insight}</div></div></div>`;
  }

  // ── Interval Trainer (octave-aware, tuning-aware) ──
  function renderIntervalTrainer() {
    const STR_OFF = openStringOffsets();
    const absA = state.itStr1 !== null ? STR_OFF[state.itStr1] + state.itFret1 : null;
    const absB = state.itStr2 !== null ? STR_OFF[state.itStr2] + state.itFret2 : null;
    let itInt = null, raw = null;
    if (absA !== null && absB !== null) {
      raw = Math.abs(absB - absA);
      const mod = raw % 12;
      itInt = (mod === 0 && raw >= 12) ? 12 : mod; // distinguish octave from unison
    }
    const itDef = itInt !== null ? INTERVALS[itInt] : null;

    const top = `<div class="card" style="margin-bottom:16px"><div class="section-label">Interval Trainer</div><div class="interval-status"><div style="display:flex;gap:8px;align-items:center"><div class="badge ${state.itStep>=1?"activeA":""}">A</div><span style="font-size:12px;color:${state.itStep===1?"var(--gold)":state.itNote1?"var(--text)":"var(--dim)"}">${state.itStep===1?"Tap note A on the fretboard":state.itNote1?`Note A: ${esc(state.itNote1)}`:"—"}</span></div><div style="font-size:16px;color:var(--dim)">→</div><div style="display:flex;gap:8px;align-items:center"><div class="badge ${state.itStep===2?"activeB":""}">B</div><span style="font-size:12px;color:${state.itStep===2?"var(--accent-blue)":state.itNote2?"var(--text)":"var(--dim)"}">${state.itStep===2?"Tap note B on the fretboard":state.itNote2?`Note B: ${esc(state.itNote2)}`:"—"}</span></div>${state.itStep===3?`<button type="button" class="pill" style="--c:#e87a3a;margin-left:auto" onclick="app.resetInterval()">Reset</button>`:""}</div><div class="info-text" style="margin-top:8px">Tap any two notes to measure the interval between them. The shapes you learn carry across the neck because the strings are tuned a consistent distance apart.</div></div>`;

    const result = state.itStep === 3 && itDef ? `<div style="margin-top:16px"><div class="interval-result" style="--c:${itDef.color}"><div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px"><span class="interval-title">${esc(itDef.name)}</span><span style="font-size:13px;color:var(--muted);font-family:monospace">${esc(itDef.abbr)}</span><span class="interval-meta">${raw} semitone${raw!==1?"s":""}</span><span style="font-size:11px;padding:3px 10px;border-radius:4px;background:var(--surface-2);color:var(--muted)">${esc(itDef.quality)}</span><button type="button" class="pill" style="--c:${itDef.color};margin-left:auto" onclick="app.playCurrentInterval()">Play interval</button></div><div class="info-text">${esc(IT_DESC[itInt])}</div></div>${renderIntervalOccurrences(itDef)}</div>` : "";

    const all = state.itStep === 1 ? `<div class="card" style="margin-top:16px"><div class="section-label">Interval Reference</div><div class="interval-grid">${Object.entries(INTERVALS).filter(([s])=>Number(s)<=12).map(([semis,iv]) => `<div class="interval-ref-card"><div class="interval-ref-icon" style="background:color-mix(in srgb, ${iv.color} 16%, transparent);border:1px solid color-mix(in srgb, ${iv.color} 40%, transparent)"><span style="color:${iv.color}">${esc(iv.abbr)}</span></div><div><div style="font-size:12px;color:var(--text)">${esc(iv.name)}</div><div style="font-size:10px;color:var(--dim)">${semis} semitone${semis==="1"?"":"s"} · ${esc(iv.quality)}</div></div></div>`).join("")}</div></div>` : "";

    return `<div>${top}${renderFretboard("interval")}${result}${all}</div>`;
  }

  function renderIntervalOccurrences(itDef) {
    const { effectiveOpen, displayFrets } = current();
    const strings = getOpenStrings();
    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const thick = 0.5 + si * 0.6;
      const cells = displayFrets.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0, isA = note === state.itNote1, isB = note === state.itNote2;
        const content = (isA || isB) ? `<div class="dot" style="--c:${isA?"#e8c547":"#7eb8d4"};width:22px;height:22px"><span>${isA?"A":"B"}</span></div>` : "";
        return `<div class="cell" style="height:28px" onclick="app.playNote('${note}')"><div class="string-line" style="height:${thick}px;left:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line" style="width:2px"></div>`:""}${fret>0?`<div class="fret-wire" style="top:10%;bottom:10%"></div>`:""}${content}</div>`;
      }).join("");
      return `<div class="string-row" style="margin-bottom:3px"><div class="string-label" style="font-size:12px">${esc(open)}</div>${cells}</div>`;
    }).join("");
    const minW = 52 + displayFrets.length * 46;
    return `<div class="card"><div class="section-label">Every occurrence on this tuning</div><div class="info-text" style="margin-bottom:12px">Both <span style="color:${itDef.color}">${esc(state.itNote1)}</span> and <span style="color:${itDef.color}">${esc(state.itNote2)}</span> are highlighted across the neck. Notice how the shape repeats — that consistency is what makes the fretboard learnable.</div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px">${rows}</div></div></div>`;
  }

  // ── Key Finder (reverse lookup) ──
  function renderFinder() {
    const chordCards = state.finderChords.map((ch,ci) => {
      const del = state.finderChords.length > 1 ? `<button type="button" class="delete-x" onclick="event.stopPropagation();app.removeFinderChord(${ci})" aria-label="Remove">×</button>` : "";
      return `<div class="chord-card"><div class="chord-inner ${state.finderEditIdx===ci?"active":""}" style="--c:#6dd4a8" onclick="app.set('finderEditIdx',${ci})"><div class="ch-name">${esc(ch.key)} ${esc(CHORD_TYPES[ch.type]?.label)}</div></div>${del}</div>`;
    }).join("");
    const ch = state.finderChords[state.finderEditIdx] || state.finderChords[0];
    const keyRow = KEYS.map(k => btn(KEY_DISPLAY[k]||k, ch.key===k, "#6dd4a8", `app.setFinderChord('key','${k}')`)).join("");
    const commonTypes = ["maj","min","7","maj7","min7","dim","m7b5","sus4"];
    const typeRow = commonTypes.map(k => btn(CHORD_TYPES[k].label, ch.type===k, CHORD_TYPES[k].color, `app.setFinderChord('type','${k}')`)).join("");
    const results = findKeys(state.finderChords);
    const resultCards = results.map(r => {
      const pct = Math.round((r.matches / r.total) * 100);
      const dia = DIATONIC[r.mode];
      const diatonicChords = dia.degrees.map((d,i) => `${transpose(r.root,d)}${dia.triads[i]==="min"?"m":dia.triads[i]==="dim"?"°":""}`).join("  ");
      return `<div class="saved-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:15px;color:var(--text-bright)">${esc(r.root)} ${esc(r.mode)}</span><span style="font-size:12px;color:${pct===100?"#6dd4a8":"var(--muted)"}">${r.matches}/${r.total} chords</span></div><div class="info-text" style="font-size:11px">${esc(diatonicChords)}</div><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;margin-top:8px" onclick="app.useKeyForScale('${r.root}','${r.mode}')">Show scale</button></div>`;
    }).join("");

    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Key Finder</div><div class="info-text" style="margin-bottom:12px">Enter the chords from a song or progression and Open Strings will suggest the most likely keys, showing how many of your chords fit each one.</div><div class="row" style="margin-bottom:12px">${chordCards}${state.finderChords.length<8?`<button type="button" class="util-btn" onclick="app.addFinderChord()">+ Add</button>`:""}</div><div class="mini-label">Root of chord ${state.finderEditIdx+1}</div><div class="row" style="margin-bottom:10px">${keyRow}</div><div class="mini-label">Quality</div><div class="row">${typeRow}</div></div>
      <div class="card"><div class="section-label">Most Likely Keys</div><div class="saved-list">${resultCards}</div></div>`;
  }

  // ── Quiz ──
  function renderQuiz() {
    if (!state.quizQuestion) newQuizQuestion();
    const q = state.quizQuestion;
    const result = state.quizAnswer ? `<div class="status-note" style="border-color:${state.quizAnswer.correct?"#6dd4a8":"#e87a7a"}">${state.quizAnswer.correct?"Correct.":`Not quite — the answer is ${esc(q.answer)}.`}</div>` : "";
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Chord-Tone Quiz</div><div style="font-size:18px;color:var(--text-bright);margin-bottom:10px">${esc(q.prompt)}</div><div class="quiz-answer">${q.choices.map(c => btn(c, false, "#e8c547", `app.answerQuiz('${c}')`)).join("")}</div><div class="info-text" style="margin:10px 0">Score ${state.quizScore} · Streak ${state.quizStreak}</div>${result}<div class="row" style="margin-top:10px"><button type="button" class="accent-btn" onclick="app.newQuizQuestion()">Next question</button></div></div>${renderFretboard("single")}`;
  }
  function newQuizQuestion() {
    const root = KEYS[Math.floor(Math.random()*KEYS.length)];
    const typeKeys = ["maj","min","7","maj7","min7","sus2","sus4","dim","6","9"];
    const type = typeKeys[Math.floor(Math.random()*typeKeys.length)];
    const def = CHORD_TYPES[type];
    const tones = buildTones(root, def.intervals);
    const ti = Math.floor(Math.random()*tones.length);
    const answer = tones[ti], label = def.intLabels[ti];
    const distractors = KEYS.filter(k => k !== answer).sort(() => Math.random()-.5).slice(0,3);
    const choices = [answer, ...distractors].sort(() => Math.random()-.5);
    state.selectedKey = root; state.selectedType = type;
    state.quizQuestion = { prompt: `In ${root} ${def.label}, which note is the ${label}?`, answer, choices };
    state.quizAnswer = null;
  }

  // ── Ear Training ──
  function renderEar() {
    if (!state.earQuestion) newEarQuestion();
    const q = state.earQuestion;
    const choices = Object.entries(CHORD_TYPES).filter(([k]) => ["maj","min","7","maj7","min7","dim","sus4","aug","m7b5","6"].includes(k));
    const result = state.earAnswer ? `<div class="status-note" style="border-color:${state.earAnswer.correct?"#6dd4a8":"#e87a7a"}">${state.earAnswer.correct?"Correct.":`That was a ${esc(CHORD_TYPES[q.type].label)} chord.`}</div>` : "";
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Ear Training</div><div style="font-size:18px;color:var(--text-bright);margin-bottom:10px">Listen, then identify the chord quality</div><div class="info-text" style="margin-bottom:12px">The root is randomised each round, so focus on the overall colour and quality rather than individual notes.</div><div class="row" style="margin-bottom:12px"><button type="button" class="play-btn" onclick="app.playEarQuestion()">Play chord</button><button type="button" class="accent-btn" onclick="app.newEarQuestion()">New chord</button></div><div class="quiz-answer">${choices.map(([k,v]) => btn(v.label, false, v.color, `app.answerEar('${k}')`)).join("")}</div><div class="info-text" style="margin:10px 0">Score ${state.earScore}</div>${result}</div>`;
  }
  function newEarQuestion() {
    const typeKeys = ["maj","min","7","maj7","min7","dim","sus4","aug","m7b5","6"];
    const type = typeKeys[Math.floor(Math.random()*typeKeys.length)];
    const root = KEYS[Math.floor(Math.random()*KEYS.length)];
    state.earQuestion = { root, type };
    state.earAnswer = null;
  }

  // ── Saved charts ──
  function renderSavedCharts() {
    const list = state.savedCharts.length ? state.savedCharts.map((c,i) => `<div class="saved-card"><div style="font-size:13px;color:var(--text-bright);margin-bottom:4px">${esc(c.name)}</div><div class="info-text" style="font-size:11px;margin-bottom:8px">${esc(c.summary)}</div><div class="row"><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px" onclick="app.loadSavedChart(${i})">Load</button><button type="button" class="pill" style="--c:#e87a7a;font-size:11px" onclick="app.deleteSavedChart(${i})">Delete</button></div></div>`).join("") : `<div class="info-text">No saved charts yet. Build something and save it for quick recall.</div>`;
    return `<div class="card" style="margin-bottom:16px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap"><div class="section-label" style="margin:0">Saved Charts</div><input type="text" placeholder="Name this chart" value="${esc(state.savedName)}" oninput="app.setSavedName(this.value)" style="flex:1;min-width:140px" aria-label="Chart name" /><button type="button" class="accent-btn" onclick="app.saveCurrentChart()">Save current</button></div><div class="saved-list">${list}</div></div>`;
  }

        <div class="workflow"><div class="w-title">Write your own progression</div><div class="w-body">Start in <strong>Progression Suggester</strong> with a key and mood, load a suggestion you like, then refine it in <strong>Progression</strong> mode. Turn on <strong>Voice Leading</strong> and <strong>Shared tones</strong> to find melody notes that move smoothly between chords.</div></div>

      <div class="help-section"><h3>Saving & sharing</h3><div class="sub">Getting charts out of the app.</div>
        <ul style="margin:0;padding-left:18px">
          <li style="font-size:13px;color:var(--muted);line-height:1.8"><strong style="color:var(--text-bright)">Save</strong> stores a chart in your browser to reload later. <strong>Link</strong> copies a URL that reopens the exact view.</li>
          <li style="font-size:13px;color:var(--muted);line-height:1.8"><strong style="color:var(--text-bright)">Print / PNG / SVG</strong> export exactly the chart shown — not the whole screen. For printing, choose landscape and press <span class="kbd">Cmd/Ctrl</span> + <span class="kbd">P</span> if it doesn't appear automatically.</li>
        </ul></div>`;
    } else {
      body = `<div class="help-section"><h3>Frequently asked</h3><dl class="help-faq">
        <dt>There's no sound.</dt><dd>Browsers only allow audio after you interact with the page. Tap any note or button once and sound will start. Check your device isn't muted, and raise the Volume in Preferences.</dd>
        <dt>Do I need an internet connection?</dt><dd>No. Everything runs in the page itself. Once it's loaded you can use it fully offline.</dd>
        <dt>Is my data saved anywhere?</dt><dd>Saved charts and your theme live only in your own browser's local storage. Nothing is sent anywhere.</dd>
        <dt>The voicings aren't the exact shapes I know.</dt><dd>Voicings are generated to be correct and playable for your tuning — every note shown belongs to the chord and the root is always included. For common open chords they match the familiar shapes; for dense chords they find a reachable subset rather than a single "official" grip.</dd>
        <dt>Why do some chords have no voicing?</dt><dd>A few very dense chords can't be fully fingered on four strings within reach. The app shows the best reachable version, or a note if none fits.</dd>
        <dt>Can I use it on my phone?</dt><dd>Yes. The neck scrolls sideways; use the Fret range buttons to zoom in. Add it to your home screen for an app-like experience.</dd>
        <dt>How do I put a chart on paper?</dt><dd>Configure the view, then Print (choose landscape) or export a PNG/SVG. The export shows exactly what's on screen, including any scale overlay and fret range.</dd>
      </dl></div>`;
    }

    return `<div class="help-panel" style="background:transparent;border:none;padding:0">
      <div class="help-nav">${nav}</div>
      ${body}
    </div>`;
  }

    const waveBtns = ["triangle","sine","square","sawtooth"].map(w => btn(w, state.audioWave===w, "#a8c4e8", `app.set('audioWave','${w}')`)).join("");

      <div style="display:flex;flex-wrap:wrap;gap:18px">
        <div><div class="mini-label">Dot labels</div><div class="row">${btn("Intervals", state.noteDisplay==="interval", "#e8c547", "app.set('noteDisplay','interval')")}${btn("Note names", state.noteDisplay==="note", "#e8c547", "app.set('noteDisplay','note')")}</div></div>
        <div><div class="mini-label">Accidentals</div><div class="row">${btn("Sharps ♯", state.accidental==="sharp", "#7eb8d4", "app.set('accidental','sharp')")}${btn("Flats ♭", state.accidental==="flat", "#7eb8d4", "app.set('accidental','flat')")}</div></div>

        <div style="min-width:160px"><div class="mini-label">Volume</div><input type="range" min="0.02" max="0.4" step="0.02" value="${state.audioVolume}" oninput="app.set('audioVolume',parseFloat(this.value))" style="width:100%" aria-label="Volume" /></div>
        <div style="min-width:160px"><div class="mini-label">Progression tempo</div><input type="range" min="300" max="1400" step="50" value="${state.progTempo}" oninput="app.set('progTempo',parseInt(this.value))" style="width:100%" aria-label="Tempo" /><div class="info-text" style="font-size:10px">${Math.round(60000/state.progTempo)} BPM</div></div>
      </div></div>`;
