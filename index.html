  function renderSetupPanel() {
    const inst = INSTRUMENTS[state.instrument];
    const instOptions = Object.entries(INSTRUMENTS).map(([k,v]) => `<option value="${k}" ${state.instrument===k?"selected":""}>${esc(v.label)}</option>`).join("");
    const tuningOptions = Object.entries(inst.tunings).map(([k,v]) => `<option value="${k}" ${state.tuningName===k?"selected":""}>${esc(v.label)}</option>`).join("");
    const customField = state.instrument === "custom" ? `<div class="field setup-custom"><label>Custom notes (4–6, low → high)</label><div style="display:flex;gap:6px"><input type="text" id="customTuning" value="${esc(state.customTuningText)}" oninput="app.setCustomTuningText(this.value)" style="flex:1" aria-label="Custom tuning notes" /><button type="button" class="util-btn" onclick="app.applyCustomTuning()">Set</button></div></div>` : "";
    const capoButtons = Array.from({length:8}, (_,i) => btn(i===0?"None":`Fret ${i}`, state.capo===i, "#a8c4e8", `app.set('capo',${i})`)).join("");
    return `<div class="setup-panel">
      <div class="setup-head"><div><div class="section-label">Setup</div><div class="info-text">These settings apply everywhere: charts, tuner tones, fretboards, voicings, and practice tools.</div></div><button type="button" class="util-btn" onclick="app.toggle('showSetup')">Close</button></div>
      <div class="setup-grid">
        <div class="field"><label>Instrument</label><select onchange="app.setInstrument(this.value)" aria-label="Instrument">${instOptions}</select></div>
        <div class="field"><label>Tuning</label><select onchange="app.setTuning(this.value)" aria-label="Tuning">${tuningOptions}</select></div>
        <div class="field grow"><label>Capo</label><div class="row">${capoButtons}</div>${state.capo>0?`<div class="info-text" style="margin-top:8px">Sounding tuning: ${esc(getOpenStrings().map(s=>noteAtFret(s,state.capo)).join(" "))}</div>`:""}</div>
        ${customField}
      </div>
    </div>`;
  }

  function renderScaleOverlayCard() {
    const scaleTypeButtons = `<button type="button" class="pill ${state.scaleType===null?"active":""}" style="--c:#888" onclick="app.set('scaleType',null)">Off</button>` +
      Object.entries(SCALES).map(([k,v]) => btn(v.label, state.scaleType===k, v.color, `app.set('scaleType','${k}')`)).join("");
    const compact = state.scaleType ? `${esc(state.scaleKey)} ${esc(SCALES[state.scaleType].label)} — <span style="color:var(--muted)">${esc(buildTones(state.scaleKey, SCALES[state.scaleType].intervals).join(" "))}</span> <button type="button" class="pill" style="--c:#888;font-size:10px;padding:2px 7px;margin-left:6px" onclick="app.set('scaleType',null)">clear</button>` : `No scale active — tap configure to show passing tones around the chord.`;
    return `<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px"><div class="section-label" style="margin:0">Scale Overlay</div><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;padding:3px 9px" onclick="app.toggle('showScalePanel')">${state.showScalePanel?"hide":"configure"}</button></div>
      ${state.showScalePanel ? `<div class="mini-label">Root</div><div class="row" style="margin-bottom:8px">${keyButtons(state.scaleKey, state.scaleType?SCALES[state.scaleType].color:"#6dd4a8", "app.setScaleKey")}</div><div class="mini-label">Type</div><div class="row">${scaleTypeButtons}</div>` : `<div class="info-text">${compact}</div>`}
    </div>`;
  }

  // ── Single chord mode ──
  function renderSingle() {
    const { chordDef, singleTones } = current();
    const chordColor = chordDef.color;
    const keyRow = keyButtons(state.selectedKey, chordColor, "app.setSelectedKey");
    const typeGroups = CHORD_GROUP_ORDER.map(grp => {
      const entries = Object.entries(CHORD_TYPES).filter(([,v]) => v.group === grp);
      if (!entries.length) return "";
      return `<div style="margin-bottom:8px"><div class="group-label">${esc(grp)}</div><div class="row">${entries.map(([k,v]) => btn(v.label, state.selectedType===k, v.color, `app.setSelectedType('${k}')`)).join("")}</div></div>`;
    }).join("");

    const tonePills = singleTones.map((t,i) => `<span class="tone-pill ${i===0?"root":""}" style="--c:${chordColor}" onclick="app.playNote('${t}')">${esc(t)} <span style="opacity:.6;font-size:10px">${esc(chordDef.intLabels?.[i]||"")}</span></span>`).join("");
    const swapTypes = ["maj","min","7","maj7","min7","sus2","sus4","add9","9","6","m6","13"].filter(k => k !== state.selectedType);
    const quickSwap = swapTypes.slice(0,8).map(k => { const v = CHORD_TYPES[k]; return `<button type="button" class="pill" style="--c:${v.color};font-size:11px" onclick="app.setSelectedType('${k}')">${esc(state.selectedKey)} ${esc(v.label)}</button>`; }).join("");

    // Diatonic panel
    const diatonicPanel = renderDiatonicPanel();

    // Voicings — generated live for the current tuning
    let voicingSection = "";
    {
      const strings = getOpenStrings();
      const spanByInst = state.instrument === "bass" ? 5 : 4;
      const vs = state.showVoicings ? getVoicings(strings, state.selectedKey, chordDef, spanByInst, state.selectedBass || null) : [];
      const cards = vs.length ? vs.map((v,i) => renderVoicingCard(v, i, chordColor, strings)).join("") : `<div class="info-text" style="padding:8px">No comfortable voicing found for this chord on the current tuning within reach. Try a different inversion by ear, or a nearby key.</div>`;
      voicingSection = `<div style="margin-top:18px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="section-label" style="margin:0">Playable Voicings (${esc(strings.join(" "))})</div><button type="button" class="pill" style="--c:${chordColor};font-size:11px;padding:3px 10px" onclick="app.toggle('showVoicings')">${state.showVoicings?"hide":"show"}</button></div>${state.showVoicings ? `<div class="voicing-wrap">${cards}</div><div class="info-text" style="margin-top:8px">Generated for ${esc(strings.join(" "))}. Diagrams mirror your handedness preference; × means that string is not played. Position numbers show the fret.</div>` : ""}</div>`;
    }

    const bassSection = renderBassNotePicker(state.selectedBass, state.selectedKey, state.selectedType, chordColor, "app.setSelectedBass", null);
    const legend = renderLegend(chordColor);
    return `<div class="mode-intro"><div><div class="section-label">Chord Tones</div><div class="info-text">Choose a chord and see every tone on your current instrument setup. Use Bass note to make inversions and slash chords.</div></div></div>
      <div class="card" style="margin-bottom:14px"><div class="section-label">Root</div><div class="row">${keyRow}</div></div>
      <div class="card" style="margin-bottom:14px"><div class="section-label">Chord Type</div>${typeGroups}</div>
      ${diatonicPanel}
      ${renderScaleOverlayCard()}
      <div class="summary" style="--c:${chordColor}"><div class="summary-head"><span class="name">${esc(chordSymbol({ key: state.selectedKey, type: state.selectedType, bass: state.selectedBass }))} <span style="font-size:13px;color:var(--muted)">${esc(chordDef.label)}</span></span><button type="button" class="play-btn" onclick="app.playSingleChord()">Play</button></div><div class="row">${tonePills}</div>${bassSection}<div style="margin-top:12px"><div class="group-label">Quick swap</div><div class="row">${quickSwap}</div></div></div>
      ${renderFretboard("single")}
      ${voicingSection}
      ${legend}`;
  }

  function renderDiatonicPanel() {
    const headBtn = `<button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;padding:3px 9px" onclick="app.toggle('showDiatonic')">${state.showDiatonic?"hide":"show"}</button>`;
    if (!state.showDiatonic) {
      return `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between"><div class="section-label" style="margin:0">Diatonic Chords in Key</div>${headBtn}</div></div>`;
    }
    const diaKey = state.diatonicKey || state.selectedKey;
    const dia = DIATONIC[state.diatonicMode];
    const useSeventh = state.diatonicSevenths;
    const keyRow = keyButtons(diaKey, "#6dd4a8", "app.setDiatonicKey");
    const chips = dia.degrees.map((deg,i) => {
      const root = transpose(diaKey, deg);
      const type = useSeventh ? dia.sevenths[i] : dia.triads[i];
      const def = CHORD_TYPES[type] || CHORD_TYPES.maj;
      return `<div class="diatonic-chip" onclick="app.loadDiatonic('${root}','${type}')"><div class="dia-roman">${esc(dia.romans[i])}</div><div class="dia-name">${esc(spell(root))} ${esc(def.label.replace(' ',''))}</div></div>`;
    }).join("");
    return `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="section-label" style="margin:0">Diatonic Chords in ${esc(spell(diaKey))} ${state.diatonicMode}</div>${headBtn}</div>
      <div class="mini-label">Diatonic key</div>
      <div class="row" style="margin-bottom:10px">${keyRow}</div>
      <div class="row" style="margin-bottom:10px">${btn("Major key", state.diatonicMode==="major", "#e8c547", "app.set('diatonicMode','major')")}${btn("Minor key", state.diatonicMode==="minor", "#7eb8d4", "app.set('diatonicMode','minor')")}${btn(useSeventh?"7th chords":"Triads", true, "#6dd4a8", "app.toggle('diatonicSevenths')")}</div>
      <div class="diatonic-wrap">${chips}</div>
      <div class="info-text" style="margin-top:10px">These seven chords are built from the ${esc(spell(diaKey))} ${state.diatonicMode} scale. Tap any to load it on the fretboard without changing this diatonic key.</div></div>`;
  }

  function renderVoicingCard(voicing, idx, chordColor, strings) {
    strings = strings || getOpenStrings();
    const root = state.selectedKey;
    const lefty = state.leftHanded;
    const fretted = voicing.filter(f => f !== null && f > 0);
    const anyFretted = fretted.length > 0;
    const minF = anyFretted ? Math.min(...fretted) : 0;
    const maxF = anyFretted ? Math.max(...fretted) : 0;
    const usesOpen = voicing.some(f => f === 0);
    let dMin, dMax;
    if (usesOpen || minF <= 2) { dMin = 0; dMax = Math.max(4, maxF); }
    else { dMin = minF - 1; dMax = Math.max(dMin + 4, maxF + 1); }
    const span = dMax - dMin;
    const colW = 20;
    const frets = Array.from({ length: span + 1 }, (_, i) => i + dMin);
    const drawFrets = lefty ? [...frets].reverse() : frets;
    const rowHeight = 20;

    let rowsHtml = "";
    for (let row = 0; row < strings.length; row++) {
      const stringIndex = strings.length - 1 - row; // top row = highest string
      const fp = voicing[stringIndex];
      let cell = "";
      if (fp === null) {
        cell = `<span style="position:absolute;${lefty?"right":"left"}:-13px;top:-6px;font-size:11px;color:var(--dim)">×</span>`;
      } else {
        const note = noteAtFret(strings[stringIndex], fp);
        const isRoot = note === root;
        const fi = drawFrets.indexOf(fp);
        const pos = fi >= 0 ? fi * colW + colW / 2 - 7 : -100;
        if (fp === 0) {
          cell = `<div style="position:absolute;${lefty?"right":"left"}:-13px;top:-6px;width:11px;height:11px;border-radius:50%;border:2px solid ${isRoot ? "var(--text-bright)" : chordColor};background:transparent" title="${esc(note)} (open)"></div>`;
        } else {
          cell = `<div style="position:absolute;left:${pos}px;top:-7px;width:15px;height:15px;border-radius:50%;background:${isRoot ? "var(--root-fill)" : chordColor};border:${isRoot ? `2px solid ${chordColor}` : "none"};z-index:2;display:flex;align-items:center;justify-content:center" title="${esc(note)}"><span style="font-size:7px;font-weight:bold;color:${isRoot ? chordColor : "var(--dot-text)"};font-family:monospace">${isRoot ? "R" : ""}</span></div>`;
        }
      }
      const label = `<div style="width:16px;text-align:${lefty?"left":"right"};font-size:9px;color:var(--muted)">${esc(spell(strings[stringIndex]))}</div>`;
      const line = `<div style="position:relative;width:${frets.length * colW}px;height:2px;background:var(--wire)">${cell}</div>`;
      rowsHtml += `<div style="display:flex;align-items:center;height:${rowHeight}px;gap:6px">${lefty?line+label:label+line}</div>`;
    }

    const gridLines = drawFrets.map((f, fi) => `<div style="position:absolute;left:${fi * colW}px;top:0;bottom:18px;width:1px;background:${f === 0 ? "var(--nut)" : "var(--fret)"}"></div>`).join("");
    const fretNums = drawFrets.map(f => `<div style="width:${colW}px;text-align:center;font-size:8px;color:var(--faint);font-family:monospace">${f}</div>`).join("");
    const fretArg = JSON.stringify(voicing).replace(/null/g, "null");

    return `<div class="voicing-card"><div class="voicing-title">voicing ${idx + 1}${lefty?" · lefty":""}</div>
      <div style="position:relative;padding-${lefty?"right":"left"}:22px">
        <div style="position:relative;margin-left:0">${gridLines}<div style="position:relative">${rowsHtml}</div><div style="display:flex;margin-top:2px;padding-left:0">${fretNums}</div></div>
      </div>
      <button type="button" class="pill" style="--c:${chordColor};font-size:10px;padding:2px 8px;margin-top:8px;width:100%" onclick='app.playVoicingFrets(${fretArg})'>Preview</button>
    </div>`;
  }

  function renderLegend(chordColor) {
    const { scaleDef } = current();
    const scaleItem = scaleDef ? `<div class="legend-item"><div class="scale-dot" style="--c:${scaleDef.color};position:static"></div><span class="legend-text">Scale tone</span></div>` : "";
    return `<div class="legend"><div class="legend-title">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--root-fill);border:2px solid ${chordColor}"><span style="color:${chordColor}">R</span></div><span class="legend-text">Root</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:${chordColor}"><span style="color:var(--dot-text)">3</span></div><span class="legend-text">Chord tone</span></div>
      ${scaleItem}
      <span class="legend-text" style="margin-left:auto;align-self:center">Tap any dot to hear the note</span></div>`;
  }

  // ── Progression mode ──
  function renderProgression() {
    const hasChords = Array.isArray(state.progChords) && state.progChords.length;
    const analysisKey = state.suggestKey || state.selectedKey || (hasChords ? state.progChords[0].key : "C");
    const analysisMode = hasChords ? (detectMinorKey(state.progChords) ? "minor" : "major") : "major";
    const chipRow = hasChords ? state.progChords.map((ch, i) => {
      const col = PROG_COLORS[i % PROG_COLORS.length];
      const active = state.editingIdx === i ? "active" : "";
      const info = romanInfoForChord(ch, analysisKey, analysisMode);
      const roman = info ? info.roman : "";
      const sym = chordSymbol(ch);
      return `<span class="workbar-chip ${active}" style="--c:${col}" onclick="app.selectProgressionChord(${i})" title="${esc(roman ? roman + ' — ' + info.role : sym)}"><span class="chip-roman">${esc(roman)}</span><span class="chip-name">${esc(sym)}</span><span class="chip-moves"><button type="button" aria-label="Move left" onclick="event.stopPropagation();app.moveChordLeft(${i})">‹</button><button type="button" aria-label="Move right" onclick="event.stopPropagation();app.moveChordRight(${i})">›</button></span></span>`;
    }).join("") : `<span class="suggest-empty">No progression yet. Start in Studio or add a chord below.</span>`;
    const topActions = `<div class="workbar-actions">
      <button type="button" class="accent-btn" onclick="app.playProgression()">Play</button>
      ${btn(state.progLoop?"Loop on":"Loop", state.progLoop, "#6dd4a8", "app.toggleLoop()")}
      <button type="button" class="util-btn" onclick="app.stopAudio()">Stop</button>
      ${hasChords && state.progChords.length < 8 ? `<button type="button" class="util-btn" onclick="app.addChord()">Add chord</button>` : ""}
      ${hasChords ? `<button type="button" class="util-btn" onclick="app.printChart()">Print</button>` : ""}
      ${hasChords ? `<button type="button" class="util-btn danger" onclick="app.clearProgression()">Clear</button>` : ""}
    </div>`;
    const bassShapeRow = (hasChords && state.progChords.length >= 2) ? `<div class="workbar-bass"><div class="mini-label" style="margin-bottom:4px">Shape the bass line</div><div class="row">${[["smooth","Smooth"],["descend","Walk down"],["pedal","Pedal"],["chromatic","Chromatic pull"]].map(([s,l]) => `<button type="button" class="util-btn" onclick="app.applyBassStyle('${s}')">${l}</button>`).join("")}${state.studyBassApplied ? `<button type="button" class="util-btn danger" onclick="app.removeBassStyle()">Reset bass</button>` : ""}</div>${state.studyBassExpl ? `<div class="info-text" style="font-style:italic;margin-top:6px">♩ ${esc(state.studyBassExpl)}</div>` : ""}</div>` : "";
    const workbar = `<div class="progression-workbar"><div class="workbar-head"><div><div class="section-label">Current Progression</div><div class="info-text">Tap a chord to edit it. Use ‹ › to reorder. Everything below follows this order.</div></div>${topActions}</div><div class="workbar-strip">${chipRow}</div>${bassShapeRow}</div>`;
    const tabs = [["fretboard","Fretboard"],["edit","Edit chords"],["voice","Voice leading"],["notes","Songwriter notes"],["charts","Charts"],["library","Library"]].map(([k,l]) => btn(l, state.progTab===k, k==="fretboard"?"#e8c547":k==="edit"?"#7eb8d4":k==="voice"?"#c47ed4":k==="notes"?"#6dd4a8":k==="charts"?"#e8823a":"#a8c4e8", `app.set('progTab','${k}')`)).join("");

    const genreTabs = Object.keys(PROGRESSION_LIBRARY).map(g => btn(g, state.activeGenre===g, "#6dd4a8", `app.set('activeGenre','${g.replace(/'/g,"\\'")}')`)).join("");
    const presets = PROGRESSION_LIBRARY[state.activeGenre].map((p,i) => `<button type="button" class="util-btn" onclick="app.applyPreset(${i})">${esc(p.label)}</button>`).join("");
    const library = `<div class="card"><div class="section-label">Progression Library</div><div class="info-text" style="margin-bottom:10px">Load a familiar progression, then edit, study, or print it.</div><div class="mini-label">Key</div><div class="row" style="margin-bottom:10px">${keyButtons(state.selectedKey, "#e8c547", "app.setSelectedKey")}</div><div class="row" style="margin-bottom:10px">${genreTabs}</div><div class="row">${presets}</div></div>`;

    const chordCards = hasChords ? state.progChords.map((ch,ci) => {
      const col = PROG_COLORS[ci % PROG_COLORS.length];
      const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
      const label = chordSymbol(ch);
      const info = romanInfoForChord(ch, analysisKey, analysisMode);
      const romanBadge = info ? `<div style="font-size:9px;color:${info.color || "var(--muted)"};margin-top:3px;font-family:ui-monospace,monospace">${esc(info.roman)} · ${esc(info.role)}</div>` : "";
      const del = state.progChords.length > 1 ? `<button type="button" class="delete-x" onclick="event.stopPropagation();app.removeChord(${ci})" aria-label="Remove chord">×</button>` : "";
      return `<div class="chord-card"><div class="chord-inner ${state.editingIdx===ci?"active":""}" style="--c:${col}" onclick="app.selectProgressionChord(${ci})"><div class="ch-name">${ci+1}. ${esc(label)}</div><div class="ch-tones">${esc(tones.join(" "))}</div>${romanBadge}<button type="button" class="play-btn" style="margin-top:5px;font-size:10px;padding:1px 7px" onclick="event.stopPropagation();app.playChordByIndex(${ci})">Preview</button><div class="reorder-row"><button type="button" class="chord-move-btn" onclick="event.stopPropagation();app.moveChordLeft(${ci})" aria-label="Move ${esc(label)} left">‹</button><span class="mini-label" style="margin:0">move</span><button type="button" class="chord-move-btn" onclick="event.stopPropagation();app.moveChordRight(${ci})" aria-label="Move ${esc(label)} right">›</button></div></div>${del}</div>`;
    }).join("") : "";
    const edit = `<div class="card"><div class="section-label">Edit chords</div><div class="info-text" style="margin-bottom:10px">Select a chord, change its root or type, then use the move buttons to place it where it belongs.</div><div class="row" style="margin-bottom:12px">${state.progChords.length<8?`<button type="button" class="accent-btn" onclick="app.addChord()">Add chord</button>`:""}<button type="button" class="util-btn" onclick="app.set('progTab','library')">Load preset</button></div><div class="row" style="margin-bottom:14px">${chordCards}</div>${hasChords?renderProgEditor():""}</div>`;

    const dotToggle = state.progMapMode === "combined" ? `${btn("Single color", state.sharedDotMode==="single", "#a8c4e8", "app.set('sharedDotMode','single')")}${btn("Shared tones", state.sharedDotMode==="shared", "#6dd4a8", "app.set('sharedDotMode','shared')")}` : "";
    const mapToggle = `<div class="row" style="margin-bottom:10px">${btn("Combined map", state.progMapMode==="combined", "#e8c547", "app.set('progMapMode','combined')")}${btn("Selected chord", state.progMapMode==="selected", "#7eb8d4", "app.set('progMapMode','selected')")}${btn(state.showShared?"Shared tones on":"Shared tones", state.showShared, "#fff", "app.toggle('showShared')")}</div>${dotToggle ? `<div class="row" style="margin-bottom:14px;align-items:center"><div class="mini-label" style="margin:0 4px 0 0">Dot style</div>${dotToggle}</div>` : ""}`;
    const sharedPanel = state.showShared ? (() => { const sh = getShared(); return sh.size ? `<div class="card" style="margin-bottom:14px;background:color-mix(in srgb, var(--text-bright) 4%, var(--surface))"><div class="section-label">Shared Tones</div><div class="row">${[...sh].map(n => `<span class="tone-pill" style="--c:var(--text-bright)" onclick="app.playNote('${n}')">${esc(n)}</span>`).join("")}</div><div class="info-text" style="margin-top:6px">Notes common to adjacent chords — your smoothest melodic connection points.</div></div>` : ""; })() : "";
    const sharedLegend = (state.progMapMode === "combined" && state.sharedDotMode === "shared") ? `<div class="legend-item"><div style="width:11px;height:11px;border-radius:50%;background:conic-gradient(#e8c547 0% 50%,#7eb8d4 50% 100%)"></div><span class="legend-text">Shared tone (split color)</span></div><div class="legend-item"><div style="width:13px;height:13px;border-radius:50%;background:conic-gradient(#e8c547 0% 33%,#7eb8d4 33% 66%,#e87a3a 66% 100%);box-shadow:0 0 6px rgba(255,255,255,0.4)"></div><span class="legend-text">Anchor note (3+ chords)</span></div>` : "";
    const colorLegend = hasChords ? `<div class="legend"><div class="legend-title">Chord colors</div>${state.progChords.map((ch,ci) => { const col = PROG_COLORS[ci%PROG_COLORS.length]; return `<div class="legend-item"><div style="width:10px;height:10px;border-radius:50%;background:${col}"></div><span class="legend-text">${ci+1}. ${esc(chordSymbol(ch))}</span></div>`; }).join("")}${sharedLegend}</div>` : "";
    const fretboard = hasChords ? `<div class="card"><div class="section-label">Progression Fretboard</div><div class="info-text" style="margin-bottom:10px">Map the full progression or focus on the selected chord.</div>${mapToggle}${sharedPanel}${renderFretboard("progression")}${colorLegend}</div>` : `<div class="card"><div class="section-label">Progression Fretboard</div><div class="info-text">Build or load a progression first. Studio is the fastest way to start.</div><button type="button" class="accent-btn" onclick="app.setMode('suggest')">Open Studio</button></div>`;

    const voice = hasChords && state.progChords.length > 1 ? `<div class="card"><div class="section-label">Voice Leading</div><div class="info-text" style="margin-bottom:10px">Compare two chords and look for common tones or small moves. These are good melody and arrangement targets.</div>${renderVoiceLeading()}</div>` : `<div class="card"><div class="section-label">Voice Leading</div><div class="info-text">Add at least two chords to compare movement.</div></div>`;
    const notes = `<div>${renderSongwriterAnalysis(state.selectedKey)}</div>`;
    const charts = `<div class="card"><div class="section-label">Charts & Export</div><div class="info-text" style="margin-bottom:12px">Print or save the current progression as a practice sheet.</div><div class="row"><button type="button" class="accent-btn" onclick="app.printChart()">Print</button><button type="button" class="util-btn" onclick="app.sharePNG()">Share</button><button type="button" class="util-btn" onclick="app.savePNG()">PNG</button><button type="button" class="util-btn" onclick="app.downloadSVG()">SVG</button><button type="button" class="util-btn" onclick="app.copyStateLink()">Link</button></div></div>${renderSavedCharts()}`;
    let panel = fretboard;
    if (state.progTab === "edit") panel = edit;
    else if (state.progTab === "voice") panel = voice;
    else if (state.progTab === "notes") panel = notes;
    else if (state.progTab === "charts") panel = charts;
    else if (state.progTab === "library") panel = library;
    return `<div class="mode-intro"><div><div class="section-label">Study Progression</div><div class="info-text">Hear, edit, visualize, explain, and export the progression you built in Studio.</div></div></div>${workbar}<div class="studio-tabs">${tabs}</div>${panel}`;
  }

  function renderProgEditor() {
    if (state.editingIdx >= state.progChords.length) return "";
    const col = PROG_COLORS[state.editingIdx % PROG_COLORS.length];
    const ch = state.progChords[state.editingIdx];
    const keyRow = KEYS.map(k => btn(KEY_DISPLAY[k]||k, ch.key===k, col, `app.setProgChord(${state.editingIdx},'key','${k}')`)).join("");
    const typeGroups = CHORD_GROUP_ORDER.map(grp => {
      const entries = Object.entries(CHORD_TYPES).filter(([,v]) => v.group === grp);
      if (!entries.length) return "";
      return `<div style="margin-bottom:7px"><div class="group-label">${esc(grp)}</div><div class="row">${entries.map(([k,v]) => btn(v.label, ch.type===k, col, `app.setProgChord(${state.editingIdx},'type','${k}')`)).join("")}</div></div>`;
    }).join("");
    const bassSection = renderBassNotePicker(ch.bass || null, ch.key, ch.type, col, "app.setProgChordBass", state.editingIdx);
    return `<div class="card" style="margin-bottom:14px;border-color:color-mix(in srgb, ${col} 35%, var(--border))"><div class="section-label">Editing chord ${state.editingIdx+1}: ${esc(chordSymbol(ch))}</div><div class="mini-label">Root</div><div class="row" style="margin-bottom:8px">${keyRow}</div>${typeGroups}${bassSection}</div>`;
  }

  function renderVoiceLeading() {
    if (state.progChords.length < 2) return "";
    const fi = Math.min(state.vlFrom, state.progChords.length-1), ti = Math.min(state.vlTo, state.progChords.length-1);
    const fc = state.progChords[fi], tc = state.progChords[ti];
    const ft = buildTones(fc.key, CHORD_TYPES[fc.type]?.intervals || []);
    const tt = buildTones(tc.key, CHORD_TYPES[tc.type]?.intervals || []);
    const moves = bestVoiceLeading(ft, tt);
    const fcol = PROG_COLORS[fi % PROG_COLORS.length], tcol = PROG_COLORS[ti % PROG_COLORS.length];
    const fromBtns = state.progChords.map((ch,i) => btn(`${i+1}. ${chordSymbol(ch)}`, state.vlFrom===i, PROG_COLORS[i%PROG_COLORS.length], `app.set('vlFrom',${i})`)).join("");
    const toBtns = state.progChords.map((ch,i) => btn(`${i+1}. ${chordSymbol(ch)}`, state.vlTo===i, PROG_COLORS[i%PROG_COLORS.length], `app.set('vlTo',${i})`)).join("");
    const left = ft.map((t,i) => `<div class="vl-row" style="justify-content:flex-end"><span class="vl-note">${esc(t)}</span><span class="vl-label">${esc(CHORD_TYPES[fc.type]?.intLabels?.[i])}</span></div>`).join("");
    const mid = moves.map(m => { const q = vlQuality(m.semis); const dir = m.semis>0?"↑":m.semis<0?"↓":"="; return `<div class="vl-row" style="justify-content:center;gap:5px"><div style="font-size:13px;color:${q.color}">${dir}</div><div style="font-size:10px;color:${q.color};flex:1;text-align:center">${q.label}</div><div style="font-size:9px;color:var(--dim);font-family:monospace">${m.semis===0?"0":m.semis>0?`+${m.semis}`:m.semis}</div></div>`; }).join("");
    const right = moves.map(m => `<div class="vl-row"><span class="vl-label" style="margin-right:8px">${esc(CHORD_TYPES[tc.type]?.intLabels?.[tt.indexOf(m?.to)] || "")}</span><span class="vl-note">${esc(m?.to || "")}</span></div>`).join("");
    const common = moves.filter(m => m?.semis===0).map(m => m.from);
    const steps = moves.filter(m => Math.abs(m?.semis)<=2 && m?.semis!==0).map(m => `${m.from}→${m.to}`);
    const insight = `${common.length?`Common tones: <strong style="color:#6dd4a8">${esc(common.join(", "))}</strong> — hold these for a smooth connection. `:""}${steps.length?`Stepwise moves: <strong style="color:#e8c547">${esc(steps.join(", "))}</strong> — natural melodic flow.`:""}${moves.every(m => Math.abs(m?.semis||0)>2)?`<span style="color:#e87a7a">All voices leap — consider a passing tone to smooth the transition.</span>`:""}`;
    return `<div class="card" style="margin-bottom:16px"><div class="section-label">Voice Leading Visualizer</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px"><div><div class="mini-label">From</div><div class="row">${fromBtns}</div></div><div style="align-self:flex-end;font-size:18px;color:var(--dim);padding-bottom:4px">→</div><div><div class="mini-label">To</div><div class="row">${toBtns}</div></div></div><div class="voice-box"><div class="vl-grid"><div class="vl-side vl-left"><div style="font-size:11px;color:${fcol};margin-bottom:10px">${esc(chordSymbol(fc))}</div>${left}</div><div class="vl-mid">${mid}</div><div class="vl-side vl-right"><div style="font-size:11px;color:${tcol};margin-bottom:10px">${esc(chordSymbol(tc))}</div>${right}</div></div></div><div style="margin-top:10px;padding:10px 12px;background:var(--surface-2);border-radius:6px;border:1px solid var(--border)"><div class="mini-label">Melodic insight</div><div class="info-text">${insight}</div></div></div>`;
  }

  // ── Interval Trainer (octave-aware, tuning-aware) ──
  function renderIntervalTrainer() {
    const STR_OFF = openStringOffsets();
    const absA = state.itStr1 !== null ? STR_OFF[state.itStr1] + state.itFret1 : null;
    const absB = state.itStr2 !== null ? STR_OFF[state.itStr2] + state.itFret2 : null;
    let itInt = null, raw = null;
    if (absA !== null && absB !== null) {
      raw = Math.abs(absB - absA);
      const mod = raw % 12;
      itInt = (mod === 0 && raw >= 12) ? 12 : mod; // distinguish octave from unison
    }
    const itDef = itInt !== null ? INTERVALS[itInt] : null;

    const tuningNote = uniformTuning()
      ? "Tap any two notes to measure the interval between them. Because every string is tuned the same distance apart on this tuning, the shapes you learn repeat identically all over the neck."
      : "Tap any two notes to measure the interval between them. On this tuning the string intervals aren't all the same, so a shape can shift when it crosses certain strings — use the highlighted positions below as your guide.";
    const top = `<div class="card" style="margin-bottom:16px"><div class="section-label">Interval Trainer</div><div class="interval-status"><div style="display:flex;gap:8px;align-items:center"><div class="badge ${state.itStep>=1?"activeA":""}">A</div><span style="font-size:12px;color:${state.itStep===1?"var(--gold)":state.itNote1?"var(--text)":"var(--dim)"}">${state.itStep===1?"Tap note A on the fretboard":state.itNote1?`Note A: ${esc(state.itNote1)}`:"—"}</span></div><div style="font-size:16px;color:var(--dim)">→</div><div style="display:flex;gap:8px;align-items:center"><div class="badge ${state.itStep===2?"activeB":""}">B</div><span style="font-size:12px;color:${state.itStep===2?"var(--accent-blue)":state.itNote2?"var(--text)":"var(--dim)"}">${state.itStep===2?"Tap note B on the fretboard":state.itNote2?`Note B: ${esc(state.itNote2)}`:"—"}</span></div>${state.itStep===3?`<button type="button" class="pill" style="--c:#e87a3a;margin-left:auto" onclick="app.resetInterval()">Reset</button>`:""}</div><div class="info-text" style="margin-top:8px">${tuningNote}</div></div>`;

    const result = state.itStep === 3 && itDef ? `<div style="margin-top:16px"><div class="interval-result" style="--c:${itDef.color}"><div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px"><span class="interval-title">${esc(itDef.name)}</span><span style="font-size:13px;color:var(--muted);font-family:monospace">${esc(itDef.abbr)}</span><span class="interval-meta">${raw} semitone${raw!==1?"s":""}</span><span style="font-size:11px;padding:3px 10px;border-radius:4px;background:var(--surface-2);color:var(--muted)">${esc(itDef.quality)}</span><button type="button" class="pill" style="--c:${itDef.color};margin-left:auto" onclick="app.playCurrentInterval()">Play interval</button></div><div class="info-text">${esc(IT_DESC[itInt])}</div></div>${renderIntervalOccurrences(itDef)}</div>` : "";

    const all = state.itStep === 1 ? `<div class="card" style="margin-top:16px"><div class="section-label">Interval Reference</div><div class="interval-grid">${Object.entries(INTERVALS).filter(([s])=>Number(s)<=12).map(([semis,iv]) => `<div class="interval-ref-card"><div class="interval-ref-icon" style="background:color-mix(in srgb, ${iv.color} 16%, transparent);border:1px solid color-mix(in srgb, ${iv.color} 40%, transparent)"><span style="color:${iv.color}">${esc(iv.abbr)}</span></div><div><div style="font-size:12px;color:var(--text)">${esc(iv.name)}</div><div style="font-size:10px;color:var(--dim)">${semis} semitone${semis==="1"?"":"s"} · ${esc(iv.quality)}</div></div></div>`).join("")}</div></div>` : "";

    return `<div>${top}${renderFretboard("interval")}${result}${all}</div>`;
  }

  function renderIntervalOccurrences(itDef) {
    const { effectiveOpen, displayFrets } = current();
    const strings = getOpenStrings();
    const lefty = state.leftHanded;
    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const thick = 0.5 + si * 0.6;
      const fretsForRow = lefty ? [...displayFrets].reverse() : displayFrets;
      const cells = fretsForRow.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0, isA = note === state.itNote1, isB = note === state.itNote2;
        const content = (isA || isB) ? `<div class="dot" style="--c:${isA?"#e8c547":"#7eb8d4"};width:22px;height:22px"><span>${isA?"A":"B"}</span></div>` : "";
        return `<div class="cell" style="height:28px" onclick="app.playNote('${note}')"><div class="string-line" style="height:${thick}px;${lefty?"right":"left"}:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line" style="width:2px;${lefty?"left:auto;right:50%;transform:translateX(50%)":""}"></div>`:""}${fret>0?`<div class="fret-wire" style="top:10%;bottom:10%;${lefty?"left:auto;right:0":""}"></div>`:""}${content}</div>`;
      }).join("");
      const label = `<div class="string-label" style="font-size:12px">${esc(spell(open))}</div>`;
      return `<div class="string-row" style="margin-bottom:3px">${lefty?"":label}${cells}${lefty?label:""}</div>`;
    }).join("");
    const minW = 52 + displayFrets.length * 46;
    const occNote = uniformTuning()
      ? `Notice how the shape repeats identically — that consistency is what makes this tuning so learnable.`
      : `On this tuning the pattern shifts where the string intervals change (for example across the B string on a guitar), so use the highlighted positions rather than a single repeating shape.`;
    return `<div class="card"><div class="section-label">Every occurrence on this tuning</div><div class="info-text" style="margin-bottom:12px">Both <span style="color:${itDef.color}">${esc(spell(state.itNote1))}</span> and <span style="color:${itDef.color}">${esc(spell(state.itNote2))}</span> are highlighted across the neck. ${occNote}</div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px">${rows}</div></div></div>`;
  }

  // ── Key Finder (reverse lookup) ──
  function renderFinder() {
    const chordCards = state.finderChords.map((ch,ci) => {
      const del = state.finderChords.length > 1 ? `<button type="button" class="delete-x" onclick="event.stopPropagation();app.removeFinderChord(${ci})" aria-label="Remove">×</button>` : "";
      return `<div class="chord-card"><div class="chord-inner ${state.finderEditIdx===ci?"active":""}" style="--c:#6dd4a8" onclick="app.set('finderEditIdx',${ci})"><div class="ch-name">${esc(ch.key)} ${esc(CHORD_TYPES[ch.type]?.label)}</div></div>${del}</div>`;
    }).join("");
    const ch = state.finderChords[state.finderEditIdx] || state.finderChords[0];
    const keyRow = KEYS.map(k => btn(KEY_DISPLAY[k]||k, ch.key===k, "#6dd4a8", `app.setFinderChord('key','${k}')`)).join("");
    const commonTypes = ["maj","min","7","maj7","min7","dim","m7b5","sus4"];
    const typeRow = commonTypes.map(k => btn(CHORD_TYPES[k].label, ch.type===k, CHORD_TYPES[k].color, `app.setFinderChord('type','${k}')`)).join("");
    const results = findKeys(state.finderChords);
    const resultCards = results.map(r => {
      const pct = Math.round((r.matches / r.total) * 100);
      const dia = DIATONIC[r.mode];
      const diatonicChords = dia.degrees.map((d,i) => `${transpose(r.root,d)}${dia.triads[i]==="min"?"m":dia.triads[i]==="dim"?"°":""}`).join("  ");
      return `<div class="saved-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:15px;color:var(--text-bright)">${esc(r.root)} ${esc(r.mode)}</span><span style="font-size:12px;color:${pct===100?"#6dd4a8":"var(--muted)"}">${r.matches}/${r.total} chords</span></div><div class="info-text" style="font-size:11px">${esc(diatonicChords)}</div><button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;margin-top:8px" onclick="app.useKeyForScale('${r.root}','${r.mode}')">Show scale</button></div>`;
    }).join("");

    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Key Finder</div><div class="info-text" style="margin-bottom:12px">Enter the chords from a song or progression and Open Strings will suggest the most likely keys, showing how many of your chords fit each one.</div><div class="row" style="margin-bottom:12px">${chordCards}${state.finderChords.length<8?`<button type="button" class="util-btn" onclick="app.addFinderChord()">+ Add</button>`:""}</div><div class="mini-label">Root of chord ${state.finderEditIdx+1}</div><div class="row" style="margin-bottom:10px">${keyRow}</div><div class="mini-label">Quality</div><div class="row">${typeRow}</div></div>
      <div class="card"><div class="section-label">Most Likely Keys</div><div class="saved-list">${resultCards}</div></div>`;
  }

  // ── Quiz ──
  function renderQuiz() {
    if (!state.quizQuestion) newQuizQuestion();
    const q = state.quizQuestion;
    const result = state.quizAnswer ? `<div class="status-note" style="border-color:${state.quizAnswer.correct?"#6dd4a8":"#e87a7a"}">${state.quizAnswer.correct?"Correct.":`Not quite — the answer is ${esc(q.answer)}.`}</div>` : "";
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Chord-Tone Quiz</div><div style="font-size:18px;color:var(--text-bright);margin-bottom:10px">${esc(q.prompt)}</div><div class="quiz-answer">${q.choices.map(c => btn(c, false, "#e8c547", `app.answerQuiz('${c}')`)).join("")}</div><div class="info-text" style="margin:10px 0">Score ${state.quizScore} · Streak ${state.quizStreak}</div>${result}<div class="row" style="margin-top:10px"><button type="button" class="accent-btn" onclick="app.newQuizQuestion()">Next question</button></div></div>${renderFretboard("single")}`;
  }
  function newQuizQuestion() {
    const root = KEYS[Math.floor(Math.random()*KEYS.length)];
    const typeKeys = ["maj","min","7","maj7","min7","sus2","sus4","dim","6","9"];
    const type = typeKeys[Math.floor(Math.random()*typeKeys.length)];
    const def = CHORD_TYPES[type];
    const tones = buildTones(root, def.intervals);
    const ti = Math.floor(Math.random()*tones.length);
    const answer = tones[ti], label = def.intLabels[ti];
    const distractors = KEYS.filter(k => k !== answer).sort(() => Math.random()-.5).slice(0,3);
    const choices = [answer, ...distractors].sort(() => Math.random()-.5);
    state.selectedKey = root; state.selectedType = type;
    state.quizQuestion = { prompt: `In ${root} ${def.label}, which note is the ${label}?`, answer, choices };
    state.quizAnswer = null;
  }

  // ── Ear Training ──
  function renderEar() {
    if (!state.earQuestion) newEarQuestion();
    const q = state.earQuestion;
    const choices = Object.entries(CHORD_TYPES).filter(([k]) => ["maj","min","7","maj7","min7","dim","sus4","aug","m7b5","6"].includes(k));
    const result = state.earAnswer ? `<div class="status-note" style="border-color:${state.earAnswer.correct?"#6dd4a8":"#e87a7a"}">${state.earAnswer.correct?"Correct.":`That was a ${esc(CHORD_TYPES[q.type].label)} chord.`}</div>` : "";

  function newEarQuestion() {

  // ── Chord Identifier ──
  function renderIdentify() {
    const strings = getOpenStrings();
    const picked = state.idNotes;
    const noteSet = new Set(picked.map(p => p.note));
    const match = identifyChord(noteSet);
    const lowestTapped = state.idNotes.length
      ? state.idNotes.reduce((lo, n) => n.string > lo.string ? n : lo).note
      : null;
    const slashSuggestion = match && lowestTapped && lowestTapped !== match.root
      ? ` <span class="interval-meta" style="--c:${match.def.color}">also ${esc(chordSymbol({ key: match.root, type: match.key, bass: lowestTapped }))}</span>`
      : "";
    let resultHtml;
    if (picked.length < 2) {
      resultHtml = `<div class="info-text">Tap notes on the fretboard to build a chord. Tap a marked note again to remove it.</div>`;
    } else if (match) {
      const conf = match.exact ? "exact match" : "closest match (extra or missing tones)";
      resultHtml = `<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap"><span style="font-size:24px;color:${match.def.color}">${esc(chordSymbol({ key: match.root, type: match.key }))}</span><span class="interval-meta" style="--c:${match.def.color}">${conf}</span>${slashSuggestion}<button type="button" class="pill" style="--c:${match.def.color};margin-left:auto" onclick="app.playIdentified('${match.root}','${match.key}')">Hear chord</button></div><div class="info-text" style="margin-top:8px">Selected notes: ${[...noteSet].map(n=>esc(spell(n))).join(", ")}${lowestTapped && lowestTapped !== match.root ? ` · Lowest tapped note: ${esc(spell(lowestTapped))}` : ""}</div>`;
    } else {
      resultHtml = `<div class="info-text">No standard chord matches those notes (${[...noteSet].map(n=>esc(spell(n))).join(", ")}). Try removing a note.</div>`;
    }

    // Fretboard where tapping toggles selection
    const { displayFrets } = current();
    const lefty = state.leftHanded;
    const effectiveOpen = strings.map(s => noteAtFret(s, state.capo));
    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const thick = 1 + si * 0.5;
      const fretsForRow = lefty ? [...displayFrets].reverse() : displayFrets;
      const cells = fretsForRow.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const isPicked = picked.some(p => p.string === stringIdx && p.fret === fret);
        const inner = isPicked ? `<div class="dot" style="--c:#e8c547"><span>${esc(state.noteDisplay==="note"?spell(note):"●")}</span></div>` : `<span class="faded-note">${esc(spell(note))}</span>`;
        return `<div class="cell" onclick="app.toggleIdNote(${stringIdx},${fret},'${note}')"><div class="string-line" style="height:${thick}px;left:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line"></div>`:""}${fret>0?`<div class="fret-wire"></div>`:""}${inner}</div>`;
      }).join("");
      return `<div class="string-row"><div class="string-label">${esc(spell(open))}</div>${cells}</div>`;
    }).join("");
    const minW = 52 + displayFrets.length * 46;
    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f)?"marked":""}">${f}</div>`).join("");

    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Chord Identifier</div>${resultHtml}<div class="row" style="margin-top:10px">${picked.length?`<button type="button" class="util-btn" onclick="app.clearIdNotes()">Clear progression</button>`:""}</div></div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px"><div class="fret-numbers">${numberRow}</div>${rows}</div></div>`;
  }

  // ── Scales mode (dedicated scale studio) ────────────────────────────────────
  // Computes position "boxes": contiguous fret windows that contain a playable shape
  // of the scale, so players can practise one position at a time.
  function scalePositions(strings, scaleTones, rootNote) {
    // Build position windows anchored where the root falls on the lowest string,
    // plus a root on the next string, giving practical mid-neck boxes. Each window is
    // a 4-fret span clamped to 0–12.
    const anchors = new Set();
    // Roots on the lowest two strings make the most natural box anchors.
    [0, 1].forEach(s => {
      if (!strings[s]) return;
      for (let f = 0; f <= 12; f++) {
        if (noteAtFret(strings[s], f) === rootNote) anchors.add(Math.max(0, f - 1));
      }
    });
    anchors.add(0); // always include open position
    const windows = [...anchors]
      .map(start => [Math.min(start, 9), Math.min(start + 3, 12)])
      .filter(w => w[1] <= 12);
    // Dedupe and sort by starting fret
    const seen = new Set(), out = [];
    windows.sort((a,b) => a[0] - b[0]).forEach(w => { const k = w.join("-"); if (!seen.has(k)) { seen.add(k); out.push(w); } });
    return out.slice(0, 5);
  }

  function renderScales() {
    const scaleDef = SCALES[state.scalesType] || SCALES.major;
    const root = state.scalesKey;
    // Use capo-effective open strings so Scales mode matches actual sounding notes
    // when a capo is set elsewhere in the app.
    const rawStrings = getOpenStrings();
    const strings = rawStrings.map(s => noteAtFret(s, state.capo));
    const scaleTones = buildTones(root, scaleDef.intervals);
    const degLabels = degreeLabelsFor(scaleDef.intervals, state.scalesType);
    const color = scaleDef.color;
    const lefty = state.leftHanded;

    const cmpDef = state.scalesCompare ? SCALES[state.scalesCompare] : null;
    const cmpTones = cmpDef ? buildTones(root, cmpDef.intervals) : [];

    const positions = scalePositions(strings, scaleTones, root);
    let winLo = 0, winHi = 12;
    if (state.scalesPosition != null && positions[state.scalesPosition]) {
      [winLo, winHi] = positions[state.scalesPosition];
    }
    const displayFrets = [];
    for (let f = 0; f <= 12; f++) displayFrets.push(f);

    const keyRow = keyButtons(root, color, "app.setScalesKey");
    const typeButtons = Object.entries(SCALES).map(([k,v]) => btn(v.label, state.scalesType===k, v.color, `app.setScalesType('${k}')`)).join("");

    const notePills = scaleDef.intervals.map((iv,i) => {
      const n = scaleTones[i];
      const isR = i === 0;
      return `<span class="tone-pill ${isR?"root":""}" style="--c:${color}" onclick="app.playNote('${n}')">${esc(spell(n))} <span style="opacity:.6;font-size:10px">${esc(degLabels[iv])}</span></span>`;
    }).join("");

    const posButtons = `<button type="button" class="pill ${state.scalesPosition===null?"active":""}" style="--c:${color}" onclick="app.set('scalesPosition',null)">Whole neck</button>` +
      positions.map((w,i) => btn(`Pos ${i+1} (fr ${w[0]}–${w[1]})`, state.scalesPosition===i, color, `app.set('scalesPosition',${i})`)).join("");

    const chordSuffix = qual => ({
      maj:"", min:"m", dim:"°", aug:"+",
      maj7:"maj7", maj7s5:"maj7#5", "7":"7", min7:"m7", m7b5:"m7b5", dim7:"°7", mmaj7:"m(maj7)", "7s5":"7#5", "7b5":"7b5"
    }[qual] || "");

    const romanByInterval = { 0:"I", 1:"bII", 2:"II", 3:"bIII", 4:"III", 5:"IV", 6:"#IV", 7:"V", 8:"bVI", 9:"VI", 10:"bVII", 11:"VII" };
    const lowerRoman = r => r.replace(/[IV]+$/, m => m.toLowerCase());
    const triadChordQual = (third, fifth) => {
      if (third===4 && fifth===7) return "maj";
      if (third===3 && fifth===7) return "min";
      if (third===3 && fifth===6) return "dim";
      if (third===4 && fifth===8) return "aug";
      return "maj";
    };
    const seventhChordQual = (third, fifth, seventh) => {
      if (third===4 && fifth===7 && seventh===11) return "maj7";
      if (third===4 && fifth===7 && seventh===10) return "7";
      if (third===3 && fifth===7 && seventh===10) return "min7";
      if (third===3 && fifth===6 && seventh===10) return "m7b5";
      if (third===3 && fifth===6 && seventh===9) return "dim7";
      if (third===4 && fifth===8 && seventh===11) return "maj7s5";
      if (third===3 && fifth===7 && seventh===11) return "mmaj7";
      if (third===4 && fifth===8 && seventh===10) return "7s5";
      if (third===4 && fifth===6 && seventh===10) return "7b5";
      return "maj";
    };
    const romanFor = (rootIv, qual) => {
      const base = romanByInterval[rootIv % 12] || "I";
      const minorish = qual === "min" || qual === "min7" || qual === "m7b5" || qual === "dim" || qual === "dim7" || qual === "mmaj7";
      let r = minorish ? lowerRoman(base) : base;
      if (qual === "dim") r += "°";
      else if (qual === "aug") r += "+";
      else if (qual === "m7b5") r += "ø7";
      else if (qual === "dim7") r += "°7";
      else if (qual === "mmaj7") r += "(maj7)";
      else if (qual === "maj7s5") r += "maj7#5";
      else if (qual === "7s5") r += "7#5";
      else if (qual === "7b5") r += "7b5";
      else if (qual === "7") r += "7";
      else if (qual === "maj7") r += "maj7";
      else if (qual === "min7") r += "7";
      return r;
    };

    const highlightedSteps = state.scalesChordMode === "triad" ? [0,2,4] : [0,2,4,6];
    let diatonicHtml = "";
    if (scaleDef.intervals.length === 7) {
      const chips = scaleDef.intervals.map((rootIv, i) => {
        const steps = state.scalesChordMode === "triad" ? [0,2,4] : [0,2,4,6];
        const deg = steps.map(step => {
          const idx = (i + step) % 7;
          const wraps = Math.floor((i + step) / 7);
          return scaleDef.intervals[idx] + wraps * 12;
        });
        const third = (deg[1] - deg[0] + 120) % 12;
        const fifth = (deg[2] - deg[0] + 120) % 12;
        const seventh = deg[3] == null ? null : (deg[3] - deg[0] + 120) % 12;
        const chordRoot = scaleTones[i];
        const qual = state.scalesChordMode === "triad" ? triadChordQual(third, fifth) : seventhChordQual(third, fifth, seventh);
        const active = state.scalesHighlightChord === i;
        return `<div class="diatonic-chip" style="${active?`border-color:${color}`:""}" onclick="app.toggleScaleChord(${i})"><div class="dia-roman">${esc(romanFor(rootIv, qual))}</div><div class="dia-name">${esc(spell(chordRoot) + chordSuffix(qual))}</div></div>`;
      }).join("");
      const modeButtons = `${btn("Triads", state.scalesChordMode==="triad", color, "app.setScaleChordMode('triad')")}${btn("7th chords", state.scalesChordMode==="seventh", color, "app.setScaleChordMode('seventh')")}`;
      const chordModeLabel = state.scalesChordMode === "triad" ? "triads" : "diatonic 7th chords";
      diatonicHtml = `<div class="card" style="margin-bottom:14px"><div class="section-label">Diatonic ${state.scalesChordMode === "triad" ? "triads" : "7th chords"} from this scale</div><div class="row" style="margin-bottom:10px">${modeButtons}</div><div class="info-text" style="margin-bottom:10px">These ${chordModeLabel} are built by stacking every other note within ${esc(spell(root))} ${esc(scaleDef.label)}. Tap one to highlight all of its chord tones on the neck above.</div><div class="diatonic-wrap">${chips}</div></div>`;
    }

    const scaleUse = SCALE_CHORD_USES[state.scalesType];
    const scaleUseHtml = scaleUse ? `<div class="card" style="margin-bottom:14px"><div class="section-label">Best chord-scale use</div><div style="font-size:16px;color:var(--text-bright);margin-bottom:6px">${esc(scaleUse.chord)}</div><div class="info-text">${esc(scaleUse.note)}</div></div>` : "";

    const highlightChordTones = (() => {
      if (state.scalesHighlightChord == null || scaleDef.intervals.length !== 7) return null;
      const i = state.scalesHighlightChord;
      const deg = highlightedSteps.map(step => scaleTones[(i + step) % 7]);
      return new Set(deg);
    })();

    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f) ? "marked" : ""}">${f}</div>`).join("");
    const rows = [...strings].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const thick = 1 + si * 0.5;
      const fretsForRow = lefty ? [...displayFrets].reverse() : displayFrets;
      const cells = fretsForRow.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const nutSide = lefty ? "right" : "left";
        const inWindow = fret >= winLo && fret <= winHi;
        const idx = scaleTones.indexOf(note);
        const inScale = idx >= 0;
        const inCmp = cmpTones.includes(note);
        let inner = "";
        if (inScale && inWindow) {
          const iv = scaleDef.intervals[idx];
          const isRoot = idx === 0;
          const labelText = state.scalesShowDegrees ? degLabels[iv] : spell(note);
          const dimmed = highlightChordTones && !highlightChordTones.has(note);
          const chordTone = highlightChordTones && highlightChordTones.has(note);
          inner = `<div class="dot ${isRoot?"root":""}" style="--c:${cssColor(color)};${dimmed?"opacity:0.28":""}${chordTone?";box-shadow:0 0 12px "+cssColor(color):""}"><span>${esc(labelText)}</span></div>`;
        } else if (inScale && !inWindow) {
          inner = `<div class="scale-dot" style="--c:${cssColor(color)};opacity:0.4"></div>`;
        } else if (inCmp && cmpDef) {
          inner = `<div class="scale-dot" style="--c:${cssColor(cmpDef.color)}"></div>`;
        } else {
          inner = `<span class="faded-note">${esc(spell(note))}</span>`;
        }
        return `<div class="cell" onclick="app.playAt(${stringIdx},${fret})" role="button" tabindex="0" onkeydown="app.cellKey(event,${stringIdx},${fret})" aria-label="${esc(open)} string fret ${fret}, ${esc(spell(note))}${inScale?", scale degree "+degLabels[scaleDef.intervals[idx]]:""}"><div class="string-line" style="height:${thick}px;${nutSide}:${isNut?"50%":"0"}"></div>${isNut?`<div class="nut-line" style="${lefty?"left:auto;right:50%;transform:translateX(50%)":""}"></div>`:""}${fret>0?`<div class="fret-wire" style="${lefty?"left:auto;right:0":""}"></div>`:""}${inner}</div>`;
      }).join("");
      const label = `<div class="string-label">${esc(spell(open))}</div>`;
      return `<div class="string-row">${lefty?"":label}${cells}${lefty?label:""}</div>`;
    }).join("");
    const markerFrets = lefty ? [...displayFrets].reverse() : displayFrets;
    const markerRow = markerFrets.map(f => {
      if ([3,5,7,9].includes(f)) return `<div class="marker-cell"><div class="marker"></div></div>`;
      if (f === 12) return `<div class="marker-cell"><div class="marker double"><span></span><span></span></div></div>`;
      return `<div class="marker-cell"></div>`;
    }).join("");
    const numbersFinal = lefty ? [...displayFrets].reverse().map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f) ? "marked" : ""}">${f}</div>`).join("") : numberRow;
    const minW = 52 + displayFrets.length * 46;
    const leftMargin = lefty ? `<style>.markers,.fret-numbers{margin-left:0;margin-right:52px}</style>` : "";
    const fretboard = `<div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px">${leftMargin}<div class="fret-numbers" style="${lefty?"margin-left:0;justify-content:flex-start":""}">${numbersFinal}</div>${rows}<div class="markers" style="${lefty?"margin-left:0":""}">${markerRow}</div></div></div>`;

    const cmpButtons = `<button type="button" class="pill ${state.scalesCompare===null?"active":""}" style="--c:#888" onclick="app.set('scalesCompare',null)">Off</button>` +
      Object.entries(SCALES).filter(([k]) => k !== state.scalesType).map(([k,v]) => btn(v.label, state.scalesCompare===k, v.color, `app.set('scalesCompare','${k}')`)).join("");

    const playArg = JSON.stringify(scaleDef.intervals);
    const formulaHtml = `<div class="card" style="margin-bottom:14px;border-left:3px solid ${color}">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-size:20px;color:var(--text-bright)">${esc(spell(root))} ${esc(scaleDef.label)}</span>
        <button type="button" class="play-btn" onclick='app.playScaleRun("${root}",${playArg})'>Play scale</button>
        ${cmpDef?`<span class="info-text" style="margin-left:auto">vs <span style="color:${cmpDef.color}">${esc(cmpDef.label)}</span></span>`:""}
      </div>
      <div class="row" style="margin-bottom:10px">${notePills}</div>
      <div class="info-text">Step pattern: <span style="color:var(--muted);font-family:ui-monospace,monospace">${esc(scaleFormula(scaleDef.intervals))}</span> &nbsp;·&nbsp; ${scaleDef.intervals.length} notes &nbsp;·&nbsp; W = whole step, H = half step</div>
    </div>`;

    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Scale</div>
        <div class="mini-label">Root</div><div class="row" style="margin-bottom:10px">${keyRow}</div>
        <div class="mini-label">Type</div><div class="row">${typeButtons}</div>
      </div>
      ${formulaHtml}
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start">
          <div style="flex:1 1 260px"><div class="mini-label">Position</div><div class="row">${posButtons}</div></div>
          <div style="flex:1 1 200px"><div class="mini-label">Labels</div><div class="row">${btn("Degrees", state.scalesShowDegrees, color, "app.set('scalesShowDegrees',true)")}${btn("Note names", !state.scalesShowDegrees, color, "app.set('scalesShowDegrees',false)")}</div></div>
        </div>
      </div>
      ${fretboard}
      <div class="legend"><div class="legend-title">Legend</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--root-fill);border:2px solid ${color}"><span style="color:${color}">1</span></div><span class="legend-text">Root (1)</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:${color}"><span style="color:var(--dot-text)">3</span></div><span class="legend-text">Scale degree</span></div>
        <div class="legend-item"><div class="scale-dot" style="--c:${color};position:static;opacity:0.4"></div><span class="legend-text">Same scale, other position</span></div>
        <span class="legend-text" style="margin-left:auto;align-self:center">Tap any note to hear it</span>
      </div>
      ${scaleUseHtml}
      ${diatonicHtml}
      <div class="card" style="margin-bottom:14px">
        <div class="section-label">Compare with another scale</div>
        <div class="info-text" style="margin-bottom:10px">Overlay a second scale (shown as rings) to see what notes they share and where they differ.</div>
        <div class="row">${cmpButtons}</div>
      </div>`;
  }

  // ── Modes Explorer ──
  function renderModes() {
    const parents = { "major": { label: "Major scale", modes: ["Ionian","Dorian","Phrygian","Lydian","Mixolydian","Aeolian","Locrian"], intervals: [0,2,4,5,7,9,11] },
                      "melodic": { label: "Melodic minor", modes: ["Melodic minor","Dorian b2","Lydian augmented","Lydian dominant","Mixolydian b6","Locrian #2","Altered"], intervals: [0,2,3,5,7,9,11] },
                      "harmonic": { label: "Harmonic minor", modes: ["Harmonic minor","Locrian #6","Ionian #5","Dorian #4","Phrygian dominant","Lydian #2","Altered bb7"], intervals: [0,2,3,5,7,8,11] } };
    const p = parents[state.modeParent];
    const parentBtns = Object.entries(parents).map(([k,v]) => btn(v.label, state.modeParent===k, "#c47ed4", `app.set('modeParent','${k}')`)).join("");
    const keyRow = keyButtons(state.modeParentKey, "#c47ed4", "app.setModeParentKey");
    // Each mode = rotation of the parent scale
    const rows = p.modes.map((modeName, i) => {
      const rootOffset = p.intervals[i];
      const modeRoot = transpose(state.modeParentKey, rootOffset);
      // Build the mode's interval set relative to its own root
      const rotated = p.intervals.map(iv => ((iv - rootOffset) + 12) % 12).sort((a,b)=>a-b);
      const notes = rotated.map(iv => spell(transpose(modeRoot, iv)));
      return `<div class="saved-card"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px"><span style="font-size:14px;color:var(--text-bright)">${esc(modeRoot)} ${esc(modeName)}</span><button type="button" class="pill" style="--c:#c47ed4;font-size:10px" onclick="app.playScale('${modeRoot}',[${rotated.join(",")}])">Preview</button></div><div class="info-text" style="font-size:11px;margin-top:4px">${notes.map(esc).join("  ")}</div></div>`;
    }).join("");
    return `<div class="card" style="margin-bottom:14px"><div class="section-label">Modes Explorer</div><div class="info-text" style="margin-bottom:12px">Every mode is the parent scale started from a different degree. Pick a parent scale and key to see all seven modes, their notes, and how they relate.</div><div class="mini-label">Parent scale</div><div class="row" style="margin-bottom:10px">${parentBtns}</div><div class="mini-label">Key</div><div class="row">${keyRow}</div></div><div class="saved-list">${rows}</div>`;
  }

  // ── Progression Suggester ──
  const SUGGEST_MOODS = {

      ["i","bII","bVII","i"],["i","iv","i","V"]
    ] },
    "gospel":     { label: "Gospel & soulful", bassStyle: "smooth", progs: [

      ["I","vi","ii","V"],["IV","V","iii","vi"],["I","III","IV","I"],["ii","V","I","vi"],

      ["Imaj7","IVmaj7"],["Imaj7","iii","IV","V"],["ii","IV","I"],["Imaj7","vi","ii","V"],
      ["Imaj7","iii7","vi","IVmaj7"],["IVmaj7","V","iii","vi"],["Imaj7","IVmaj7","iii7","vi"],["ii7","V","Imaj7","vi"],
      ["Imaj7","II","IVmaj7","IV"],["vi","IVmaj7","Imaj7","V"]
    ] },
    "jazz":       { label: "Jazz", bassStyle: "chromatic", progs: [
      ["ii7","V7","Imaj7"],["Imaj7","vi7","ii7","V7"],["iii7","vi7","ii7","V7"],["Imaj7","I7","IVmaj7","iv"],
      ["ii7","V7","iii7","vi7"],["Imaj7","VI7","ii7","V7"],["IVmaj7","iv","iii7","vi7"],["ii7","V7","Imaj7","VI7"],
      ["iii7","VI7","ii7","V7"],["Imaj7","bIII","ii7","V7"]
    ] },

      ["I7","IV7","I7","I7"],["IV7","IV7","I7","I7"],["V7","IV7","I7","V7"],["I7","I7","I7","I7","IV7","IV7","I7","I7","V7","IV7","I7","V7"],
      ["I7","IV7","V7"],["i","iv","V7"],["I7","V7","IV7","I7"],["i7","iv7","i7","V7"]
    ] },
    "neosoul":    { label: "Neo-soul", bassStyle: "smooth", progs: [
      ["Imaj7","iii7","vi7","ii7"],["ii7","bIII","ii7","V7"],["Imaj7","IVmaj7","iii7","bIII"],["vi7","ii7","V7","Imaj7"],
      ["IVmaj7","iii7","ii7","I"],["Imaj7","vi7","IVmaj7","V"],["ii7","V7","iii7","bIII"],["Imaj7","bVII","IVmaj7","IV"]
    ] },
    "modal":      { label: "Modal", bassStyle: "pedal", progs: [
      ["i","bVII","i"],["i","IV","i"],["i","bVII","bVI","bVII"],["I","bVII","IV","I"],
      ["i","bII","i"],["i","bIII","bVII","i"],["I","II","I"],["i","v","bVII","IV"]
    ] }
  };
  // Roman → [semitone offset from key, chord type]. Covers diatonic, borrowed, and common 7ths.
  const ROMAN_MAP = { "I":[0,"maj"],"II":[2,"maj"],"III":[4,"maj"],"IV":[5,"maj"],"V":[7,"maj"],"VI":[9,"maj"],"VII":[11,"maj"],
    "i":[0,"min"],"ii":[2,"min"],"iii":[4,"min"],"iv":[5,"min"],"v":[7,"min"],"vi":[9,"min"],"vii":[11,"min"],
    "bII":[1,"maj"],"bIII":[3,"maj"],"bVI":[8,"maj"],"bVII":[10,"maj"],
    "I7":[0,"7"],"II7":[2,"7"],"III7":[4,"7"],"IV7":[5,"7"],"V7":[7,"7"],"VI7":[9,"7"],
    "i7":[0,"min7"],"ii7":[2,"min7"],"iii7":[4,"min7"],"iv7":[5,"min7"],"vi7":[9,"min7"],
    "Imaj7":[0,"maj7"],"IVmaj7":[5,"maj7"],"viio":[11,"dim"],"viio7":[11,"dim7"] };

  // Functional-harmony tables for the randomizer (major-key model).
  const RAND_DIATONIC = { "I":"T","ii":"SD","iii":"T","IV":"SD","V":"D","vi":"T","viio":"D" };
  const RAND_NEXT = { "T":["SD","D","T"], "SD":["D","SD"], "D":["T"] };
  // Borrowed chords that reliably sound good in a major key, with songwriter-first explanations.
  const BORROWED_CHORDS = [
    { roman:"bVII", color:"Classic rock lift", why:"Anthemic, open, and a little less polished than V.", use:"Great before IV or I.", deep:"Borrowed from Mixolydian or the parallel minor palette." },
    { roman:"iv",   color:"Bittersweet turn", why:"Makes a major key suddenly feel more emotional.", use:"Beautiful right before I.", deep:"Minor iv borrowed from the parallel minor key." },
    { roman:"bVI",  color:"Cinematic drop", why:"A darker chord that still feels strong and singable.", use:"Try it before bVII, IV, V, or I.", deep:"Borrowed from the parallel minor key." },
    { roman:"bIII", color:"Minor-key shadow", why:"Adds a bold modal color without fully leaving major.", use:"Good after I or before IV/bVII.", deep:"Borrowed from the parallel minor key." },
    { roman:"bII",  color:"Drama button", why:"Very tense and unmistakably outside the key.", use:"Use sparingly before V or I.", deep:"Neapolitan-style borrowed chord." },
    { roman:"I7",   color:"Push toward IV", why:"Turns home into a push toward IV.", use:"Add before IV for blues, soul, or gospel movement.", deep:"The tonic dominant 7 acts like V/IV." }
  ];
  const SECONDARY_DOMINANTS = [
    { roman:"V/vi", target:"vi", targetOffset:9, targetType:"min", why:"Make the relative minor feel like a destination.", use:"Great for a sadder verse turn or emotional lift." },
    { roman:"V/ii", target:"ii", targetOffset:2, targetType:"min", why:"Make the ii chord feel intentional instead of random.", use:"Useful before ii–V or a pre-chorus lift." },
    { roman:"V/V",  target:"V",  targetOffset:7, targetType:"maj", why:"Aim harder at the V chord.", use:"Classic way to build energy before resolving." },
    { roman:"V/IV", target:"IV", targetOffset:5, targetType:"maj", why:"Turn the I chord into a push toward IV.", use:"Blues, soul, gospel, and old-school pop color." },
    { roman:"V/iii",target:"iii",targetOffset:4, targetType:"min", why:"Point at a softer, moodier chord.", use:"Good for surprising but smooth motion." }
  ];

  function randomProgression(len) {
    len = len || 4;
    const prog = ["I"];
    let func = "T";
    for (let i = 1; i < len - 1; i++) {
      const want = RAND_NEXT[func];
      const cands = Object.entries(RAND_DIATONIC).filter(([r, fn]) => want.includes(fn) && r !== prog[prog.length-1]);
      const pick = cands[Math.floor(Math.random() * cands.length)];
      prog.push(pick[0]); func = pick[1];
    }
    if (len >= 3) prog.push(func !== "D" ? (Math.random() < 0.7 ? "V" : "IV") : "V");
    if (len >= 2) prog.push(Math.random() < 0.8 ? "I" : "vi");
    return prog.slice(0, len);
  }

  function romanToChord(roman, key) {
    let token = roman;
    let type = "maj";
    if (ROMAN_MAP[token]) { const [off, t] = ROMAN_MAP[token]; return { key: transpose(key, off), type: t }; }
    // fallback: strip quality suffixes
    const m = token.match(/^(b?[iIvV]+)(.*)$/);
    if (m && ROMAN_MAP[m[1]]) { const [off] = ROMAN_MAP[m[1]]; const isMin = m[1] === m[1].toLowerCase(); return { key: transpose(key, off), type: m[2] || (isMin?"min":"maj") }; }
    return { key, type: "maj" };
  }

  // ═══ Bass Line Optimizer ═══════════════════════════════════════════════════
  // Treats slash chords as bass-motion tools. Given a progression and a style,
  // finds inversions that shape the bass line. Uses only existing helpers:
  // semiBetweenDir, trueDist, buildTones, CHORD_TYPES, spell.
  function inversionsFor(chord) {
    const def = CHORD_TYPES[chord.type] || CHORD_TYPES.maj;
    const tones = buildTones(chord.key, def.intervals);
    return [
      { ...chord, bass: undefined },
      ...tones.slice(1).map(n => ({ ...chord, bass: n }))
    ];
  }

  function scoreBassPath(bassNotes, style, nextRoots) {
    let score = 0, descCount = 0, ascCount = 0;
    for (let i = 1; i < bassNotes.length; i++) {
      const a = bassNotes[i-1], b = bassNotes[i];
      const up = semiBetweenDir(a, b);
      const dist = Math.min(up, 12 - up);
      const isDesc = up > 6;
      if (style === "smooth") {
        if (b === a) { score -= 2; continue; }
        score -= dist;
        if (dist <= 2) score += 2;
        if (isDesc && dist <= 2) score += 1;
        if (isDesc) descCount++; else ascCount++;
      }
      if (style === "descend") {
        if (isDesc && dist === 1) score += 6;
        else if (isDesc && dist === 2) score += 4;
        else if (isDesc && dist <= 4) score += 1;
        else if (!isDesc) score -= up * 2;
      }
      if (style === "chromatic") {
        if (nextRoots && i < nextRoots.length) {
          const toRoot = trueDist(b, nextRoots[i]);
          if (toRoot === 1) score += 4;
          else if (toRoot === 0) score += 1;
        }
        if (dist === 1) score += 3;
        else if (dist === 2) score += 1;
        else score -= 1;
      }
    }
    if (style === "smooth") {
      score += Math.abs(descCount - ascCount) * 1.5;
      score += descCount * 0.8;
    }
    return score;
  }

  function pedalVariant(chords, key) {
    const pedalNote = key;
    return chords.map(ch => {
      const def = CHORD_TYPES[ch.type] || CHORD_TYPES.maj;
      const tones = buildTones(ch.key, def.intervals);
      if (tones.includes(pedalNote) && ch.key !== pedalNote) return { ...ch, bass: pedalNote };
      return { ...ch, bass: undefined };
    });
  }

  function cadenceBonus(combo) {
    const last = combo[combo.length - 1];
    return (!last.bass || last.bass === last.key) ? 1 : 0;
  }

  function optimizeBassLine(chords, key, style) {
    if (style === "none" || !chords || !chords.length) return { chords, explanation: null, changed: false };
    if (style === "pedal") {
      const result = pedalVariant(chords, key);
      const changed = result.some((c, i) => (c.bass || null) !== (chords[i].bass || null));
      return { chords: result, explanation: changed ? explainBassPath(result, key, "pedal") : null, changed };
    }
    const candidates = chords.map(ch => inversionsFor(ch));
    const nextRoots = chords.map(c => c.key);
    let bestScore = -Infinity;
    let bestCombo = candidates.map(c => c[0]);
    function recurse(idx, current) {
      if (idx === chords.length) {
        const slashCount = current.filter(c => c.bass && c.bass !== c.key).length;
        if (slashCount > Math.ceil(chords.length * 0.6)) return;
        let consec = 0;
        for (const c of current) {
          if (c.bass && c.bass !== c.key) { consec++; if (consec >= 3) return; }
          else consec = 0;
        }
        const bassNotes = current.map(c => c.bass || c.key);
        const score = scoreBassPath(bassNotes, style, nextRoots) + cadenceBonus(current);
        if (score > bestScore) { bestScore = score; bestCombo = [...current]; }
        return;
      }
      for (const v of candidates[idx]) recurse(idx + 1, [...current, v]);
    }
    recurse(0, []);
    const changed = bestCombo.some((c, i) => (c.bass || null) !== (chords[i].bass || null));
    const explanation = changed ? explainBassPath(bestCombo, key, style) : null;
    return { chords: bestCombo, explanation, changed };
  }

  function explainBassPath(chords, key, style) {
    const bassNotes = chords.map(c => c.bass || c.key);
    const pathStr = bassNotes.map(spell).join(" → ");
    const dists = [];
    for (let i = 1; i < bassNotes.length; i++) dists.push(trueDist(bassNotes[i-1], bassNotes[i]));
    const allDesc = bassNotes.slice(1).every((_, i) => semiBetweenDir(bassNotes[i], bassNotes[i+1]) > 6);
    const allStep = dists.every(d => d <= 2);
    const pedalNote = bassNotes[0];
    const pedalCount = bassNotes.filter(n => n === pedalNote).length;
    const isPedal = style === "pedal" && pedalCount >= Math.ceil(bassNotes.length * 0.6);
    const mostDesc = bassNotes.slice(1).filter((_, i) => semiBetweenDir(bassNotes[i], bassNotes[i+1]) > 6).length >= Math.ceil((bassNotes.length - 1) * 0.6);
    if (isPedal) return `The harmony moves over a held ${spell(pedalNote)} bass — grounded and suspended.`;
    if (allDesc && allStep) return `The bass walks down by step: ${pathStr} — smooth and song-like.`;
    if (allDesc) return `The bass descends: ${pathStr}.`;
    if (allStep && style === "smooth") return `Smooth bass motion: ${pathStr} — no big jumps between chords.`;
    if (mostDesc) return `The bass mostly descends: ${pathStr}.`;
    if (style === "chromatic") return `Chromatic approach tones pull each chord forward: ${pathStr}.`;
    return `Shaped bass line: ${pathStr}.`;
  }

  // ── Direction 1: Targeted "What to try next" mutation advice ─────────────────
  // Analyzes the current progression and produces specific, actionable suggestions
  // for single-chord changes. Each suggestion has a type, plain label, and apply action.
  function buildNextSuggestions(chords, key) {
    if (!chords || chords.length < 2) return [];
    const isMinor = detectMinorKey(chords);
    const mode = isMinor ? "minor" : "major";
    const analysis = analyzeProgression(chords, key);
    const suggestions = [];

    // 1. Swap the V chord to V7 (add dominant tension if V exists without 7th)
    chords.forEach((ch, i) => {
      const info = romanInfoForChord(ch, key, mode);
      if (info.roman === "V" && ch.type === "maj") {
        const ch7 = { ...ch, type: "7" };
        suggestions.push({
          type: "swap", icon: "↗", color: "#e87a3a",
          label: `Make ${spell(ch.key)} a dominant 7 (${spell(ch.key)}7)`,
          detail: "Adds the b7 — sharpens the pull toward " + (isMinor ? "i" : "I") + " and gives the progression more forward motion.",
          apply: () => { const n=[...chords]; n[i]=ch7; return n; }
        });
      }
    });

    // 2. Add smooth bass motion via inversion (if not already using slash chords)
    const hasSlash = chords.some(c => c.bass && c.bass !== c.key);
    if (!hasSlash && chords.length >= 3) {
      const smooth = optimizeBassLine(chords, key, "smooth");
      if (smooth.changed) {
        suggestions.push({
          type: "bassline", icon: "↓", color: "#6dd4a8",
          label: "Smooth the bass line with inversions",
          detail: smooth.explanation || "Add chord inversions so the bass moves by step instead of leaping.",
          apply: () => smooth.chords
        });
      }
    }

    // 3. Swap last chord with a deceptive cadence (V→vi instead of V→I or i)
    if (chords.length >= 3) {
      const prev = chords[chords.length - 2];
      const last = chords[chords.length - 1];
      const prevInfo = romanInfoForChord(prev, key, mode);
      const lastInfo = romanInfoForChord(last, key, mode);
      if ((prevInfo.roman === "V" || prevInfo.roman === "V7") && (lastInfo.roman === "I" || lastInfo.roman === "i")) {
        const deceptive = romanToChord(isMinor ? "VI" : "vi", key);
        suggestions.push({
          type: "swap", icon: "↻", color: "#c47ed4",
          label: `Deceptive ending: ${spell(prev.key)}${prev.type==="7"?"7":""} → ${spell(deceptive.key)}${deceptive.type==="min"?"m":""}`,
          detail: "Instead of resolving home, land on the " + (isMinor ? "major VI" : "relative minor vi") + " — emotional, unresolved, keeps the ear wanting more.",
          apply: () => { const n=[...chords]; n[n.length-1]=deceptive; return n; }
        });
      }
    }

    // 4. Suggest borrowed iv/IV swap (major IV→minor iv or vice versa for color)
    chords.forEach((ch, i) => {
      const info = romanInfoForChord(ch, key, mode);
      if (info.roman === "IV" && ch.type === "maj") {
        const ivMin = { ...ch, type: "min" };
        suggestions.push({
          type: "swap", icon: "♭", color: "#7eb8d4",
          label: `Darken ${spell(ch.key)} to minor (${spell(ch.key)}m)`,
          detail: "The minor iv is one of the most beloved borrowed chords — bittersweet and immediately effective.",
          apply: () => { const n=[...chords]; n[i]=ivMin; return n; }
        });
      }
      if (info.roman === "iv" && ch.type === "min" && isMinor) {
        const ivMaj = { ...ch, type: "maj" };
        suggestions.push({
          type: "swap", icon: "♮", color: "#e8c547",
          label: `Brighten ${spell(ch.key)}m to major (Dorian IV)`,
          detail: "The major IV in a minor key is a Dorian touch — gives a hopeful lift without leaving the minor world.",
          apply: () => { const n=[...chords]; n[i]=ivMaj; return n; }
        });
      }
    });

    // 5. Add a passing secondary dominant before a strong chord target
    chords.forEach((ch, i) => {
      if (i === 0) return;
      const info = romanInfoForChord(ch, key, mode);
      // For vi/Am in major, suggest E7 before it
      if (info.roman === "vi" || info.roman === "i") {
        const secDomRoot = transpose(ch.key, 7); // V of this chord
        const alreadyThere = i > 0 && chords[i-1].key === secDomRoot && isDominantLike(chords[i-1].type);
        if (!alreadyThere) {
          const secDom = { key: secDomRoot, type: "7" };
          suggestions.push({
            type: "insert", icon: "→", color: "#e87a3a",
            label: `Add ${spell(secDomRoot)}7 before ${spell(ch.key)}${ch.type==="min"?"m":""}`,
            detail: spell(secDomRoot) + "7 is the V of " + spell(ch.key) + " — creates a directed pull that makes the landing feel earned.",
            insertBefore: i,
            apply: () => { const n=[...chords]; n.splice(i, 0, secDom); return n.slice(0, 8); }
          });
        }
      }
    });

    // 6. Parallel minor swap for the tonic (I→i or i→I)
    if (chords.length >= 2) {
      const firstInfo = romanInfoForChord(chords[0], key, mode);
      if (firstInfo.roman === "I") {
        const iMin = { key: chords[0].key, type: "min" };
        suggestions.push({
          type: "swap", icon: "↔", color: "#c47ed4",
          label: `Try ${spell(chords[0].key)}m to open (parallel minor tonic)`,
          detail: "Starting on the parallel minor tonic can make the whole progression feel darker and more dramatic.",
          apply: () => { const n=[...chords]; n[0]=iMin; return n; }
        });
      }
    }

    return suggestions.slice(0, 6); // cap at 6 so the panel stays readable
  }

  // ── Direction 2: Scenario-based variations ────────────────────────────────────
  // Takes the current progression and generates a scenario-shaped variation of it.
  // Scenarios are higher-level moods: "make this a chorus", "darken it", etc.
  const SCENARIOS = [
    { id:"chorus",  label:"Make it a chorus",    icon:"🔊", desc:"Bolder resolution — ends on I/i, opens up harmonically." },
    { id:"verse",   label:"Verse (builds tension)", icon:"🎵", desc:"Keeps some tension unresolved — good for building toward a chorus." },
    { id:"bridge",  label:"Bridge (unexpected)",   icon:"↗", desc:"Goes somewhere surprising — a borrowed chord or key area shift." },
    { id:"dark",    label:"Darken it",             icon:"🌑", desc:"Minor color, borrowed chords, or a move to the parallel minor." },
    { id:"lift",    label:"Give it a lift",        icon:"☀", desc:"Add a major IV, bVII, or bright borrowed color chord." },
