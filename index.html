<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0c0c0c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Open Strings" />
<meta name="description" content="A theory and practice studio for stringed instruments — chords, scales, progressions, intervals, voicings, ear training, and more. Works offline." />
<title>Open Strings — Theory &amp; Practice Studio for Stringed Instruments</title>
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #121212;
    --surface-2: #0f0f0f;
    --border: #32302c;
    --text: #e4ded2;
    --text-bright: #f4ecdc;
    --muted: #ada391;
    --dim: #8d8272;
    --faint: #746b5f;
    --gold: #e8c547;
    --wire: #57514a;
    --fret: #423c35;
    --nut: #6b6256;
    --accent-blue: #a8c4e8;
    --shadow: rgba(0,0,0,0.4);
    --root-fill: #ffffff;
    --dot-text: #0c0c0c;
  }
  html[data-theme="light"] {
    --bg: #f4eee2;
    --surface: #fffdf8;
    --surface-2: #ece4d4;
    --border: #aa9d86;
    --text: #2a2620;
    --text-bright: #14110b;
    --muted: #4f473b;
    --dim: #625846;
    --faint: #5c5346;
    --gold: #7a5700;
    --wire: #8d806d;
    --fret: #9b8e78;
    --nut: #6d5f4e;
    --accent-blue: #3a6491;
    --shadow: rgba(120,100,60,0.18);
    --root-fill: #fffaf0;
    --dot-text: #14110b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    padding: 24px 14px 80px;
    transition: background 0.2s, color 0.2s;
  }
  button, select, input { font-family: inherit; }
  button:focus-visible, select:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .wrap { max-width: 940px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 22px; }
  .eyebrow { font-size: 10px; letter-spacing: 0.35em; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: clamp(26px, 5vw, 44px); font-weight: normal; margin: 0 0 6px; color: var(--text-bright); letter-spacing: 0.06em; }
  .tagline { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; font-style: italic; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: stretch; }
  .segmented { display: flex; flex: 1 1 auto; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; min-width: 260px; }
  .tab { flex: 1; min-height: 42px; padding: 11px 8px; border: none; cursor: pointer; font-size: 12px; letter-spacing: 0.04em; background: transparent; color: var(--muted); transition: all 0.15s; }
  .tab:hover { color: var(--text); background: color-mix(in srgb, var(--gold) 6%, transparent); }
  .tab.active { background: var(--fret); color: var(--text-bright); }

  .util-btn { min-height: 38px; padding: 9px 14px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 12px; white-space: nowrap; transition: all 0.15s; }
  .util-btn:hover { border-color: var(--gold); color: var(--gold); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; box-shadow: 0 1px 3px var(--shadow); }
  .row { display: flex; flex-wrap: wrap; gap: 6px; }
  .global { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .grow { flex: 1 1 180px; }
  .grow2 { flex: 2 1 280px; }
  .section-label { font-size: 10px; letter-spacing: 0.22em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .mini-label { font-size: 9px; color: var(--dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 5px; }
  .group-label { font-size: 9px; color: var(--faint); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }

  .pill {
    --c: var(--muted);
    min-height: 34px; padding: 6px 13px; border-radius: 5px; cursor: pointer; font-size: 12px;
    transition: all 0.12s; border: none; outline: 1.5px solid var(--border);
    background: transparent; color: var(--muted); white-space: nowrap;
  }
  .pill:hover { color: var(--c); outline-color: color-mix(in srgb, var(--c) 50%, var(--border)); }
  .pill.active { outline-color: var(--c); background: color-mix(in srgb, var(--c) 14%, transparent); color: var(--c); }

  .accent-btn { min-height: 38px; padding: 8px 16px; border-radius: 6px; background: color-mix(in srgb, var(--gold) 15%, transparent); border: 1px solid color-mix(in srgb, var(--gold) 40%, transparent); color: var(--gold); cursor: pointer; font-size: 12px; white-space: nowrap; transition: all 0.15s; }
  .accent-btn:hover { background: color-mix(in srgb, var(--gold) 25%, transparent); }
  .play-btn { min-height: 34px; padding: 6px 13px; border-radius: 5px; background: color-mix(in srgb, var(--gold) 15%, transparent); border: 1px solid color-mix(in srgb, var(--gold) 35%, transparent); color: var(--gold); cursor: pointer; font-size: 12px; }

  .summary { padding: 14px 18px; background: var(--surface); border-left: 3px solid var(--c, var(--gold)); border-radius: 0 6px 6px 0; margin-bottom: 16px; box-shadow: 0 1px 3px var(--shadow); }
  .summary-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .summary-head .name { font-size: 20px; color: var(--text-bright); }
  .summary-head .roman { font-size: 13px; color: var(--muted); font-style: italic; }

  .tone-pill { --c: var(--gold); font-size: 12px; padding: 4px 11px; border-radius: 4px; cursor: pointer; background: color-mix(in srgb, var(--c) 14%, transparent); color: var(--c); border: 1px solid color-mix(in srgb, var(--c) 30%, transparent); }
  .tone-pill.root { background: color-mix(in srgb, var(--text-bright) 18%, transparent); color: var(--text-bright); border-color: color-mix(in srgb, var(--text-bright) 30%, transparent); }

  .fret-toolbar { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .fret-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
  .fretboard { width: max-content; }
  .fret-numbers { display: flex; margin-left: 52px; margin-bottom: 6px; }
  .fret-num { width: 46px; text-align: center; font-size: 11px; color: var(--faint); font-family: ui-monospace, monospace; flex-shrink: 0; }
  .fret-num.marked { color: var(--muted); }
  .string-row { display: flex; align-items: center; margin-bottom: 5px; }
  .string-label { width: 48px; text-align: right; padding-right: 10px; font-size: 14px; color: var(--muted); font-weight: bold; flex-shrink: 0; }
  .string-label .capo-orig { font-size: 9px; color: var(--faint); margin-left: 2px; }
  .cell { width: 46px; height: 44px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .string-line { position: absolute; left: 0; right: 0; top: 50%; background: var(--wire); transform: translateY(-50%); }
  .nut-line { position: absolute; left: 50%; top: 8%; bottom: 8%; width: 3px; background: var(--nut); transform: translateX(-50%); z-index: 1; }
  .fret-wire { position: absolute; left: 0; top: 8%; bottom: 8%; width: 1px; background: var(--fret); }
  .dot { --c: var(--gold); position: relative; z-index: 3; width: 26px; height: 26px; border-radius: 50%; background: var(--c); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px color-mix(in srgb, var(--c) 50%, transparent); transition: transform 0.1s; }
  .dot:hover { transform: scale(1.12); }
  .dot.root { width: 30px; height: 30px; background: var(--root-fill); border: 2px solid var(--c); box-shadow: 0 0 14px color-mix(in srgb, var(--c) 55%, transparent), 0 0 0 1px var(--border); }
  .dot span { font-size: 9px; font-weight: bold; font-family: ui-monospace, monospace; color: var(--dot-text); }
  .dot.root span { color: var(--c); }
  .dot.shared { outline: 2px solid var(--text-bright); outline-offset: 2px; }
  .dot.root-shared { width: 30px; height: 30px; }
  .dot.anchor-note { width: 30px; height: 30px; box-shadow: 0 0 14px rgba(255,255,255,0.45), 0 0 0 2px rgba(255,255,255,0.25); outline: 2px solid rgba(255,255,255,0.5); outline-offset: 2px; }
  .multi { position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--text-bright); border: 1px solid var(--bg); }
  .scale-dot { position: relative; z-index: 2; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid color-mix(in srgb, var(--c) 62%, transparent); background: color-mix(in srgb, var(--c) 18%, transparent); }
  .faded-note { position: relative; z-index: 1; font-size: 9px; color: var(--faint); font-family: ui-monospace, monospace; }
  .markers { display: flex; margin-left: 52px; margin-top: 3px; }
  .marker-cell { width: 46px; display: flex; justify-content: center; height: 12px; align-items: center; flex-shrink: 0; }
  .marker { width: 6px; height: 6px; border-radius: 50%; background: var(--wire); }
  .marker.double { display: flex; gap: 3px; background: none; width: auto; height: auto; }
  .marker.double span { width: 5px; height: 5px; border-radius: 50%; background: var(--wire); display: block; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 14px 16px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); margin-top: 18px; }
  .legend-title { font-size: 10px; color: var(--dim); letter-spacing: 0.2em; text-transform: uppercase; width: 100%; margin-bottom: 2px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-text { font-size: 11px; color: var(--muted); }
  .legend-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .legend-dot span { font-size: 8px; font-weight: bold; font-family: ui-monospace, monospace; }

  .voicing-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
  .voicing-card { background: var(--surface); border-radius: 6px; padding: 12px; border: 1px solid var(--border); min-width: 110px; }
  .voicing-title { font-size: 9px; color: var(--dim); text-align: center; margin-bottom: 8px; letter-spacing: 0.1em; }

  .chord-card { position: relative; }
  .chord-inner { padding: 10px 14px; border-radius: 6px; cursor: pointer; min-width: 92px; border: 1.5px solid var(--border); background: var(--surface-2); transition: all 0.15s; }
  .chord-inner.active { border-color: var(--c); background: color-mix(in srgb, var(--c) 12%, transparent); }
  .chord-inner .ch-name { font-size: 15px; color: var(--c); margin-bottom: 2px; }
  .chord-inner .ch-roman { font-size: 10px; color: var(--dim); font-style: italic; }
  .chord-inner .ch-tones { font-size: 9px; color: var(--faint); margin-top: 2px; }
  .delete-x { position: absolute; top: -9px; right: -9px; width: 24px; height: 24px; border-radius: 50%; background: var(--fret); border: 1px solid var(--border); color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
  .delete-x:hover { color: #e87a7a; border-color: #e87a7a; }

  .voice-box { background: var(--surface-2); border-radius: 6px; padding: 16px; border: 1px solid var(--border); }
  .vl-grid { display: flex; }
  .vl-side { flex: 1; }
  .vl-left { border-right: 1px solid var(--border); padding-right: 14px; }
  .vl-right { border-left: 1px solid var(--border); padding-left: 14px; }
  .vl-mid { width: 130px; flex-shrink: 0; padding: 28px 8px 0; }
  .vl-row { height: 32px; display: flex; align-items: center; }
  .vl-note { font-size: 15px; color: var(--text); margin-right: 8px; }
  .vl-label { font-size: 9px; color: var(--dim); }

  .interval-status { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .badge { width: 26px; height: 26px; border-radius: 50%; background: var(--fret); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--dim); font-weight: bold; }
  .badge.activeA { background: var(--gold); color: var(--dot-text); }
  .badge.activeB { background: var(--accent-blue); color: var(--dot-text); }
  .interval-result { padding: 18px; background: var(--surface); border-left: 4px solid var(--c); border-radius: 0 6px 6px 0; margin-bottom: 12px; }
  .interval-title { font-size: 26px; color: var(--c); }
  .interval-meta { font-size: 12px; padding: 3px 10px; border-radius: 4px; background: color-mix(in srgb, var(--c) 14%, transparent); color: var(--c); border: 1px solid color-mix(in srgb, var(--c) 25%, transparent); }
  .interval-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .interval-ref-card { padding: 9px 12px; background: var(--surface-2); border-radius: 5px; border: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
  .interval-ref-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .interval-ref-icon span { font-size: 9px; font-weight: bold; font-family: ui-monospace, monospace; }

  .info-text { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .status-note { font-size: 12px; color: var(--muted); line-height: 1.6; padding: 11px 13px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; }
  .field { display: flex; flex-direction: column; gap: 5px; min-width: 120px; }
  .field label { font-size: 9px; color: var(--dim); letter-spacing: .14em; text-transform: uppercase; }
  select, input[type="text"], input[type="number"], input[type="range"] {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 8px 10px; font-size: 13px;
  }
  input[type="range"] { padding: 0; accent-color: var(--gold); }

  .diatonic-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .diatonic-chip { padding: 8px 12px; border-radius: 6px; background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; text-align: center; min-width: 72px; transition: all 0.15s; }
  .diatonic-chip:hover { border-color: var(--gold); }
  .diatonic-chip .dia-roman { font-size: 11px; color: var(--dim); font-style: italic; margin-bottom: 2px; }
  .diatonic-chip .dia-name { font-size: 14px; color: var(--text-bright); }

  .quiz-answer { min-height: 44px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .saved-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 8px; }
  .saved-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  .suggest-current { background: linear-gradient(180deg, color-mix(in srgb, var(--gold) 7%, var(--surface)), var(--surface)); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 6px; padding: 13px 15px; margin-bottom: 14px; }
  .suggest-strip { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 10px 0 12px; }
  .suggest-chip { display: inline-flex; align-items: center; gap: 7px; padding: 6px 9px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-bright); font-size: 12px; }
  .suggest-chip .roman { color: var(--dim); font-style: italic; font-size: 10px; }
  .suggest-chip button { min-width: 24px; min-height: 24px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .suggest-chip button:hover { color: #e87a7a; border-color: #e87a7a; }
  .suggest-chip.selected { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 14%, var(--surface-2)); box-shadow: 0 0 0 2px color-mix(in srgb, var(--gold) 18%, transparent); }
  .suggest-chip.flash { border-color: var(--gold); box-shadow: 0 0 0 2px color-mix(in srgb, var(--gold) 28%, transparent); animation: suggestPulse 1.2s ease-out 1; }
  .drag-handle { cursor: grab; touch-action: none; user-select: none; color: var(--dim); border: 1px dashed var(--border); background: color-mix(in srgb, var(--text-bright) 3%, transparent); border-radius: 6px; min-width: 28px; min-height: 28px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; line-height: 1; }
  .drag-handle:active, .drag-handle.grabbing { cursor: grabbing; color: var(--gold); border-color: var(--gold); }
  .chord-move-btn { min-width: 28px; min-height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .chord-move-btn:hover { color: var(--gold); border-color: var(--gold); }
  .progression-drop { transition: transform .12s, box-shadow .12s, border-color .12s; }
  .progression-drop.drop-over { transform: translateY(-2px); box-shadow: 0 0 0 2px color-mix(in srgb, var(--gold) 28%, transparent); border-color: var(--gold); }
  .chord-card .reorder-row { display:flex; align-items:center; justify-content:center; gap:5px; margin-top:8px; }
  .reorder-tip { font-size: 11px; color: var(--muted); line-height: 1.55; margin-top: 8px; }
  @keyframes suggestPulse { 0% { transform: scale(1.03); } 100% { transform: scale(1); } }
  .suggest-hero { background: linear-gradient(180deg, color-mix(in srgb, var(--gold) 8%, var(--surface)), var(--surface)); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .suggest-hero .row { margin-bottom: 8px; }
  .idea-panel { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid #6dd4a8; border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .idea-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .idea-row { display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; padding: 2px 2px 8px; margin: 0 -2px; }
  .idea-card { flex: 0 0 min(315px, 86vw); scroll-snap-align: start; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; padding: 12px; }
  .idea-card .progression { font-size: 15px; color: var(--text-bright); margin-bottom: 6px; line-height: 1.35; }
  .idea-card .tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 7px 0 9px; }
  .tag-chip { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; background: color-mix(in srgb, var(--gold) 11%, transparent); color: var(--muted); border: 1px solid var(--border); }
  .suggest-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 10px; }
  .suggest-tab-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .suggest-dock { position: sticky; bottom: 12px; z-index: 50; background: linear-gradient(180deg, color-mix(in srgb, var(--gold) 12%, var(--surface)), var(--surface)); border: 1px solid color-mix(in srgb, var(--gold) 30%, var(--border)); box-shadow: 0 8px 26px var(--shadow); border-radius: 10px; padding: 12px 14px; margin: 16px 0 0; }
  .suggest-dock-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .suggest-dock .section-label { margin-bottom: 0; }
  .suggest-empty { color: var(--muted); font-size: 12px; line-height: 1.5; }
  .muted-link { border: none; background: transparent; color: var(--muted); text-decoration: underline; cursor: pointer; padding: 6px 4px; font-size: 12px; }
  .muted-link:hover { color: var(--gold); }
  .analysis-card { background: linear-gradient(180deg, color-mix(in srgb, #7eb8d4 7%, var(--surface)), var(--surface)); border: 1px solid var(--border); border-left: 3px solid #7eb8d4; border-radius: 6px; padding: 14px 16px; margin-bottom: 14px; }
  .analysis-topline { font-size: 17px; color: var(--text-bright); line-height: 1.35; margin: 5px 0 8px; }
  .analysis-subline { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
  .theory-depth { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
  .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; margin-top: 10px; }
  .analysis-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 11px; }
  .analysis-item h4 { margin: 0 0 5px; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); }
  .analysis-item p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.45; }
  .analysis-roman-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 10px 0 4px; }
  .analysis-roman { display: inline-flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-bright); font-size: 12px; }
  .analysis-roman .role { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
  .analysis-list { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
  .analysis-line { font-size: 13px; color: var(--muted); line-height: 1.45; }
  .analysis-line strong { color: var(--text-bright); }
  .mini-targets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

          if (!best || score > best.score) best = { root, key, def, score, exact: exactMatch };

        tx += lbl.length * 8 + 12;
      });
      if (state.selectedBass && state.selectedBass !== state.selectedKey) {
        svg += `<text x="${fbLeft-30}" y="${infoY+34}" fill="${cardMuted}" font-size="12">Bass note: ${esc(spell(state.selectedBass))}</text>`;
      }
    } else {
      let tx = fbLeft - 30;
      state.progChords.forEach((ch, ci) => {
        const col = PROG_COLORS[ci % PROG_COLORS.length];
        svg += `<circle cx="${tx+6}" cy="${infoY+10}" r="6" fill="${col}"/>`;
        const lbl = chordSymbol(ch);
        svg += `<text x="${tx+18}" y="${infoY+15}" fill="${col}" font-size="13">${esc(lbl)}</text>`;
        tx += lbl.length * 8 + 36;
      });
    }
    if (scaleDef) {
      svg += `<text x="${fbLeft-30}" y="${infoY+34}" fill="${cardMuted}" font-size="12">Scale overlay: ${esc(spell(state.scaleKey))} ${esc(scaleDef.label)} — ${esc(scaleTones.map(spell).join(" "))}</text>`;
    }

    // Fret wires + numbers
    drawFrets.forEach((f, fi) => {
      const x = fbLeft + fi * colW + colW / 2;
      const isOpen = f === 0;
      svg += `<line x1="${x}" y1="${fbTop-12}" x2="${x}" y2="${fbTop+fbHeight+12}" stroke="${isOpen ? cardWire : cardFret}" stroke-width="${isOpen ? 4 : 1}"/>`;
      if ([0,3,5,7,9,12].includes(f)) svg += `<text x="${x}" y="${fbTop-18}" text-anchor="middle" fill="${cardMuted}" font-size="11" font-family="monospace">${f}</text>`;
    });

    // Strings + labels
    [...effectiveOpen].reverse().forEach((open, si) => {
      const y = fbTop + si * stringSpacing;
      const thick = 1 + si * 0.8;
      svg += `<line x1="${fbLeft + colW/2}" y1="${y}" x2="${fbLeft + (nFrets-1)*colW + colW/2}" y2="${y}" stroke="${cardWire}" stroke-width="${thick}"/>`;
      svg += `<text x="${labelX}" y="${y+5}" text-anchor="${labelAnchor}" fill="${cardMuted}" font-size="14" font-weight="bold">${esc(spell(open))}</text>`;
    });

    // Position markers
    drawFrets.forEach((f, fi) => {
      const x = fbLeft + fi * colW + colW / 2;
      if ([3,5,7,9].includes(f)) svg += `<circle cx="${x}" cy="${fbTop+fbHeight+22}" r="5" fill="${cardFret}"/>`;
      if (f === 12) { svg += `<circle cx="${x-9}" cy="${fbTop+fbHeight+22}" r="4" fill="${cardFret}"/><circle cx="${x+9}" cy="${fbTop+fbHeight+22}" r="4" fill="${cardFret}"/>`; }
    });

    // Dots
    [...effectiveOpen].reverse().forEach((open, si) => {
      const y = fbTop + si * stringSpacing;
      drawFrets.forEach((fret, fi) => {
        const note = noteAtFret(open, fret);
        const x = fbLeft + fi * colW + colW / 2;
        let d = null;
        if (isChordChart) {
          const idx = singleTones.indexOf(note);
          if (idx >= 0) { const ivLabel = chordDef.intLabels?.[idx] || "?"; d = { color: chordDef.color, isRoot: idx === 0, label: state.noteDisplay === "note" ? spell(note) : ivLabel }; }
        } else {
          state.progChords.forEach((ch, ci) => {
            if (d) return;
            const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
            const idx = tones.indexOf(note);
            if (idx >= 0) { const ivLabel = CHORD_TYPES[ch.type]?.intLabels?.[idx] || "?"; d = { color: PROG_COLORS[ci % PROG_COLORS.length], isRoot: idx === 0, label: state.noteDisplay === "note" ? spell(note) : ivLabel }; }
          });
        }
        if (!d) {
          if (scaleDef && scaleTones.includes(note)) {
            svg += `<circle cx="${x}" cy="${y}" r="9" fill="${scaleDef.color}22" stroke="${scaleDef.color}88" stroke-width="1"/>`;
          }
          return;
        }
        if (d.isRoot) {
          svg += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${rootFill}" stroke="${d.color}" stroke-width="2.5"/>`;
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="${d.color}" font-size="9" font-weight="bold" font-family="monospace">${esc(d.label)}</text>`;
        } else {
          svg += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${d.color}"/>`;
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="#14110b" font-size="9" font-weight="bold" font-family="monospace">${esc(d.label)}</text>`;
        }
      });
    });

    // Legend
    const legY = fbTop + fbHeight + 54;
    svg += `<text x="${fbLeft-30}" y="${legY}" fill="${cardDim}" font-size="11" letter-spacing="2">LEGEND</text>`;
    svg += `<circle cx="${fbLeft+48}" cy="${legY-5}" r="9" fill="${rootFill}" stroke="${lc}" stroke-width="2"/><text x="${fbLeft+48}" y="${legY-1}" text-anchor="middle" fill="${lc}" font-size="8" font-weight="bold" font-family="monospace">R</text>`;
    svg += `<text x="${fbLeft+62}" y="${legY}" fill="${cardMuted}" font-size="12">Root</text>`;
    svg += `<circle cx="${fbLeft+120}" cy="${legY-5}" r="9" fill="${lc}"/><text x="${fbLeft+120}" y="${legY-1}" text-anchor="middle" fill="#14110b" font-size="8" font-weight="bold" font-family="monospace">3</text>`;
    svg += `<text x="${fbLeft+134}" y="${legY}" fill="${cardMuted}" font-size="12">Chord tone</text>`;
    svg += `<text x="${W/2}" y="${H-16}" text-anchor="middle" fill="${cardDim}" font-size="10">Open Strings — ${esc(instrumentLabel())} reference — frets ${state.fretRange[0]}–${state.fretRange[1]}${lefty?" — left-handed":""}</text>`;
    svg += `</svg>`;
    return svg;
  }

  function buildScaleSVG() {
    const scaleDef = SCALES[state.scalesType] || SCALES.major;
    const root = state.scalesKey;
    const rawStrings = getOpenStrings();
    const strings = rawStrings.map(s => noteAtFret(s, state.capo));
    const scaleTones = buildTones(root, scaleDef.intervals);
    const degLabels = degreeLabelsFor(scaleDef.intervals, state.scalesType);
    const positions = scalePositions(strings, scaleTones, root);
    let winLo = 0, winHi = 12;
    if (state.scalesPosition != null && positions[state.scalesPosition]) [winLo, winHi] = positions[state.scalesPosition];
    const displayFrets = Array.from({ length: winHi - winLo + 1 }, (_, i) => i + winLo);
    const lefty = state.leftHanded;
    const drawFrets = lefty ? [...displayFrets].reverse() : displayFrets;
    const nStrings = strings.length;
    const nFrets = displayFrets.length;
    const cardThemeBg = state.theme === "light" ? "#fffdf8" : "#0c0c0c";
    const cardText = state.theme === "light" ? "#14110b" : "#f4ecdc";
    const cardMuted = state.theme === "light" ? "#5c5346" : "#9a9082";
    const cardDim = state.theme === "light" ? "#7a7060" : "#6f665a";
    const cardWire = state.theme === "light" ? "#b3a690" : "#3a3a3a";
    const cardFret = state.theme === "light" ? "#c4b8a2" : "#2a2a2a";
    const rootFill = "#ffffff";

    const fbLeft = 78, padRight = 52, fbTop = 190, stringSpacing = 64, dotR = 14;
    const colW = 58;
    const W = fbLeft + nFrets * colW + padRight;
    const fbHeight = (nStrings - 1) * stringSpacing;
    const H = fbTop + fbHeight + 140;
    const labelX = lefty ? W - 24 : fbLeft - 24;
    const labelAnchor = lefty ? "start" : "middle";
    const title = `${spell(root)} ${scaleDef.label}`;
    const posLabel = state.scalesPosition != null && positions[state.scalesPosition]
      ? `position ${state.scalesPosition + 1}, frets ${winLo}–${winHi}`
      : `whole neck, frets ${winLo}–${winHi}`;

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="background:${cardThemeBg};font-family:Georgia,serif;">`;
    svg += `<rect width="${W}" height="${H}" fill="${cardThemeBg}"/>`;
    svg += `<text x="${W/2}" y="30" text-anchor="middle" fill="${cardDim}" font-size="12" letter-spacing="3">${esc(instrumentLabel().toUpperCase())} / ${esc(rawStrings.join(" "))} TUNING${state.capo>0?` / CAPO ${state.capo}`:""}${lefty?" / LEFT-HANDED":""}</text>`;
    svg += `<text x="${W/2}" y="62" text-anchor="middle" fill="${cardText}" font-size="24" font-weight="bold">${esc(title)}</text>`;

    let tx = fbLeft - 30;
    svg += `<rect x="${tx}" y="88" width="4" height="22" fill="${scaleDef.color}"/>`;
    svg += `<text x="${tx+12}" y="104" fill="${scaleDef.color}" font-size="13" font-weight="bold">Notes:</text>`;
    tx += 58;
    scaleDef.intervals.forEach((iv, i) => {
      const n = scaleTones[i];
      const lbl = `${spell(n)} (${degLabels[iv] || i + 1})`;
      svg += `<text x="${tx}" y="104" fill="${i === 0 ? cardText : scaleDef.color}" font-size="13">${esc(lbl)}</text>`;
      tx += lbl.length * 8 + 12;
    });
    svg += `<text x="${fbLeft-30}" y="128" fill="${cardMuted}" font-size="12">Step pattern: ${esc(scaleFormula(scaleDef.intervals))} · ${esc(posLabel)}</text>`;

    drawFrets.forEach((f, fi) => {
      const x = fbLeft + fi * colW + colW / 2;
      const isOpen = f === 0;
      svg += `<line x1="${x}" y1="${fbTop-12}" x2="${x}" y2="${fbTop+fbHeight+12}" stroke="${isOpen ? cardWire : cardFret}" stroke-width="${isOpen ? 4 : 1}"/>`;
      if ([0,3,5,7,9,12].includes(f)) svg += `<text x="${x}" y="${fbTop-18}" text-anchor="middle" fill="${cardMuted}" font-size="11" font-family="monospace">${f}</text>`;
    });

    [...strings].reverse().forEach((open, si) => {
      const y = fbTop + si * stringSpacing;
      const thick = 1 + si * 0.8;
      svg += `<line x1="${fbLeft + colW/2}" y1="${y}" x2="${fbLeft + (nFrets-1)*colW + colW/2}" y2="${y}" stroke="${cardWire}" stroke-width="${thick}"/>`;
      svg += `<text x="${labelX}" y="${y+5}" text-anchor="${labelAnchor}" fill="${cardMuted}" font-size="14" font-weight="bold">${esc(spell(open))}</text>`;
    });

    drawFrets.forEach((f, fi) => {
      const x = fbLeft + fi * colW + colW / 2;
      if ([3,5,7,9].includes(f)) svg += `<circle cx="${x}" cy="${fbTop+fbHeight+22}" r="5" fill="${cardFret}"/>`;
      if (f === 12) svg += `<circle cx="${x-9}" cy="${fbTop+fbHeight+22}" r="4" fill="${cardFret}"/><circle cx="${x+9}" cy="${fbTop+fbHeight+22}" r="4" fill="${cardFret}"/>`;
    });

    [...strings].reverse().forEach((open, si) => {
      const y = fbTop + si * stringSpacing;
      drawFrets.forEach((fret, fi) => {
        const note = noteAtFret(open, fret);
        const idx = scaleTones.indexOf(note);
        if (idx < 0) return;
        const x = fbLeft + fi * colW + colW / 2;
        const iv = scaleDef.intervals[idx];
        const label = state.noteDisplay === "note" ? spell(note) : (state.scalesShowDegrees ? (degLabels[iv] || String(idx + 1)) : spell(note));
        if (idx === 0) {
          svg += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${rootFill}" stroke="${scaleDef.color}" stroke-width="2.5"/>`;
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="${scaleDef.color}" font-size="9" font-weight="bold" font-family="monospace">${esc(label)}</text>`;
        } else {
          svg += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${scaleDef.color}"/>`;
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="#14110b" font-size="9" font-weight="bold" font-family="monospace">${esc(label)}</text>`;
        }
      });
    });

    const legY = fbTop + fbHeight + 54;
    svg += `<text x="${fbLeft-30}" y="${legY}" fill="${cardDim}" font-size="11" letter-spacing="2">LEGEND</text>`;
    svg += `<circle cx="${fbLeft+48}" cy="${legY-5}" r="9" fill="${rootFill}" stroke="${scaleDef.color}" stroke-width="2"/><text x="${fbLeft+48}" y="${legY-1}" text-anchor="middle" fill="${scaleDef.color}" font-size="8" font-weight="bold" font-family="monospace">1</text>`;
    svg += `<text x="${fbLeft+62}" y="${legY}" fill="${cardMuted}" font-size="12">Root</text>`;
    svg += `<circle cx="${fbLeft+120}" cy="${legY-5}" r="9" fill="${scaleDef.color}"/><text x="${fbLeft+120}" y="${legY-1}" text-anchor="middle" fill="#14110b" font-size="8" font-weight="bold" font-family="monospace">3</text>`;
    svg += `<text x="${fbLeft+134}" y="${legY}" fill="${cardMuted}" font-size="12">Scale degree</text>`;
    svg += `<text x="${W/2}" y="${H-16}" text-anchor="middle" fill="${cardDim}" font-size="10">Open Strings — ${esc(instrumentLabel())} scale reference — ${esc(posLabel)}${lefty?" — left-handed":""}</text>`;
    svg += `</svg>`;
    return svg;
  }

  function effectiveChartType() {
    const hasProg = Array.isArray(state.progChords) && state.progChords.length > 0;
    if (state.chartType === "scale") return "scale";
    if (state.chartType === "progression") return hasProg ? "progression" : "chord";
    if (state.chartType === "chord") return "chord";
    if (state.mode === "scales") return "scale";
    if ((state.mode === "progression" || state.mode === "suggest" || state.mode === "charts") && hasProg) return "progression";
    return "chord";
  }

  function getChartSVG() {
    return effectiveChartType() === "scale" ? buildScaleSVG() : buildPrintSVG();
  }

  async function printChart() {
    // Render the chart to a PNG first (same image as the PNG export), then print it in an
    // isolated document so the browser prints ONLY the chart, never the whole app screen.
    let dataUrl;
    try {
      const blob = await svgToPngBlob(getChartSVG(), 2);
      dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
    } catch (e) {
      // Fall back to the SVG directly if PNG rasterization fails
      dataUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(getChartSVG())}`;
    }
    const chartMode = effectiveChartType();
    const title = chartMode === "scale"
      ? `${spell(state.scalesKey)} ${(SCALES[state.scalesType] || SCALES.major).label} — ${instrumentLabel()} scale chart`
      : chartMode === "progression"
      ? `Progression: ${state.progChords.map(chordSymbol).join(" / ")}`
      : chordSymbol({ key: state.selectedKey, type: state.selectedType, bass: state.selectedBass });
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(title)}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;background:#fff}body{display:flex;align-items:center;justify-content:center;padding:16px}img{max-width:100%;height:auto;display:block}
@media print{@page{size:landscape;margin:0.3in}body{padding:0}img{width:100%;height:auto;page-break-inside:avoid}}</style></head>
<body><img id="chart" src="${dataUrl}" alt="Open Strings chart"></body></html>`;

    const win = window.open("", "_blank");
    if (win) {
      win.document.open(); win.document.write(html); win.document.close();
      const img = win.document.getElementById("chart");
      const go = () => { try { win.focus(); win.print(); } catch (e) {} };
      if (img && !img.complete) { img.onload = () => setTimeout(go, 200); img.onerror = () => setTimeout(go, 200); }
      else setTimeout(go, 300);
    } else {
      // Popup blocked — open the image in a new tab so the user can print/save manually.
      const w2 = window.open(dataUrl, "_blank");
      if (!w2) { toast("Allow pop-ups to print, or use PNG export"); }
    }
  }

  function downloadSVG() {
    const svg = getChartSVG();
    const blob = new Blob([svg], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "open-strings-chart.svg";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("SVG saved");
  }

  function svgToPngBlob(svg, scale) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const mW = svg.match(/width="(\d+)"/), mH = svg.match(/height="(\d+)"/);
      const w = mW ? Number(mW[1]) : 1100, h = mH ? Number(mH[1]) : 720;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = w * scale; canvas.height = h * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale); ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("Could not create PNG")), "image/png", 0.95);
      };
      img.onerror = reject;
      img.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    });
  }
  async function savePNG() {
    try {
      const blob = await svgToPngBlob(getChartSVG(), 2);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "open-strings-chart.png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast("PNG saved");
    } catch (e) { alert("PNG export failed: " + e.message); }
  }
  async function sharePNG() {
    try {
      const blob = await svgToPngBlob(getChartSVG(), 2);
      const file = new File([blob], "open-strings-chart.png", { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
        await navigator.share({ title: "Open Strings chart", files: [file] });
      } else { await savePNG(); }
    } catch (e) { if (e.name !== "AbortError") alert("Share failed: " + e.message); }
  }
  async function copyStateLink() {
    const url = stateURL();
    try { await navigator.clipboard.writeText(url); toast("Link copied"); }
    catch (e) { prompt("Copy this link", url); }
  }

  // ── Fretboard renderer ──
  function renderFretboard(fbMode) {
    const { chordDef, singleTones, effectiveOpen, scaleDef, scaleTones, displayFrets } = current();
    const chordColor = chordDef.color;
    const sharedTones = state.showShared ? getShared() : new Set();
    const strings = getOpenStrings();
    const rangeButtons = [[0,12,"All"],[0,5,"0–5"],[3,8,"3–8"],[5,12,"5–12"],[7,12,"7–12"]]
      .map(([a,b,l]) => btn(l, state.fretRange[0] === a && state.fretRange[1] === b, "#a8c4e8", `app.setFretRange(${a},${b})`)).join("");
    const numberRow = displayFrets.map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f) ? "marked" : ""}">${f}</div>`).join("");
    const lefty = state.leftHanded;

    const rows = [...effectiveOpen].reverse().map((open, si) => {
      const stringIdx = strings.length - 1 - si;
      const origOpen = [...strings].reverse()[si];
      const thick = 1 + si * 0.5;
      const fretsForRow = lefty ? [...displayFrets].reverse() : displayFrets;
      const cells = fretsForRow.map(fret => {
        const note = noteAtFret(open, fret);
        const isNut = fret === 0;
        const nutSide = lefty ? "right" : "left";
        let content = "";
        if (fbMode === "interval") {
          const isA = state.itStr1 === stringIdx && state.itFret1 === fret;
          const isB = state.itStr2 === stringIdx && state.itFret2 === fret;
          const ghostA = state.itNote1 === note && !isA;
          const ghostB = state.itStep === 3 && state.itNote2 === note && !isB;
          if (isA || isB) {
            const col = isA ? "#e8c547" : "#7eb8d4";
            content = `<div class="dot" style="--c:${col};width:32px;height:32px"><span>${isA ? "A" : "B"}</span></div>`;
          } else if (ghostA || ghostB) {
            const col = ghostA ? "#e8c547" : "#7eb8d4";
            content = `<div class="scale-dot" style="--c:${col};width:22px;height:22px"></div>`;
          } else {
            content = `<span class="faded-note">${esc(spell(note))}</span>`;
          }
          return `<div class="cell" onclick="app.intervalClick(${stringIdx},${fret},'${note}')" role="button" aria-label="${esc(open)} string fret ${fret}, ${esc(spell(note))}"><div class="string-line" style="height:${thick}px;${nutSide}:${isNut ? "50%" : "0"}"></div>${isNut ? `<div class="nut-line" style="${lefty?"left:auto;right:50%;transform:translateX(50%)":""}"></div>` : ""}${fret > 0 ? `<div class="fret-wire" style="${lefty?"left:auto;right:0":""}"></div>` : ""}${content}</div>`;
        }

        let dot = null;
        const isSN = scaleTones.includes(note);
        const isShared = sharedTones.has(note);
        if (fbMode === "single") {
          const idx = singleTones.indexOf(note);
          const isBassNote = !!(state.selectedBass && state.selectedBass !== state.selectedKey && note === state.selectedBass);
          if (idx >= 0) {
            dot = { color: chordColor, isRoot: idx === 0, isBass: isBassNote && idx !== 0, label: dotLabel(chordDef.intLabels?.[idx] || "?", note), multi: false };
          } else if (isBassNote) {
            // Non-chord-tone bass (pedal/passing) — show it as a special dot
            dot = { color: chordColor, isRoot: false, isBass: true, label: dotLabel(spell(note), note), multi: false };
          }
        } else {
          if (state.progMapMode === "selected" && state.progChords.length) {
            const ai = Math.min(state.editingIdx, state.progChords.length - 1);
            const ch = state.progChords[ai];
            const tones = buildTones(ch.key, CHORD_TYPES[ch.type]?.intervals || []);
            const idx = tones.indexOf(note);
            if (idx >= 0) dot = { color: PROG_COLORS[ai % PROG_COLORS.length], isRoot: idx === 0, label: dotLabel(CHORD_TYPES[ch.type]?.intLabels?.[idx] || "?", note), multi: false };
          } else {
            const hits = progDot(note);
            if (hits.length > 0) {
              const isMulti = hits.length > 1 && state.sharedDotMode === "shared" && state.progMapMode === "combined";
              if (isMulti) {
                // Shared note: conic-gradient, label is the note name (interval is ambiguous across chords)
                const colors = hits.map(h => h.color);
                dot = { color: conicGradient(colors), isRoot: hits.some(h => h.isRoot), isAnchor: hits.length >= 3, isSharedMulti: true, label: spell(note), multi: false };
              } else {
                const p = hits.find(h => h.isRoot) || hits[0];
                dot = { color: p.color, isRoot: p.isRoot, label: dotLabel(p.label, note), multi: hits.length > 1 };
              }
            }
          }
        }

        let inner = "";
        if (dot) {
          if (dot.isSharedMulti) {
            inner = `<div class="dot ${dot.isRoot ? "root-shared" : ""} ${dot.isAnchor ? "anchor-note" : ""}" style="background:${dot.color}${dot.isRoot ? ";box-shadow:0 0 0 2.5px var(--text-bright)" : ""}"><span style="color:#fff;text-shadow:0 0 3px rgba(0,0,0,0.75)">${esc(dot.label)}</span></div>`;
          } else if (dot.isBass) {
            inner = `<div class="dot bass-note" style="--c:${cssColor(dot.color)}"><span>${esc(dot.label)}</span></div>`;
          } else {
            inner = `<div class="dot ${dot.isRoot ? "root" : ""} ${isShared ? "shared" : ""}" style="--c:${cssColor(dot.color)}"><span>${esc(dot.label)}</span>${dot.multi ? `<div class="multi"></div>` : ""}</div>`;
          }
        } else if (isSN && scaleDef) {
          inner = `<div class="scale-dot" style="--c:${cssColor(scaleDef.color)}"></div>`;
        } else {
          inner = `<span class="faded-note">${esc(spell(note))}</span>`;
        }
        return `<div class="cell" onclick="app.playAt(${stringIdx},${fret})" role="button" tabindex="0" onkeydown="app.cellKey(event,${stringIdx},${fret})" aria-label="${esc(open)} string fret ${fret}, ${esc(spell(note))}"><div class="string-line" style="height:${thick}px;${nutSide}:${isNut ? "50%" : "0"}"></div>${isNut ? `<div class="nut-line" style="${lefty?"left:auto;right:50%;transform:translateX(50%)":""}"></div>` : ""}${fret > 0 ? `<div class="fret-wire" style="${lefty?"left:auto;right:0":""}"></div>` : ""}${inner}</div>`;
      }).join("");
      const capoTag = state.capo > 0 ? `<span class="capo-orig">(${esc(spell(origOpen))})</span>` : "";
      const label = `<div class="string-label">${esc(spell(open))}${capoTag}</div>`;
      return `<div class="string-row">${lefty ? "" : label}${cells}${lefty ? label.replace('text-align:right','text-align:left') : ""}</div>`;
    }).join("");

    const markerFrets = lefty ? [...displayFrets].reverse() : displayFrets;
    const markerRow = markerFrets.map(f => {
      if ([3,5,7,9].includes(f)) return `<div class="marker-cell"><div class="marker"></div></div>`;
      if (f === 12) return `<div class="marker-cell"><div class="marker double"><span></span><span></span></div></div>`;
      return `<div class="marker-cell"></div>`;
    }).join("");
    const numbersFinal = lefty ? [...displayFrets].reverse().map(f => `<div class="fret-num ${[3,5,7,9,12].includes(f) ? "marked" : ""}">${f}</div>`).join("") : numberRow;

    const minW = 52 + displayFrets.length * 46;
    const leftMargin = lefty ? `<style>.markers,.fret-numbers{margin-left:0;margin-right:52px}</style>` : "";
    return `<div class="fret-toolbar"><span class="mini-label" style="margin:0">Fret range</span>${rangeButtons}</div><div class="fret-scroll"><div class="fretboard" style="min-width:${minW}px">${leftMargin}<div class="fret-numbers" style="${lefty?"margin-left:0;justify-content:flex-start":""}">${numbersFinal}</div>${rows}<div class="markers" style="${lefty?"margin-left:0":""}">${markerRow}</div></div></div>`;
  }

  // ── Global panels (tuning, capo, scale) ──

    const capoButtons = Array.from({length:8}, (_,i) => btn(i===0?"None":`Fret ${i}`, state.capo===i, "#a8c4e8", `app.set('capo',${i})`)).join("");

      <div class="card grow">
        <div class="section-label">Instrument & Tuning</div>
        <div class="field" style="margin-bottom:8px"><label>Instrument</label><select onchange="app.setInstrument(this.value)" aria-label="Instrument">${instOptions}</select></div>
        <div class="field"><label>Tuning</label><select onchange="app.setTuning(this.value)" aria-label="Tuning">${tuningOptions}</select></div>
        ${customField}
      </div>
      <div class="card grow">
        <div class="section-label">Capo</div>
        <div class="row">${capoButtons}</div>
        ${state.capo>0?`<div class="info-text" style="margin-top:8px">Sounding tuning: ${esc(getOpenStrings().map(s=>noteAtFret(s,state.capo)).join(" "))}</div>`:""}
      </div>
      <div class="card grow2">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="section-label" style="margin:0">Scale Overlay</div>
          <button type="button" class="pill" style="--c:#6dd4a8;font-size:11px;padding:3px 9px" onclick="app.toggle('showScalePanel')">${state.showScalePanel?"hide":"configure"}</button>
        </div>
        ${state.showScalePanel ? `<div class="mini-label">Root</div><div class="row" style="margin-bottom:8px">${keyButtons(state.scaleKey, state.scaleType?SCALES[state.scaleType].color:"#6dd4a8", "app.setScaleKey")}</div><div class="mini-label">Type</div><div class="row">${scaleTypeButtons}</div>` :
        (state.scaleType ? `<div class="info-text">${esc(state.scaleKey)} ${esc(SCALES[state.scaleType].label)} — <span style="color:var(--muted)">${esc(buildTones(state.scaleKey, SCALES[state.scaleType].intervals).join(" "))}</span> <button type="button" class="pill" style="--c:#888;font-size:10px;padding:2px 7px;margin-left:6px" onclick="app.set('scaleType',null)">clear</button></div>` : `<div class="info-text">No scale active — tap configure to overlay a scale.</div>`)}
      </div>
